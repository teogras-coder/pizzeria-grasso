<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grasso Delivery - Area Fattorini</title>
<style>
:root {
--primary: #D48806; --primary-dark: #B87305; --primary-light: #F4E5C2;
--bg: #1a1a1a; --card: #2a2a2a; --card-light: #3a3a3a;
--text: #ffffff; --text-secondary: #b0b0b0; --border: #444;
--success: #28a745; --warning: #ffc107; --danger: #dc3545;
--pending: #ff9800; --accepted: #2196f3; --delivered: #4caf50;
--shadow: 0 4px 12px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 20px; }

.header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 15px 20px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
.header-content { display: flex; align-items: center; justify-content: center; gap: 12px; }
.header-logo { height: 45px; width: 45px; object-fit: contain; border-radius: 10px; background: white; padding: 4px; }
.header-logo-emoji { font-size: 2rem; }
.header h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 3px; }
.header p { font-size: 0.85rem; opacity: 0.95; }
.logout-btn { position: absolute; right: 15px; top: 12px; background: rgba(0,0,0,0.2); color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }

.container { max-width: 600px; margin: 0 auto; padding: 15px; }

.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; }
.login-box { background: var(--card); padding: 30px 25px; border-radius: 16px; width: 100%; max-width: 320px; box-shadow: var(--shadow); border: 1px solid var(--primary-dark); }
.login-logo { width: 120px; height: 120px; object-fit: contain; margin-bottom: 15px; border-radius: 20px; background: white; padding: 10px; box-shadow: 0 4px 15px rgba(212,136,6,0.3); }
.login-logo-emoji { font-size: 4rem; margin-bottom: 15px; }
.login-box h2 { color: var(--primary); margin-bottom: 10px; }
.login-box p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; }
.pin-input { width: 100%; padding: 14px; font-size: 1.4rem; text-align: center; letter-spacing: 12px; border: 2px solid var(--primary); border-radius: 12px; background: var(--bg); color: var(--text); margin-bottom: 15px; font-weight: 600; }
.pin-input:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(212,136,6,0.2); }
.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:active { transform: scale(0.98); }
.btn-success { background: var(--success); color: white; }
.btn-warning { background: var(--warning); color: #000; }
.btn-sm { padding: 8px 14px; font-size: 0.85rem; width: auto; min-width: 90px; }

.dashboard { display: none; }
.stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
.stat-card .number { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
.stat-card .label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }

.filter-tabs { display: flex; gap: 6px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab { padding: 8px 14px; border-radius: 20px; border: none; background: var(--card); color: var(--text-secondary); cursor: pointer; white-space: nowrap; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
.filter-tab.active { background: var(--primary); color: white; }

.order-card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--pending); box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.2s; }
.order-card:active { transform: scale(0.99); }
.order-card.status-accepted { border-left-color: var(--accepted); }
.order-card.status-delivered { border-left-color: var(--delivered); opacity: 0.7; }
.order-card.new { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(212,136,6,0.4); } 50% { box-shadow: 0 0 0 10px rgba(212,136,6,0); } }

.order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.order-id { font-weight: 700; color: var(--primary); font-size: 0.95rem; }
.order-time { font-size: 0.8rem; color: var(--text-secondary); }
.status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
.status-pending { background: rgba(255,152,0,0.15); color: var(--pending); }
.status-accepted { background: rgba(33,150,243,0.15); color: var(--accepted); }
.status-delivered { background: rgba(76,175,80,0.15); color: var(--delivered); }

.order-customer { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
.order-address { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.order-address.has-gps { color: var(--primary); font-weight: 500; }
.order-address .gps-icon { color: var(--success); margin-right: 4px; }
.order-items { background: var(--bg); padding: 10px; border-radius: 10px; margin-bottom: 12px; font-size: 0.9rem; max-height: 80px; overflow-y: auto; }
.order-items div { padding: 2px 0; }
.order-total { font-size: 1.2rem; font-weight: 700; color: var(--success); text-align: right; margin-bottom: 12px; }

.order-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.order-actions .btn { flex: 1; min-width: 85px; }

.empty-state { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
.empty-state .icon { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }

.new-order-alert { position: fixed; top: 70px; right: 15px; background: var(--danger); color: white; padding: 12px 18px; border-radius: 12px; box-shadow: var(--shadow); z-index: 1000; display: none; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; justify-content: center; align-items: center; padding: 15px; }
.modal-overlay.active { display: flex; }
.modal-content { background: var(--card); border-radius: 16px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 20px; border: 1px solid var(--primary-dark); }
.modal-close { float: right; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; line-height: 1; }
.modal-title { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.modal-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
.modal-row strong { color: var(--text-secondary); }
.modal-notes { background: rgba(255,193,7,0.1); padding: 10px; border-radius: 10px; margin: 12px 0; font-size: 0.9rem; border-left: 3px solid var(--warning); }
.modal-items { margin: 15px 0; padding-top: 15px; border-top: 1px solid var(--border); }
.modal-items div { padding: 4px 0; font-size: 0.9rem; }
.modal-total { text-align: right; font-size: 1.3rem; font-weight: 700; color: var(--success); margin: 15px 0; }
.modal-nav-btn { width: 100%; margin-top: 10px; background: linear-gradient(135deg, #4285f4, #3367d6); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.modal-nav-btn:active { transform: scale(0.98); }

.sound-toggle { position: fixed; bottom: 20px; left: 20px; background: var(--card); border: 1px solid var(--border); padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px; z-index: 90; }
.sound-toggle.muted { opacity: 0.6; }

@media (max-width: 480px) {
.header h1 { font-size: 1.15rem; }
.header-logo { height: 38px; width: 38px; }
.order-actions .btn { min-width: 75px; padding: 8px 10px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div class="header">
<button class="logout-btn" onclick="logout()">🚪 Esci</button>
<div class="header-content">
    <img id="headerLogo" src="" alt="Logo" class="header-logo" style="display:none;">
    <span id="headerLogoEmoji" class="header-logo-emoji">🛵</span>
    <div>
        <h1>Grasso Delivery</h1>
        <p>Area Fattorini • Antica Pizzeria Grasso</p>
    </div>
</div>
</div>

<div class="new-order-alert" id="newOrderAlert">🔔 Nuovo Ordine!</div>
<div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊 Suoni: ON</div>

<div class="login-screen" id="loginScreen">
<div class="login-box">
    <img id="loginLogo" src="" alt="Logo" class="login-logo" style="display:none;">
    <div id="loginLogoEmoji" class="login-logo-emoji">🛵</div>
    <h2>Accesso Fattorini</h2>
    <p>Inserisci il tuo codice PIN</p>
    <input type="password" class="pin-input" id="pinInput" maxlength="6" placeholder="••••" inputmode="numeric" autocomplete="one-time-code">
    <button class="btn btn-primary" onclick="login()">Accedi</button>
    <p style="margin-top:15px; font-size:0.8rem; color:var(--text-secondary)">PIN: chiedi al titolare</p>
</div>
</div>

<div class="container dashboard" id="dashboard">
<div class="stats">
<div class="stat-card"><div class="number" id="pendingCount">0</div><div class="label">In Attesa</div></div>
<div class="stat-card"><div class="number" id="myCount">0</div><div class="label">Miei Ordini</div></div>
<div class="stat-card"><div class="number" id="deliveredCount">0</div><div class="label">Consegnati Oggi</div></div>
<div class="stat-card"><div class="number" id="todayTotal">€0</div><div class="label">Totale Oggi</div></div>
</div>

<div class="filter-tabs">
<button class="filter-tab active" onclick="filterOrders('all')">Tutti</button>
<button class="filter-tab" onclick="filterOrders('pending')">⏳ In Attesa</button>
<button class="filter-tab" onclick="filterOrders('accepted')">🛵 Miei</button>
<button class="filter-tab" onclick="filterOrders('delivered')">✅ Consegnati</button>
</div>

<div id="ordersContainer">
<div class="empty-state"><div class="icon">📦</div><p>Nessun ordine di consegna al momento</p></div>
</div>
</div>

<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal()">
<div class="modal-content">
<button class="modal-close" onclick="closeModal()">&times;</button>
<div class="modal-title">Ordine #<span id="modalOrderId"></span></div>
<div id="modalBody"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAw8pBS3gOpitVIArnWutBnwca3hXSWuVs",
authDomain: "teogra-c8cf5.firebaseapp.com",
databaseURL: "https://teogra-c8cf5-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "teogra-c8cf5",
storageBucket: "teogra-c8cf5.firebasestorage.app",
messagingSenderId: "686300112893",
appId: "1:686300112893:web:e147b82f91374f12db1b94"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;
let currentFilter = 'all';
let ordersData = {};
let audioEnabled = true;
let audioContext = null;
let lastOrderCount = 0;

// 🖼️ LOGO
db.ref('settings/driverLogo').on('value', snapshot => {
    const logoUrl = snapshot.val();
    if (logoUrl) {
        ['headerLogo','loginLogo'].forEach(id=>{const el=document.getElementById(id),emo=document.getElementById(id.replace('Logo','LogoEmoji')); if(el){el.src=logoUrl;el.style.display='block';emo.style.display='none';}});
    }
});

// 👤 FATTORINI
let drivers = {};
let driversLoaded = false;
db.ref('drivers').on('value', snapshot => {
    const data = snapshot.val();
    drivers = (data && Object.keys(data).length > 0) ? data : { '1111': 'Marco', '2222': 'Luca', '3333': 'Pippo' };
    driversLoaded = true;
});

// 🔊 Audio
function initAudio() { try { if(!audioContext) audioContext = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ audioEnabled=false; } }
function playNotificationSound() {
    if(!audioEnabled) return; initAudio();
    try {
        const c=audioContext, o1=c.createOscillator(), g1=c.createGain();
        o1.connect(g1); g1.connect(c.destination); o1.frequency.value=880; g1.gain.value=0.25;
        o1.start(c.currentTime); o1.stop(c.currentTime+0.15);
        setTimeout(()=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.frequency.value=1100;g2.gain.value=0.25;o2.start(c.currentTime);o2.stop(c.currentTime+0.15);},100);
    } catch(e){}
}
function toggleSound() { audioEnabled=!audioEnabled; document.getElementById('soundToggle').textContent=`🔊 Suoni: ${audioEnabled?'ON':'OFF'}`; document.getElementById('soundToggle').classList.toggle('muted',!audioEnabled); }

// 🔐 Login
function login() {
    const pin = document.getElementById('pinInput').value;
    if(!driversLoaded) { alert('⏳ Caricamento...'); return; }
    const name = drivers[pin];
    if(name) {
        currentUser = name;
        localStorage.setItem('grasso_driver_session', currentUser);
        localStorage.setItem('grasso_driver_pin', pin);
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('dashboard').style.display='block';
        showToast(`👋 Benvenuto, ${name}!`);
        initDashboard();
    } else { alert('❌ PIN errato'); document.getElementById('pinInput').value=''; }
}
function logout() { localStorage.removeItem('grasso_driver_session'); localStorage.removeItem('grasso_driver_pin'); location.reload(); }

// Auto-login
if(localStorage.getItem('grasso_driver_session')) {
    const sn=localStorage.getItem('grasso_driver_session'), sp=localStorage.getItem('grasso_driver_pin');
    setTimeout(()=>{ if(sp && drivers[sp]===sn) { currentUser=sn; document.getElementById('loginScreen').style.display='none'; document.getElementById('dashboard').style.display='block'; initDashboard(); } else if(driversLoaded) { localStorage.removeItem('grasso_driver_session'); localStorage.removeItem('grasso_driver_pin'); } }, 500);
}

// 📊 Dashboard - ✅ SOLO DELIVERY
function initDashboard() {
    db.ref('ordini').orderByChild('timestamp').limitToLast(50).on('value', snapshot => {
        const data = {};
        snapshot.forEach(child => { 
            const val = child.val();
            if(val.type === 'delivery') data[child.key] = val;
        });
        ordersData = data;
        renderOrders(); updateStats(); checkNewOrders();
    });
}

function checkNewOrders() {
    const pending = Object.values(ordersData).filter(o => o.status === 'new' || o.status === 'pending');
    if(pending.length > lastOrderCount && lastOrderCount > 0) {
        if(audioEnabled) playNotificationSound();
        sendPushNotification('🍕 Nuovo Ordine!', 'Clicca per vedere i dettagli');
        const alert = document.getElementById('newOrderAlert'); alert.style.display='block';
        setTimeout(()=>alert.style.display='none', 3000);
    }
    if(lastOrderCount===0) lastOrderCount=pending.length;
}

// 🔔 Notifiche Push
document.addEventListener('DOMContentLoaded', function() {
    if ('Notification' in window && Notification.permission !== 'granted') {
        setTimeout(() => {
            if(confirm(' Vuoi ricevere avvisi anche a telefono bloccato?\n\nPremi "Consenti" sulla prossima schermata.')) {
                Notification.requestPermission().then(perm => {
                    if(perm === 'granted') showToast('✅ Notifiche attive!');
                });
            }
        }, 3000);
    }
});

function sendPushNotification(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, {
            body: body,
            icon: 'https://teogra-c8cf5.web.app/icon-192.png',
            badge: 'https://teogra-c8cf5.web.app/icon-192.png',
            tag: 'new-order',
            requireInteraction: true
        });
    }
}

function updateStats() {
    const all = Object.values(ordersData), today = new Date().toDateString();
    const todayOrders = all.filter(o => new Date(o.timestamp||Date.now()).toDateString() === today);
    document.getElementById('pendingCount').textContent = all.filter(o=>o.status==='new'||o.status==='pending').length;
    document.getElementById('myCount').textContent = all.filter(o=>o.assignedTo===currentUser && o.status==='accepted').length;
    document.getElementById('deliveredCount').textContent = todayOrders.filter(o=>o.status==='delivered').length;
    const total = todayOrders.filter(o=>o.status==='delivered').reduce((s,o)=>s+(o.finalTotal||o.total||0),0);
    document.getElementById('todayTotal').textContent = '€'+total.toFixed(2);
}

function filterOrders(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    renderOrders();
}

// ️ Navigazione Google Maps
function navigateToOrder(order) {
    let dest = '';
    if(order.coordinates && typeof order.coordinates === 'string' && order.coordinates.includes(',')) {
        const [lat, lng] = order.coordinates.split(',').map(Number);
        if(!isNaN(lat) && !isNaN(lng)) dest = `${lat},${lng}`;
    }
    if(!dest && order.address) {
        dest = encodeURIComponent(order.address + ', Manfredonia, Italy');
    }
    if(!dest) { showToast(' Indirizzo non disponibile'); return; }
    const url = `https://www.google.com/maps/dir/?api=1&destination=${dest}&travelmode=driving`;
    window.open(url, '_blank');
    showToast('🗺️ Apertura Google Maps...');
}

function renderOrders() {
    const container = document.getElementById('ordersContainer');
    let orders = Object.entries(ordersData).map(([id, data]) => ({ id, ...data }));

    if(currentFilter==='pending') orders = orders.filter(o=>o.status==='new'||o.status==='pending');
    else if(currentFilter==='accepted') orders = orders.filter(o=>o.assignedTo===currentUser && o.status==='accepted');
    else if(currentFilter==='delivered') orders = orders.filter(o=>o.status==='delivered');

    orders.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));

    if(orders.length===0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>Nessun ordine di consegna in questa categoria</p></div>';
        return;
    }

    container.innerHTML = orders.map(order => {
        const status = order.status || 'new';
        const statusText = {new:'⏳ Nuovo',pending:'⏳ In Attesa',accepted:'🛵 In Corso',delivered:'✅ Consegnato',cancelled:'❌ Annullato'}[status]||status;
        const statusClass = {new:'pending',pending:'pending',accepted:'accepted',delivered:'delivered',cancelled:'cancelled'}[status]||'pending';
        const time = order.timestamp ? new Date(order.timestamp).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}) : '--:--';
        const items = (order.items||[]).map(i=>`${i.name}${i.qty?' ×'+i.qty:''}`).join(', ') || 'Nessun prodotto';
        const total = (order.finalTotal||order.total||0).toFixed(2);
        const isNew = (status==='new'||status==='pending') && !order.assignedTo;
        const hasGps = order.coordinates && typeof order.coordinates === 'string' && order.coordinates.includes(',');

        return `
        <div class="order-card status-${statusClass} ${isNew?'new':''}" onclick="showDetail('${order.id}')">
        <div class="order-header">
        <span class="order-id">#${(order.orderId||order.id||'').slice(-6).toUpperCase()}</span>
        <span class="order-time">${time}</span>
        <span class="status-badge status-${statusClass}">${statusText}</span>
        </div>
        <div class="order-customer">👤 ${order.customerName||'Cliente'}</div>
        <div class="order-address ${hasGps?'has-gps':''}">
        ${hasGps?'<span class="gps-icon"></span>':''}
        ${order.address || 'Indirizzo non specificato'}
        </div>
        <div class="order-items">${items}</div>
        <div class="order-total">€${total}</div>
        <div class="order-actions" onclick="event.stopPropagation()">
        ${getActionButtons(order)}
        </div>
        </div>`;
    }).join('');
}

function getActionButtons(order) {
    const status = order.status || 'new';
    let buttons = '';
    
    if(order.address) {
        buttons += `<button class="btn btn-warning btn-sm" onclick="event.stopPropagation(); navigateToOrder(${JSON.stringify(order).replace(/'/g,"\\'")})">🗺️ Naviga</button>`;
    }
    
    if(status==='new'||status==='pending') {
        buttons += `<button class="btn btn-primary btn-sm" onclick="acceptOrder('${order.id}')">🛵 Accetta</button>`;
    } else if(status==='accepted' && order.assignedTo===currentUser) {
        buttons += `<button class="btn btn-success btn-sm" onclick="completeOrder('${order.id}')">✅ Consegnato</button><button class="btn btn-warning btn-sm" onclick="callCustomer('${order.customerPhone||''}')">📞 Chiama</button>`;
    } else if(status==='delivered') {
        buttons += `<span style="color:var(--success);font-size:0.85rem;font-weight:600">✅ Completato</span>`;
    } else {
        buttons += `<span style="color:var(--text-secondary);font-size:0.85rem">In attesa...</span>`;
    }
    return buttons;
}

function acceptOrder(orderId) { if(!confirm('✅ Accettare?')) return; db.ref('ordini/'+orderId).update({status:'accepted',assignedTo:currentUser,acceptedAt:Date.now(),acceptedBy:currentUser}).then(()=>{showToast('🛵 Ordine accettato!'); renderOrders();}); }
function completeOrder(orderId) { if(!confirm('✅ Consegnato?')) return; db.ref('ordini/'+orderId).update({status:'delivered',deliveredAt:Date.now(),deliveredBy:currentUser}).then(()=>{showToast('✅ Ordine consegnato!'); renderOrders();}); }
function callCustomer(phone) { if(!phone){showToast('📞 Numero non disponibile');return;} if(confirm(`📞 Chiamare ${phone}?`)) window.location.href='tel:'+phone.replace(/\D/g,''); }

function showDetail(orderId) {
    const order = ordersData[orderId]; if(!order) return;
    const modal = document.getElementById('detailModal'), body = document.getElementById('modalBody');
    const status = order.status||'new';
    const statusText = {new:'⏳ Nuovo',pending:'⏳ In Attesa',accepted:'🛵 In Corso',delivered:'✅ Consegnato'}[status]||status;
    document.getElementById('modalOrderId').textContent = (order.orderId||orderId).slice(-6).toUpperCase();
    const hasGps = order.coordinates && typeof order.coordinates === 'string' && order.coordinates.includes(',');

    body.innerHTML = `
    <div class="modal-row"><strong>Cliente:</strong> <span>${order.customerName||'N/D'}</span></div>
    <div class="modal-row"><strong>Telefono:</strong> <span><a href="tel:${order.customerPhone||''}" style="color:var(--primary)">${order.customerPhone||'N/D'}</a></span></div>
    <div class="modal-row"><strong>Tipo:</strong> <span> Consegna</span></div>
    <div class="modal-row"><strong>Indirizzo:</strong> <span class="${hasGps?'has-gps':''}">${hasGps?'📍 ':''}${order.address||'N/D'}</span></div>
    <div class="modal-row"><strong>Orario:</strong> <span>${order.scheduledTime||'Subito'}</span></div>
    <div class="modal-row"><strong>Stato:</strong> <span class="status-badge status-${status}">${statusText}</span></div>
    <div class="modal-row"><strong>Assegnato a:</strong> <span>${order.assignedTo||'Nessuno'}</span></div>
    ${order.notes?`<div class="modal-notes"> <strong>Note:</strong><br>${order.notes}</div>`:''}
    <div class="modal-items"><strong>Prodotti:</strong>${(order.items||[]).map((item,i)=>`<div>${i+1}. ${item.name} ${item.qty?'×'+item.qty:''} - €${(item.price*(item.qty||1)).toFixed(2)}</div>`).join('')}</div>
    <div class="modal-total">Totale: €${(order.finalTotal||order.total||0).toFixed(2)}</div>
    
    ${order.address?`<button class="modal-nav-btn" onclick="navigateToOrder(${JSON.stringify(order).replace(/'/g,"\\'")}); closeModal()">🗺️ Apri Google Maps per la navigazione</button>`:''}
    
    <div style="display:flex; gap:10px; margin-top:15px;">
    ${status==='new'||status==='pending'?`<button class="btn btn-primary" onclick="acceptOrder('${orderId}'); closeModal()" style="flex:1">🛵 Accetta</button>`:''}
    ${status==='accepted'&&order.assignedTo===currentUser?`<button class="btn btn-success" onclick="completeOrder('${orderId}'); closeModal()" style="flex:1">✅ Consegnato</button><button class="btn btn-warning" onclick="callCustomer('${order.customerPhone||''}'); closeModal()" style="flex:1">📞 Chiama</button>`:''}
    </div>`;
    modal.classList.add('active');
}

function closeModal() { document.getElementById('detailModal').classList.remove('active'); }
function showToast(msg) {
    const t=document.createElement('div'); t.textContent=msg;
    t.style.cssText=`position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:12px 20px;border-radius:12px;font-weight:500;z-index:1000;box-shadow:var(--shadow);border:1px solid var(--primary-dark);animation:slideIn 0.3s ease;`;
    document.body.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';},2000);
    setTimeout(()=>t.remove(),2300);
}

document.getElementById('pinInput')?.addEventListener('keypress', e=>{ if(e.key==='Enter') login(); });
document.addEventListener('touchstart', initAudio, {once:true});
document.addEventListener('click', initAudio, {once:true});
</script>
</body>
</html>
