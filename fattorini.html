<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fattorini - Antica Pizzeria Grasso</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root { --gold: #d4a84b; --gold-light: #f0d78c; --gold-dark: #b8860b; --dark: #1a1209; --brown: #2d1f12; --brown-light: #4a3728; --card: #2a1e13; --card-light: #3d2b1a; --cream: #f5e6c8; }
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--dark); font-family: 'Montserrat', sans-serif; }
body { display: flex; justify-content: center; }

/* ===== SCHERMATA LOGIN ===== */
.login-screen { position: fixed; inset: 0; background: linear-gradient(170deg, var(--dark) 0%, var(--brown) 50%, var(--brown-light) 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.login-box { background: linear-gradient(145deg, var(--card-light) 0%, var(--card) 100%); padding: 35px 30px; border-radius: 20px; text-align: center; border: 2px solid rgba(212,168,75,0.3); box-shadow: 0 0 50px rgba(212,168,75,0.2); max-width: 380px; width: 100%; }
.login-box .logo { font-size: 3rem; margin-bottom: 10px; }
.login-box h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.6rem; margin-bottom: 8px; }
.login-box p { color: #8a7a5a; margin-bottom: 25px; font-size: 0.85rem; }
.pin-inputs { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
.pin-input { width: 55px; height: 65px; border-radius: 12px; border: 2px solid var(--gold-dark); background: var(--dark); color: var(--gold); font-size: 1.8rem; font-weight: 700; text-align: center; }
.pin-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 20px rgba(212,168,75,0.4); }
.login-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); color: var(--dark); font-weight: 700; font-size: 1.05rem; cursor: pointer; box-shadow: 0 5px 0 var(--gold-dark); transition: all 0.2s; }
.login-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--gold-dark); }
.login-error { color: #f87171; margin-top: 15px; font-size: 0.85rem; display: none; }

/* ===== APP CONTAINER ===== */
.app-container { display: none; max-width: 480px; width: 100%; min-height: 100vh; background: linear-gradient(170deg, var(--dark) 0%, var(--brown) 40%, var(--brown-light) 100%); position: relative; }

/* ===== HEADER ===== */
.app-header { background: linear-gradient(180deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-dark) 100%); padding: 20px 20px 15px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.4); position: sticky; top: 0; z-index: 100; }
.app-header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--dark); font-weight: 900; }
.app-header .driver-info { font-size: 0.8rem; color: var(--brown); margin-top: 4px; font-weight: 600; }
.notification-toggle { position: absolute; top: 15px; right: 15px; width: 38px; height: 38px; border-radius: 50%; background: var(--card); border: 1px solid rgba(0,0,0,0.3); color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
.notification-toggle.active { background: #4ade80; color: var(--dark); }
.logout-btn { position: absolute; top: 15px; left: 15px; width: 38px; height: 38px; border-radius: 50%; background: var(--card); border: 1px solid rgba(0,0,0,0.3); color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }

/* ===== AVVISO IPHONE ===== */
.iphone-warning { background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%); color: var(--dark); padding: 10px 15px; text-align: center; font-size: 0.75rem; font-weight: 600; display: none; }
.iphone-warning.show { display: block; }

/* ===== TABS ===== */
.status-tabs { display: flex; background: var(--card); padding: 8px; gap: 6px; position: sticky; top: 78px; z-index: 99; border-bottom: 1px solid rgba(212,168,75,0.2); }
.status-tab { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid transparent; background: transparent; color: #8a7a5a; font-weight: 600; font-size: 0.75rem; cursor: pointer; text-align: center; transition: all 0.3s; }
.status-tab.active { background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); color: var(--dark); border-color: var(--gold-light); box-shadow: 0 0 10px rgba(212,168,75,0.3); }
.status-tab .count { display: inline-block; background: rgba(0,0,0,0.3); color: var(--cream); padding: 1px 7px; border-radius: 8px; font-size: 0.7rem; margin-left: 4px; }
.status-tab.active .count { background: rgba(0,0,0,0.3); color: var(--dark); }

/* ===== LISTA ORDINI ===== */
.orders-list { padding: 15px 15px 100px; }
.order-card { background: var(--card-light); border-radius: 14px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(212,168,75,0.2); border-left: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.order-card.new-available { border-left-color: #f87171; animation: pulseNew 2s infinite; }
.order-card.status-assigned { border-left-color: #60a5fa; }
.order-card.status-preparing { border-left-color: #fbbf24; animation: pulsePreparing 2s infinite; }
.order-card.status-ready { border-left-color: #4ade80; animation: pulseReady 2s infinite; }
.order-card.status-picked { border-left-color: #fbbf24; }
.order-card.status-delivering { border-left-color: #f39c12; animation: pulseGlow 2s infinite; }
@keyframes pulseNew { 0%,100% { box-shadow: 0 4px 15px rgba(0,0,0,0.3); } 50% { box-shadow: 0 4px 15px rgba(248,113,113,0.5); } }
@keyframes pulsePreparing { 0%,100% { box-shadow: 0 4px 15px rgba(0,0,0,0.3); } 50% { box-shadow: 0 4px 15px rgba(251,191,36,0.5); } }
@keyframes pulseReady { 0%,100% { box-shadow: 0 4px 15px rgba(0,0,0,0.3); } 50% { box-shadow: 0 4px 15px rgba(74,222,128,0.5); } }
@keyframes pulseGlow { 0%,100% { box-shadow: 0 4px 15px rgba(0,0,0,0.3); } 50% { box-shadow: 0 4px 15px rgba(243,156,18,0.6); } }

.order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(212,168,75,0.15); }
.order-id { color: var(--gold); font-weight: 700; font-size: 1rem; }
.order-time { color: #8a7a5a; font-size: 0.75rem; }
.order-status-msg { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; color: var(--cream); margin: 8px 0; font-weight: 600; text-align: center; border-left: 3px solid var(--gold); }
.customer-section { margin-bottom: 10px; }
.customer-name { color: var(--cream); font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
.customer-phone a { color: var(--gold); text-decoration: none; font-size: 0.85rem; font-weight: 600; background: rgba(212,168,75,0.15); padding: 5px 12px; border-radius: 20px; display: inline-block; margin-top: 4px; }
.address-section { background: rgba(0,0,0,0.25); padding: 10px; border-radius: 10px; margin-bottom: 10px; }
.address-text { color: var(--cream); font-size: 0.85rem; line-height: 1.4; margin-bottom: 8px; }
.map-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; border-radius: 8px; border: none; background: linear-gradient(180deg, #3498db 0%, #2980b9 100%); color: white; font-weight: 600; font-size: 0.85rem; cursor: pointer; text-decoration: none; box-shadow: 0 3px 0 #1c5980; }
.map-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1c5980; }
.notes-section { background: rgba(255,193,7,0.1); border-left: 3px solid var(--gold); padding: 8px 12px; border-radius: 6px; margin-bottom: 10px; color: var(--cream); font-size: 0.85rem; font-style: italic; }
.items-section { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 12px; }
.items-title { color: var(--gold); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
.items-list { color: var(--cream); font-size: 0.8rem; line-height: 1.6; }
.total-section { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px dashed rgba(212,168,75,0.3); margin-bottom: 12px; }
.total-label { color: #8a7a5a; font-size: 0.85rem; }
.total-value { color: var(--gold); font-weight: 700; font-size: 1.1rem; }

/* ===== PULSANTI AZIONE ===== */
.action-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; transition: all 0.2s; }
.action-btn:active { transform: translateY(2px); }
.btn-accept { background: linear-gradient(180deg, #4ade80 0%, #16a34a 100%); color: var(--dark); box-shadow: 0 4px 0 #166534; }
.btn-waiting { background: #555; color: #999; cursor: not-allowed; box-shadow: none; }
.btn-pickup { background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%); color: var(--dark); box-shadow: 0 4px 0 #92400e; }
.btn-pickup:disabled { background: #555; color: #999; cursor: not-allowed; box-shadow: none; }
.btn-delivering { background: linear-gradient(180deg, #f39c12 0%, #c77700 100%); color: white; box-shadow: 0 4px 0 #8a5500; }
.btn-delivered { background: linear-gradient(180deg, #4ade80 0%, #16a34a 100%); color: var(--dark); box-shadow: 0 4px 0 #166534; }
.btn-cancel { background: rgba(248,113,113,0.2); color: #f87171; border: 1px solid rgba(248,113,113,0.3); font-size: 0.8rem; padding: 10px; }

/* ===== EMPTY STATE ===== */
.empty-state { text-align: center; padding: 60px 20px; color: #8a7a5a; }
.empty-state i { font-size: 4rem; margin-bottom: 15px; display: block; opacity: 0.4; }
.empty-state h3 { color: var(--gold); font-family: 'Playfair Display', serif; margin-bottom: 8px; }
.empty-state p { font-size: 0.9rem; line-height: 1.5; }

/* ===== TOAST ===== */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--card); color: var(--gold); padding: 14px 25px; border-radius: 12px; font-weight: 600; z-index: 9999; opacity: 0; transition: all 0.3s; border: 1px solid rgba(212,168,75,0.3); max-width: 90%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== OFFLINE ===== */
.offline-banner { position: fixed; top: 0; left: 0; right: 0; background: #dc2626; color: white; text-align: center; padding: 10px; font-size: 0.85rem; font-weight: 700; z-index: 9999; display: none; }

/* ===== SCHERMATA ALLARME ===== */
.alarm-screen { display: none; position: fixed; inset: 0; background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%); z-index: 10000; align-items: center; justify-content: center; flex-direction: column; padding: 20px; animation: alarmPulse 1s infinite; }
.alarm-screen.show { display: flex; }
@keyframes alarmPulse { 0%,100% { background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%); } 50% { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); } }
.alarm-icon { font-size: 6rem; animation: shake 0.5s infinite; margin-bottom: 20px; }
@keyframes shake { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
.alarm-title { color: white; font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 900; text-align: center; margin-bottom: 15px; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
.alarm-info { color: white; font-size: 1.2rem; text-align: center; margin-bottom: 30px; opacity: 0.95; }
.alarm-btn { background: white; color: #dc2626; border: none; padding: 20px 50px; border-radius: 15px; font-weight: 900; font-size: 1.3rem; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.4); animation: btnPulse 1.5s infinite; }
@keyframes btnPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

/* ===== RESPONSIVE ===== */
@media (max-width: 360px) {
  .alarm-title { font-size: 2rem; }
  .alarm-btn { padding: 15px 30px; font-size: 1.1rem; }
}
</style>
</head>
<body>

<div class="offline-banner" id="offlineBanner">⚠️ Offline - Riconnessione...</div>

<!-- SCHERMATA ALLARME -->
<div class="alarm-screen" id="alarmScreen">
    <div class="alarm-icon"></div>
    <div class="alarm-title">NUOVO ORDINE!</div>
    <div class="alarm-info" id="alarmInfo">1 ordine disponibile per la consegna</div>
    <button class="alarm-btn" onclick="dismissAlarm()">️ VEDI ORDINI</button>
</div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="logo"></div>
    <h1>Area Fattorini</h1>
    <p>Antica Pizzeria Grasso</p>
    <div class="pin-inputs">
      <input type="tel" class="pin-input" maxlength="1" data-idx="0" inputmode="numeric" pattern="[0-9]*">
      <input type="tel" class="pin-input" maxlength="1" data-idx="1" inputmode="numeric" pattern="[0-9]*">
      <input type="tel" class="pin-input" maxlength="1" data-idx="2" inputmode="numeric" pattern="[0-9]*">
      <input type="tel" class="pin-input" maxlength="1" data-idx="3" inputmode="numeric" pattern="[0-9]*">
    </div>
    <button class="login-btn" onclick="checkPin()">Accedi</button>
    <div class="login-error" id="loginError">PIN errato. Riprova.</div>
  </div>
</div>

<!-- APP PRINCIPALE -->
<div class="app-container" id="appContainer">
  <header class="app-header">
    <button class="logout-btn" onclick="logout()" title="Esci"><i class="fas fa-sign-out-alt"></i></button>
    <h1>🛵 Fattorino</h1>
    <div class="driver-info" id="driverInfo">Caricamento...</div>
    <button class="notification-toggle active" id="notifToggle" onclick="toggleNotifications()" title="Suoni">
      <i class="fas fa-bell"></i>
    </button>
  </header>
  
  <div class="iphone-warning" id="iphoneWarning">
    ⚠️ iPhone: Tieni l'app aperta per ricevere notifiche
  </div>
  
  <div class="status-tabs">
    <button class="status-tab active" data-filter="available" onclick="setFilter('available', this)">
      📢 Disponibili <span class="count" id="countAvailable">0</span>
    </button>
    <button class="status-tab" data-filter="mine" onclick="setFilter('mine', this)">
       Le Mie <span class="count" id="countMine">0</span>
    </button>
  </div>
  
  <div class="orders-list" id="ordersList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIGURAZIONE FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyAw8pBS3gOpitVIArnWutBnwca3hXSWuVs",
  authDomain: "teogra-c8cf5.firebaseapp.com",
  databaseURL: "https://teogra-c8cf5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "teogra-c8cf5",
  storageBucket: "teogra-c8cf5.firebasestorage.app",
  messagingSenderId: "686300112893",
  appId: "1:686300112893:web:e147b82f91374f12db1b94"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== VARIABILI GLOBALI =====
let currentDriverPin = '';
let currentDriverName = '';
let currentFilter = 'available';
let allOrders = {};
let notificationsEnabled = true;
let audioCtx = null;
let alarmInterval = null;
let vibrationInterval = null;
let alarmActive = false;

// ===== GESTIONE PIN =====
document.querySelectorAll('.pin-input').forEach((input, idx, arr) => {
  input.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, '');
    if (e.target.value && idx < arr.length - 1) arr[idx + 1].focus();
    if (idx === arr.length - 1 && e.target.value) checkPin();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !e.target.value && idx > 0) arr[idx - 1].focus();
  });
  input.addEventListener('paste', (e) => {
    e.preventDefault();
    const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
    for (let i = 0; i < 4 && i < paste.length; i++) {
      arr[i].value = paste[i];
    }
    if (paste.length >= 4) arr[3].focus(), checkPin();
  });
});

function getPin() {
  return Array.from(document.querySelectorAll('.pin-input')).map(i => i.value).join('');
}

function checkPin() {
  const pin = getPin();
  if (pin.length !== 4) {
    document.getElementById('loginError').textContent = 'Inserisci 4 cifre';
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  db.ref(`drivers/${pin}`).once('value').then(s => {
    if (s.exists()) {
      currentDriverPin = pin;
      currentDriverName = s.val();
      sessionStorage.setItem('driverPin', pin);
      sessionStorage.setItem('driverName', s.val());
      enterApp();
    } else {
      document.getElementById('loginError').textContent = 'PIN non riconosciuto';
      document.getElementById('loginError').style.display = 'block';
      document.querySelectorAll('.pin-input').forEach(i => i.value = '');
      document.querySelector('.pin-input').focus();
    }
  }).catch(err => {
    document.getElementById('loginError').textContent = 'Errore connessione';
    document.getElementById('loginError').style.display = 'block';
  });
}

// ===== AVVIO =====
window.onload = function() {
  const savedPin = sessionStorage.getItem('driverPin');
  const savedName = sessionStorage.getItem('driverName');
  if (savedPin && savedName) {
    currentDriverPin = savedPin;
    currentDriverName = savedName;
    enterApp();
  } else {
    document.querySelector('.pin-input').focus();
  }
  
  window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
  window.addEventListener('online', () => document.getElementById('offlineBanner').style.display = 'none');
  
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  
  if (isIOS()) {
    setTimeout(() => document.getElementById('iphoneWarning').classList.add('show'), 1000);
  }
};

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) || 
         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function enterApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appContainer').style.display = 'block';
  document.getElementById('driverInfo').textContent = `👤 ${currentDriverName}`;
  
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { console.error('Audio non supportato', e); }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  
  startListening();
}

function logout() {
  if (confirm('Uscire dall\'app?')) {
    sessionStorage.clear();
    location.reload();
  }
}

// ===== LISTENER FIREBASE =====
function startListening() {
  db.ref('ordini').on('value', s => {
    allOrders = {};
    s.forEach(c => { allOrders[c.key] = { id: c.key, ...c.val() }; });
    renderOrders();
    checkForNewAvailableOrders();
  });
}

let previousAvailableCount = 0;

function checkForNewAvailableOrders() {
  const availableCount = getAvailableOrders().length;
  if (availableCount > previousAvailableCount && notificationsEnabled && !alarmActive) {
    triggerAlarm();
  }
  previousAvailableCount = availableCount;
}

// ===== FILTRI ORDINI =====
function getAvailableOrders() {
  // Ordini "new" senza assegnazione E SOLO di tipo consegna (niente ritiri)
  return Object.values(allOrders).filter(o => o.status === 'new' && !o.assignedTo && o.type === 'delivery');
}

function getMyOrders() {
  // Ordini assegnati a me, non ancora consegnati
  return Object.values(allOrders).filter(o => o.assignedTo === currentDriverPin && o.status !== 'delivered' && o.status !== 'rifiutato');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function updateCounts() {
  document.getElementById('countAvailable').textContent = getAvailableOrders().length;
  document.getElementById('countMine').textContent = getMyOrders().length;
}

// ===== ALLARME AGGRESSIVO =====
function triggerAlarm() {
  const count = getAvailableOrders().length;
  
  document.getElementById('alarmInfo').textContent = `${count} ordine/i disponibile/i per la consegna`;
  document.getElementById('alarmScreen').classList.add('show');
  alarmActive = true;
  
  if (navigator.vibrate) {
    navigator.vibrate([1000, 300, 1000, 300, 1000]);
    if (vibrationInterval) clearInterval(vibrationInterval);
    vibrationInterval = setInterval(() => {
      if (alarmActive && navigator.vibrate) {
        navigator.vibrate([1000, 300, 1000, 300, 1000]);
      }
    }, 3000);
  }
  
  if (audioCtx && audioCtx.state === 'running') {
    if (alarmInterval) clearInterval(alarmInterval);
    playAlarmSound();
    alarmInterval = setInterval(() => {
      if (alarmActive) playAlarmSound();
    }, 2000);
  }
  
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      const notif = new Notification('🚨 NUOVO ORDINE DISPONIBILE!', {
        body: `${count} ordine/i da accettare. Tocca per aprire!`,
        vibrate: [1000, 300, 1000, 300, 1000],
        requireInteraction: true,
        tag: 'new-order-' + Date.now()
      });
      notif.onclick = () => {
        window.focus();
        dismissAlarm();
        notif.close();
      };
    } catch(e) { console.log('Notifica non supportata'); }
  }
}

function playAlarmSound() {
  if (!audioCtx || !alarmActive) return;
  try {
    const now = audioCtx.currentTime;
    
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(800, now);
    osc1.frequency.linearRampToValueAtTime(1200, now + 0.3);
    osc1.frequency.linearRampToValueAtTime(800, now + 0.6);
    gain1.gain.setValueAtTime(0.5, now);
    gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
    osc1.start(now);
    osc1.stop(now + 0.8);
    
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(1000, now + 1);
    osc2.frequency.linearRampToValueAtTime(1500, now + 1.3);
    osc2.frequency.linearRampToValueAtTime(1000, now + 1.6);
    gain2.gain.setValueAtTime(0.4, now + 1);
    gain2.gain.exponentialRampToValueAtTime(0.01, now + 1.8);
    osc2.start(now + 1);
    osc2.stop(now + 1.8);
  } catch(e) { console.error('Audio error:', e); }
}

function dismissAlarm() {
  alarmActive = false;
  document.getElementById('alarmScreen').classList.remove('show');
  if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
  if (vibrationInterval) { clearInterval(vibrationInterval); vibrationInterval = null; }
  if (navigator.vibrate) navigator.vibrate(0);
  setFilter('available', document.querySelector('[data-filter="available"]'));
}

function toggleNotifications() {
  notificationsEnabled = !notificationsEnabled;
  const btn = document.getElementById('notifToggle');
  btn.classList.toggle('active', notificationsEnabled);
  showToast(notificationsEnabled ? '🔔 Allarmi attivati' : '🔕 Allarmi disattivati');
  if (!notificationsEnabled) dismissAlarm();
}

// ===== RENDER ORDINI =====
function renderOrders() {
  updateCounts();
  const list = document.getElementById('ordersList');
  
  let ordersToShow = [];
  if (currentFilter === 'available') {
    ordersToShow = getAvailableOrders().sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  } else {
    ordersToShow = getMyOrders().sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  }
  
  if (ordersToShow.length === 0) {
    const emptyMessages = {
      available: { icon: 'fa-inbox', title: 'Nessun ordine disponibile', text: 'Gli ordini nuovi appariranno qui con allarme! 🔔' },
      mine: { icon: 'fa-motorcycle', title: 'Nessuna consegna attiva', text: 'Accetta un ordine dalla lista Disponibili.' }
    };
    const msg = emptyMessages[currentFilter];
    list.innerHTML = `<div class="empty-state"><i class="fas ${msg.icon}"></i><h3>${msg.title}</h3><p>${msg.text}</p></div>`;
    return;
  }
  
  list.innerHTML = ordersToShow.map(o => {
    const dt = new Date(o.timestamp || 0);
    const timeStr = dt.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    const items = o.items && Array.isArray(o.items) ? o.items.map(i => `▸ ${i.name} ×${i.qty}`).join('<br>') : '';
    
    const status = o.status || 'new';
    const statusDriver = o.statusDriver || '';
    
    let statusClass = '';
    let statusMsg = '';
    let actionBtn = '';
    
    if (currentFilter === 'available') {
      // Tab DISPONIBILI: ordini "new" senza assegnazione
      statusClass = 'new-available';
      actionBtn = `<button class="action-btn btn-accept" onclick="acceptOrder('${o.id}')"><i class="fas fa-hand-holding"></i> Accetta Consegna</button>`;
    } else {
      // Tab LE MIE: ordini assegnati a me
      if (status === 'new') {
        statusClass = 'status-assigned';
        statusMsg = '⏳ In attesa che la pizzeria inizi a preparare...';
        actionBtn = `<button class="action-btn btn-waiting" disabled><i class="fas fa-hourglass-half"></i> In attesa preparazione</button>
                     <button class="action-btn btn-cancel" onclick="cancelAcceptance('${o.id}')">❌ Annulla Accettazione</button>`;
      } else if (status === 'preparing') {
        statusClass = 'status-preparing';
        statusMsg = '🍕 La pizzeria sta preparando il tuo ordine...';
        actionBtn = `<button class="action-btn btn-waiting" disabled><i class="fas fa-pizza-slice"></i> Preparazione in corso...</button>`;
      } else if (status === 'ready') {
        statusClass = 'status-ready';
        statusMsg = '✅ Ordine PRONTO! Vai a ritirarlo!';
        actionBtn = `<button class="action-btn btn-pickup" onclick="updateStatus('${o.id}','picked')"><i class="fas fa-box-open"></i> 📦 Ritirato dalla Pizzeria</button>`;
      } else if (status === 'picked') {
        statusClass = 'status-picked';
        statusMsg = ' Ordine ritirato. Ora parti per la consegna.';
        actionBtn = `<button class="action-btn btn-delivering" onclick="updateStatus('${o.id}','delivering')"><i class="fas fa-motorcycle"></i> 🛵 In Consegna</button>`;
      } else if (status === 'delivering') {
        statusClass = 'status-delivering';
        statusMsg = '🛵 In viaggio verso il cliente.';
        actionBtn = `<button class="action-btn btn-delivered" onclick="updateStatus('${o.id}','delivered')"><i class="fas fa-check-circle"></i> ✅ Consegnato</button>`;
      }
    }
    
    let mapLink = '';
    if (o.type === 'delivery' && o.address) {
      if (o.coordinates) {
        const [lat, lng] = o.coordinates.split(',');
        mapLink = `<a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving" target="_blank" class="map-btn"><i class="fas fa-map-marked-alt"></i> Naviga con Maps</a>`;
      } else {
        const addr = encodeURIComponent(o.address + ', Manfredonia');
        mapLink = `<a href="https://www.google.com/maps/search/?api=1&query=${addr}" target="_blank" class="map-btn"><i class="fas fa-map-marked-alt"></i> Naviga con Maps</a>`;
      }
    }
    
    return `<div class="order-card ${statusClass}">
      <div class="order-header">
        <span class="order-id">${o.orderId || o.id}</span>
        <span class="order-time">🕐 ${timeStr}</span>
      </div>
      ${statusMsg ? `<div class="order-status-msg">${statusMsg}</div>` : ''}
      <div class="customer-section">
        <div class="customer-name"><i class="fas fa-user" style="color:var(--gold);margin-right:6px;"></i>${o.customerName || 'N/D'}</div>
        <div class="customer-phone"><a href="tel:${o.customerPhone}"><i class="fas fa-phone"></i> ${o.customerPhone || 'N/D'}</a></div>
      </div>
      ${o.type === 'delivery' && o.address ? `<div class="address-section"><div class="address-text"><i class="fas fa-map-marker-alt" style="color:var(--gold);"></i> ${o.address}</div>${mapLink}</div>` : '<div class="address-section"><div class="address-text"><i class="fas fa-store" style="color:var(--gold);"></i> Ritiro in pizzeria</div></div>'}
      ${o.notes ? `<div class="notes-section"><i class="fas fa-sticky-note" style="color:var(--gold);"></i> ${o.notes}</div>` : ''}
      <div class="items-section">
        <div class="items-title"><i class="fas fa-receipt"></i> Prodotti</div>
        <div class="items-list">${items}</div>
      </div>
      <div class="total-section">
        <span class="total-label">Totale</span>
        <span class="total-value">€${(o.finalTotal || 0).toFixed(2)}</span>
      </div>
      ${actionBtn}
    </div>`;
  }).join('');
}

// ===== AZIONI =====
function acceptOrder(orderId) {
  const order = allOrders[orderId];
  if (!order || order.assignedTo) {
    showToast('⚠️ Ordine già accettato da un altro fattorino!');
    renderOrders();
    return;
  }
  
  // Controllo race condition con transaction
  db.ref(`ordini/${orderId}`).once('value').then(snap => {
    const current = snap.val();
    if (current.assignedTo) {
      showToast('⚠️ Ordine già preso!');
      renderOrders();
      return;
    }
    
    db.ref(`ordini/${orderId}`).update({
      assignedTo: currentDriverPin,
      assignedName: currentDriverName,
      statusDriver: 'accepted',
      acceptedAt: Date.now()
    }).then(() => {
      showToast('✅ Ordine accettato! Aspetta che preparino.');
      dismissAlarm();
      renderOrders();
      setTimeout(() => {
        setFilter('mine', document.querySelector('[data-filter="mine"]'));
      }, 1500);
    }).catch(e => {
      showToast('❌ Errore: ' + e.message);
    });
  });
}

function cancelAcceptance(orderId) {
  if (!confirm('Annullare accettazione?\nL\'ordine tornerà disponibile per altri fattorini.')) return;
  
  db.ref(`ordini/${orderId}`).update({
    assignedTo: null,
    assignedName: null,
    statusDriver: null,
    acceptedAt: null
  }).then(() => {
    showToast('🗑️ Accettazione annullata');
    renderOrders();
  });
}

function updateStatus(orderId, newStatus) {
  const updates = { status: newStatus };
  
  if (newStatus === 'picked') {
    updates.pickedAt = Date.now();
    updates.pickedBy = currentDriverName;
  } else if (newStatus === 'delivering') {
    updates.deliveringAt = Date.now();
  } else if (newStatus === 'delivered') {
    updates.deliveredAt = Date.now();
    updates.deliveredBy = currentDriverPin;
    updates.deliveredByName = currentDriverName;
  }
  
  db.ref(`ordini/${orderId}`).update(updates).then(() => {
    const msgs = {
      picked: ' Ordine ritirato!',
      delivering: '🛵 In consegna!',
      delivered: '🎉 Consegnato con successo!'
    };
    showToast(msgs[newStatus] || 'Aggiornato');
    renderOrders();
  }).catch(e => showToast('❌ Errore: ' + e.message));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
