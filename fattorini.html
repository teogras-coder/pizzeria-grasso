<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fattorini - Antica Pizzeria Grasso</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root { --gold: #d4a84b; --gold-light: #f0d78c; --gold-dark: #b8860b; --dark: #1a1209; --brown: #2d1f12; --brown-light: #4a3728; --card: #2a1e13; --card-light: #3d2b1a; --cream: #f5e6c8; --shadow: #0a0704; }
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--dark); font-family: 'Montserrat', sans-serif; }
body { display: flex; justify-content: center; }

/* LOGIN */
.login-screen { position: fixed; inset: 0; background: linear-gradient(170deg, var(--dark) 0%, var(--brown) 50%, var(--brown-light) 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.login-box { background: linear-gradient(145deg, var(--card-light) 0%, var(--card) 100%); padding: 35px 30px; border-radius: 20px; text-align: center; border: 2px solid rgba(212,168,75,0.3); box-shadow: 0 0 50px rgba(212,168,75,0.2); max-width: 380px; width: 100%; }
.login-box .logo { font-size: 3rem; margin-bottom: 10px; }
.login-box h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.6rem; margin-bottom: 8px; text-shadow: 0 0 15px rgba(212,168,75,0.4); }
.login-box p { color: #8a7a5a; margin-bottom: 25px; font-size: 0.85rem; }
.pin-inputs { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
.pin-input { width: 55px; height: 65px; border-radius: 12px; border: 2px solid var(--gold-dark); background: var(--dark); color: var(--gold); font-size: 1.8rem; font-weight: 700; text-align: center; transition: all 0.3s; }
.pin-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 20px rgba(212,168,75,0.4); }
.login-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); color: var(--dark); font-weight: 700; font-size: 1.05rem; cursor: pointer; box-shadow: 0 5px 0 var(--gold-dark); transition: all 0.3s; }
.login-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--gold-dark); }
.login-error { color: #f87171; margin-top: 15px; font-size: 0.85rem; display: none; }

/* APP */
.app-container { display: none; max-width: 480px; width: 100%; min-height: 100vh; background: linear-gradient(170deg, var(--dark) 0%, var(--brown) 40%, var(--brown-light) 100%); position: relative; }

/* HEADER */
.app-header { background: linear-gradient(180deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-dark) 100%); padding: 20px 20px 15px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.4); position: sticky; top: 0; z-index: 100; }
.app-header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--dark); font-weight: 900; }
.app-header .driver-info { font-size: 0.8rem; color: var(--brown); margin-top: 4px; font-weight: 600; }
.notification-toggle { position: absolute; top: 15px; right: 15px; width: 38px; height: 38px; border-radius: 50%; background: var(--card); border: 1px solid rgba(0,0,0,0.3); color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.notification-toggle.active { background: #4ade80; color: var(--dark); border-color: #22c55e; }

/* TABS */
.status-tabs { display: flex; background: var(--card); padding: 8px; gap: 6px; position: sticky; top: 78px; z-index: 99; border-bottom: 1px solid rgba(212,168,75,0.2); }
.status-tab { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid transparent; background: transparent; color: #8a7a5a; font-weight: 600; font-size: 0.75rem; cursor: pointer; text-align: center; transition: all 0.3s; }
.status-tab.active { background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); color: var(--dark); border-color: var(--gold-light); box-shadow: 0 0 15px rgba(212,168,75,0.4); }
.status-tab .count { display: inline-block; background: rgba(0,0,0,0.3); color: var(--cream); padding: 1px 7px; border-radius: 8px; font-size: 0.7rem; margin-left: 4px; }
.status-tab.active .count { background: rgba(0,0,0,0.3); color: var(--dark); }

/* ORDERS */
.orders-list { padding: 15px 15px 100px; }
.order-card { background: var(--card-light); border-radius: 14px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(212,168,75,0.2); border-left: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.order-card.new-available { border-left-color: #f87171; animation: pulseNew 2s infinite; }
.order-card.status-accepted { border-left-color: #60a5fa; }
.order-card.status-picked { border-left-color: #fbbf24; }
.order-card.status-delivering { border-left-color: #f39c12; animation: pulseGlow 2s infinite; }

@keyframes pulseNew { 0%,100% { box-shadow: 0 4px 15px rgba(0,0,0,0.3); } 50% { box-shadow: 0 4px 15px rgba(248,113,113,0.5); } }
@keyframes pulseGlow { 0%,100% { box-shadow: 0 4px 15px rgba(0,0,0,0.3); } 50% { box-shadow: 0 4px 15px rgba(243,156,18,0.6); } }

.order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(212,168,75,0.15); }
.order-id { color: var(--gold); font-weight: 700; font-size: 1rem; }
.order-time { color: #8a7a5a; font-size: 0.75rem; }
.customer-section { margin-bottom: 10px; }
.customer-name { color: var(--cream); font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
.customer-phone { display: flex; align-items: center; gap: 8px; }
.customer-phone a { color: var(--gold); text-decoration: none; font-size: 0.85rem; font-weight: 600; background: rgba(212,168,75,0.15); padding: 5px 12px; border-radius: 20px; }
.address-section { background: rgba(0,0,0,0.25); padding: 10px; border-radius: 10px; margin-bottom: 10px; }
.address-text { color: var(--cream); font-size: 0.85rem; line-height: 1.4; margin-bottom: 8px; }
.map-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 8px; border-radius: 8px; border: none; background: linear-gradient(180deg, #3498db 0%, #2980b9 100%); color: white; font-weight: 600; font-size: 0.85rem; cursor: pointer; text-decoration: none; }
.notes-section { background: rgba(255,193,7,0.1); border-left: 3px solid var(--gold); padding: 8px 12px; border-radius: 6px; margin-bottom: 10px; color: var(--cream); font-size: 0.85rem; font-style: italic; }
.items-section { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 12px; }
.items-title { color: var(--gold); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
.items-list { color: var(--cream); font-size: 0.8rem; line-height: 1.6; }
.total-section { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px dashed rgba(212,168,75,0.3); margin-bottom: 12px; }
.total-label { color: #8a7a5a; font-size: 0.85rem; }
.total-value { color: var(--gold); font-weight: 700; font-size: 1.1rem; text-shadow: 0 0 5px rgba(212,168,75,0.3); }

/* ACTION BUTTONS */
.action-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.5px; }
.btn-accept { background: linear-gradient(180deg, #4ade80 0%, #16a34a 100%); color: var(--dark); box-shadow: 0 4px 0 #166534; }
.btn-accept:active { transform: translateY(2px); box-shadow: 0 2px 0 #166534; }
.btn-pickup { background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%); color: var(--dark); box-shadow: 0 4px 0 #92400e; }
.btn-pickup:active { transform: translateY(2px); box-shadow: 0 2px 0 #92400e; }
.btn-delivering { background: linear-gradient(180deg, #f39c12 0%, #c77700 100%); color: white; box-shadow: 0 4px 0 #8a5500; }
.btn-delivering:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a5500; }
.btn-delivered { background: linear-gradient(180deg, #4ade80 0%, #16a34a 100%); color: var(--dark); box-shadow: 0 4px 0 #166534; }
.btn-delivered:active { transform: translateY(2px); box-shadow: 0 2px 0 #166534; }
.btn-cancel { background: rgba(248,113,113,0.2); color: #f87171; border: 1px solid rgba(248,113,113,0.3); margin-top: 8px; font-size: 0.8rem; padding: 10px; }

/* EMPTY */
.empty-state { text-align: center; padding: 60px 20px; color: #8a7a5a; }
.empty-state i { font-size: 4rem; margin-bottom: 15px; display: block; opacity: 0.4; }
.empty-state h3 { color: var(--gold); font-family: 'Playfair Display', serif; margin-bottom: 8px; }
.empty-state p { font-size: 0.9rem; line-height: 1.5; }

/* TOAST */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--card); color: var(--gold); padding: 14px 25px; border-radius: 12px; font-weight: 600; z-index: 9999; opacity: 0; transition: all 0.3s; border: 1px solid rgba(212,168,75,0.3); box-shadow: 0 0 30px rgba(212,168,75,0.3); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* OFFLINE */
.offline-banner { position: fixed; top: 0; left: 0; right: 0; background: #dc2626; color: white; text-align: center; padding: 10px; font-size: 0.85rem; font-weight: 700; z-index: 9999; display: none; }
</style>
</head>
<body>

<div class="offline-banner" id="offlineBanner">⚠️ Offline - Riconnessione...</div>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="logo"></div>
    <h1>Area Fattorini</h1>
    <p>Antica Pizzeria Grasso</p>
    <div class="pin-inputs">
      <input type="tel" class="pin-input" maxlength="1" data-idx="0" inputmode="numeric">
      <input type="tel" class="pin-input" maxlength="1" data-idx="1" inputmode="numeric">
      <input type="tel" class="pin-input" maxlength="1" data-idx="2" inputmode="numeric">
      <input type="tel" class="pin-input" maxlength="1" data-idx="3" inputmode="numeric">
    </div>
    <button class="login-btn" onclick="checkPin()">Accedi</button>
    <div class="login-error" id="loginError">PIN errato. Riprova.</div>
  </div>
</div>

<!-- APP -->
<div class="app-container" id="appContainer">
  <header class="app-header">
    <h1>🛵 Fattorino</h1>
    <div class="driver-info" id="driverInfo">Caricamento...</div>
    <button class="notification-toggle" id="notifToggle" onclick="toggleNotifications()" title="Attiva/Disattiva Suoni">
      <i class="fas fa-bell"></i>
    </button>
  </header>
  
  <div class="status-tabs">
    <button class="status-tab active" data-filter="available" onclick="setFilter('available', this)">
      📢 Disponibili <span class="count" id="countAvailable">0</span>
    </button>
    <button class="status-tab" data-filter="mine" onclick="setFilter('mine', this)">
      🛵 Le Mie <span class="count" id="countMine">0</span>
    </button>
  </div>
  
  <div class="orders-list" id="ordersList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const firebaseConfig = { apiKey: "AIzaSyAw8pBS3gOpitVIArnWutBnwca3hXSWuVs", authDomain: "teogra-c8cf5.firebaseapp.com", databaseURL: "https://teogra-c8cf5-default-rtdb.europe-west1.firebasedatabase.app", projectId: "teogra-c8cf5", storageBucket: "teogra-c8cf5.firebasestorage.app", messagingSenderId: "686300112893", appId: "1:686300112893:web:e147b82f91374f12db1b94" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentDriverPin = '';
let currentDriverName = '';
let currentFilter = 'available';
let allOrders = {};
let notificationsEnabled = true;
let audioCtx = null;
let alarmInterval = null;

// PIN INPUT NAVIGATION
document.querySelectorAll('.pin-input').forEach((input, idx, arr) => {
  input.addEventListener('input', (e) => {
    if (e.target.value && idx < arr.length - 1) arr[idx + 1].focus();
    if (idx === arr.length - 1 && e.target.value) checkPin();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !e.target.value && idx > 0) arr[idx - 1].focus();
  });
});

function getPin() {
  return Array.from(document.querySelectorAll('.pin-input')).map(i => i.value).join('');
}

function checkPin() {
  const pin = getPin();
  if (pin.length !== 4) {
    document.getElementById('loginError').textContent = 'Inserisci 4 cifre';
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  db.ref(`drivers/${pin}`).once('value').then(s => {
    if (s.exists()) {
      currentDriverPin = pin;
      currentDriverName = s.val();
      sessionStorage.setItem('driverPin', pin);
      sessionStorage.setItem('driverName', s.val());
      enterApp();
    } else {
      document.getElementById('loginError').textContent = 'PIN errato';
      document.getElementById('loginError').style.display = 'block';
      document.querySelectorAll('.pin-input').forEach(i => i.value = '');
      document.querySelector('.pin-input').focus();
    }
  });
}

// AUTO-LOGIN
window.onload = function() {
  const savedPin = sessionStorage.getItem('driverPin');
  const savedName = sessionStorage.getItem('driverName');
  if (savedPin && savedName) {
    currentDriverPin = savedPin;
    currentDriverName = savedName;
    enterApp();
  } else {
    document.querySelector('.pin-input').focus();
  }
  window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
  window.addEventListener('online', () => document.getElementById('offlineBanner').style.display = 'none');
  
  // Richiedi permesso notifiche
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
};

function enterApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appContainer').style.display = 'block';
  document.getElementById('driverInfo').textContent = `👤 ${currentDriverName}`;
  
  // Inizializza Audio Context (serve interazione utente)
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  startListening();
}

function startListening() {
  db.ref('ordini').on('value', s => {
    allOrders = {};
    s.forEach(c => { allOrders[c.key] = { id: c.key, ...c.val() }; });
    renderOrders();
    checkForNewAvailableOrders();
  });
}

let previousAvailableCount = 0;

function checkForNewAvailableOrders() {
  const availableCount = getAvailableOrders().length;
  if (availableCount > previousAvailableCount && notificationsEnabled) {
    triggerAlarm();
  }
  previousAvailableCount = availableCount;
}

function getAvailableOrders() {
  // Ordini pronti, non ancora assegnati a nessuno
  return Object.values(allOrders).filter(o => o.status === 'ready' && !o.assignedTo);
}

function getMyOrders() {
  // Ordini accettati da me
  return Object.values(allOrders).filter(o => o.assignedTo === currentDriverPin && o.status !== 'delivered');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function updateCounts() {
  document.getElementById('countAvailable').textContent = getAvailableOrders().length;
  document.getElementById('countMine').textContent = getMyOrders().length;
}

// ============================================
// 🔔 SISTEMA ALLARME (SUONO + VIBRAZIONE + NOTIFICA)
// ============================================
function triggerAlarm() {
  // 1. Vibrazione (pattern: vibro-pausa-vibro-pausa-lunga)
  if (navigator.vibrate) {
    navigator.vibrate([500, 200, 500, 200, 1000, 200, 500]);
  }
  
  // 2. Suono Allarme (Web Audio API - non serve file esterno)
  if (audioCtx && audioCtx.state === 'running') {
    playAlarmSound();
    // Ripeti l'allarme 3 volte
    let count = 0;
    if (alarmInterval) clearInterval(alarmInterval);
    alarmInterval = setInterval(() => {
      playAlarmSound();
      count++;
      if (count >= 3) clearInterval(alarmInterval);
    }, 1500);
  }
  
  // 3. Notifica Browser (funziona a schermo bloccato!)
  if ('Notification' in window && Notification.permission === 'granted') {
    const count = getAvailableOrders().length;
    const notif = new Notification(' NUOVO ORDINE DISPONIBILE!', {
      body: `${count} ordine/i pronto/i per la consegna. Tocca per aprire!`,
      icon: 'https://pizzeriagrasso.vercel.app/icon-192.png',
      badge: 'https://pizzeriagrasso.vercel.app/icon-192.png',
      vibrate: [500, 200, 500],
      sound: 'default',
      requireInteraction: true // Resta visibile finché non si clicca
    });
    notif.onclick = () => {
      window.focus();
      setFilter('available', document.querySelector('[data-filter="available"]'));
      notif.close();
    };
  }
}

function playAlarmSound() {
  if (!audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    // Suono tipo "campanello" acuto
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now); // La5
    osc.frequency.setValueAtTime(1100, now + 0.1); // Do6
    
    gain.gain.setValueAtTime(0.8, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
    
    osc.start(now);
    osc.stop(now + 0.5);
  } catch(e) { console.error('Audio error:', e); }
}

function toggleNotifications() {
  notificationsEnabled = !notificationsEnabled;
  const btn = document.getElementById('notifToggle');
  btn.classList.toggle('active', notificationsEnabled);
  showToast(notificationsEnabled ? '🔔 Allarmi attivati' : '🔕 Allarmi disattivati');
}

// ============================================
// RENDER ORDINI
// ============================================
function renderOrders() {
  updateCounts();
  const list = document.getElementById('ordersList');
  
  let ordersToShow = [];
  if (currentFilter === 'available') {
    ordersToShow = getAvailableOrders().sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  } else {
    ordersToShow = getMyOrders().sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  }
  
  if (ordersToShow.length === 0) {
    const emptyMessages = {
      available: { icon: 'fa-inbox', title: 'Nessun ordine disponibile', text: 'Gli ordini pronti appariranno qui. Attendi il suono!' },
      mine: { icon: 'fa-motorcycle', title: 'Nessuna consegna attiva', text: 'Accetta un ordine dalla lista Disponibili per vederlo qui.' }
    };
    const msg = emptyMessages[currentFilter];
    list.innerHTML = `<div class="empty-state"><i class="fas ${msg.icon}"></i><h3>${msg.title}</h3><p>${msg.text}</p></div>`;
    return;
  }
  
  list.innerHTML = ordersToShow.map(o => {
    const dt = new Date(o.timestamp || 0);
    const timeStr = dt.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    const items = o.items && Array.isArray(o.items) ? o.items.map(i => `▸ ${i.name} ×${i.qty}`).join('<br>') : '';
    
    const statusDriver = o.statusDriver || 'pending';
    const statusClass = o.status === 'ready' && !o.assignedTo ? 'new-available' : `status-${statusDriver}`;
    
    let actionBtn = '';
    if (currentFilter === 'available') {
      actionBtn = `<button class="action-btn btn-accept" onclick="acceptOrder('${o.id}')"><i class="fas fa-hand-holding"></i> Accetta Consegna</button>`;
    } else {
      if (statusDriver === 'accepted' || !statusDriver) {
        actionBtn = `<button class="action-btn btn-pickup" onclick="updateStatus('${o.id}','picked')"><i class="fas fa-pizza-slice"></i> Ritirato dalla Pizzeria</button>
                     <button class="action-btn btn-cancel" onclick="cancelAcceptance('${o.id}')">❌ Annulla Accettazione</button>`;
      } else if (statusDriver === 'picked') {
        actionBtn = `<button class="action-btn btn-delivering" onclick="updateStatus('${o.id}','delivering')"><i class="fas fa-motorcycle"></i> In Consegna</button>`;
      } else if (statusDriver === 'delivering') {
        actionBtn = `<button class="action-btn btn-delivered" onclick="updateStatus('${o.id}','delivered')"><i class="fas fa-check-circle"></i> Consegnato</button>`;
      }
    }
    
    let mapLink = '';
    if (o.type === 'delivery' && o.coordinates) {
      const [lat, lng] = o.coordinates.split(',');
      mapLink = `<a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving" target="_blank" class="map-btn"><i class="fas fa-map-marked-alt"></i> Naviga con Maps</a>`;
    } else if (o.type === 'delivery' && o.address) {
      const addr = encodeURIComponent(o.address + ', Manfredonia');
      mapLink = `<a href="https://www.google.com/maps/search/?api=1&query=${addr}" target="_blank" class="map-btn"><i class="fas fa-map-marked-alt"></i> Naviga con Maps</a>`;
    }
    
    return `<div class="order-card ${statusClass}">
      <div class="order-header">
        <span class="order-id">${o.orderId || o.id}</span>
        <span class="order-time">🕐 ${timeStr}</span>
      </div>
      <div class="customer-section">
        <div class="customer-name"><i class="fas fa-user" style="color:var(--gold);margin-right:6px;"></i>${o.customerName || 'N/D'}</div>
        <div class="customer-phone"><a href="tel:${o.customerPhone}"><i class="fas fa-phone"></i> ${o.customerPhone || 'N/D'}</a></div>
      </div>
      ${o.type === 'delivery' && o.address ? `<div class="address-section"><div class="address-text"><i class="fas fa-map-marker-alt" style="color:var(--gold);"></i> ${o.address}</div>${mapLink}</div>` : '<div class="address-section"><div class="address-text"><i class="fas fa-store" style="color:var(--gold);"></i> Ritiro in pizzeria</div></div>'}
      ${o.notes ? `<div class="notes-section"><i class="fas fa-sticky-note" style="color:var(--gold);"></i> ${o.notes}</div>` : ''}
      <div class="items-section">
        <div class="items-title"><i class="fas fa-receipt"></i> Prodotti</div>
        <div class="items-list">${items}</div>
      </div>
      <div class="total-section">
        <span class="total-label">Totale</span>
        <span class="total-value">€${(o.finalTotal || 0).toFixed(2)}</span>
      </div>
      ${actionBtn}
    </div>`;
  }).join('');
}

// ============================================
// AZIONI
// ============================================
function acceptOrder(orderId) {
  // Controllo se è ancora disponibile (per evitare race condition)
  const order = allOrders[orderId];
  if (!order || order.assignedTo) {
    showToast('⚠️ Ordine già accettato da un altro fattorino!');
    renderOrders();
    return;
  }
  
  db.ref(`ordini/${orderId}`).update({
    assignedTo: currentDriverPin,
    assignedName: currentDriverName,
    statusDriver: 'accepted',
    acceptedAt: Date.now()
  }).then(() => {
    showToast('✅ Ordine accettato! Vai su "Le Mie"');
    renderOrders();
    if (alarmInterval) clearInterval(alarmInterval);
  }).catch(e => showToast('❌ Errore: ' + e.message));
}

function cancelAcceptance(orderId) {
  if (!confirm('Sei sicuro di voler annullare? L\'ordine tornerà disponibile per altri fattorini.')) return;
  
  db.ref(`ordini/${orderId}`).update({
    assignedTo: null,
    assignedName: null,
    statusDriver: null,
    acceptedAt: null
  }).then(() => {
    showToast('🗑️ Accettazione annullata');
    renderOrders();
  });
}

function updateStatus(orderId, newStatus) {
  const updates = { statusDriver: newStatus };
  
  if (newStatus === 'delivered') {
    updates.status = 'delivered';
    updates.deliveredAt = Date.now();
    updates.deliveredBy = currentDriverPin;
  }
  
  db.ref(`ordini/${orderId}`).update(updates).then(() => {
    const msgs = {
      picked: '✅ Ordine ritirato!',
      delivering: ' In consegna!',
      delivered: ' Consegnato con successo!'
    };
    showToast(msgs[newStatus]);
    renderOrders();
  }).catch(e => showToast('❌ Errore: ' + e.message));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
