<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grasso Delivery - Fattorini</title>
<style>
:root {
--primary: #D48806; --primary-dark: #B87305;
--bg: #1a1a1a; --card: #2a2a2a; --text: #fff; --text-secondary: #b0b0b0;
--success: #28a745; --warning: #ffc107; --danger: #dc3545;
--pending: #ff9800; --accepted: #2196f3; --delivered: #4caf50;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 1.3em; margin-bottom: 3px; }
.header p { font-size: 0.85em; opacity: 0.9; }
.logout-btn { position: absolute; right: 15px; top: 15px; background: rgba(0,0,0,0.3); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85em; }
.container { max-width: 600px; margin: 0 auto; padding: 15px; }
/* Login */
.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
.login-box { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; }
.login-box .logo { font-size: 3em; margin-bottom: 10px; }
.login-box h2 { margin-bottom: 20px; color: var(--primary); }
.pin-input { width: 100%; padding: 15px; font-size: 1.5em; text-align: center; letter-spacing: 10px; border: 2px solid var(--primary); border-radius: 10px; background: var(--bg); color: var(--text); margin-bottom: 15px; }
.pin-input:focus { outline: none; border-color: var(--primary-dark); }
.btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 1em; font-weight: bold; cursor: pointer; }
.btn-primary { background: var(--primary); color: white; }
.btn-success { background: var(--success); color: white; }
.btn-warning { background: var(--warning); color: #000; }
.btn-danger { background: var(--danger); color: white; }
.btn-sm { padding: 10px; font-size: 0.9em; width: auto; }
/* Dashboard */
.dashboard { display: none; }
.stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--card); padding: 15px; border-radius: 10px; text-align: center; }
.stat-card .number { font-size: 2em; font-weight: bold; color: var(--primary); }
.stat-card .label { font-size: 0.85em; color: var(--text-secondary); }
.filter-tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
.filter-tab { padding: 8px 15px; border-radius: 20px; border: none; background: var(--card); color: var(--text-secondary); cursor: pointer; white-space: nowrap; font-size: 0.9em; }
.filter-tab.active { background: var(--primary); color: white; }
.order-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--pending); cursor: pointer; }
.order-card.status-accepted { border-left-color: var(--accepted); }
.order-card.status-delivered { border-left-color: var(--delivered); }
.order-card.status-cancelled { border-left-color: var(--cancelled); }
.order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.order-id { font-weight: bold; color: var(--primary); }
.order-time { font-size: 0.85em; color: var(--text-secondary); }
.order-customer { font-size: 1.1em; margin-bottom: 8px; }
.order-address { color: var(--text-secondary); font-size: 0.9em; margin-bottom: 8px; }
.order-items { background: var(--bg); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9em; }
.order-total { font-size: 1.2em; font-weight: bold; color: var(--success); text-align: right; margin-bottom: 10px; }
.order-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.order-actions .btn { flex: 1; min-width: 120px; }
.status-badge { display: inline-block; padding: 4px 10px; border-radius: 15px; font-size: 0.8em; font-weight: bold; }
.status-pending { background: rgba(255,152,0,0.2); color: var(--pending); }
.status-accepted { background: rgba(33,150,243,0.2); color: var(--accepted); }
.status-delivered { background: rgba(76,175,80,0.2); color: var(--delivered); }
.empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
.empty-state .icon { font-size: 3em; margin-bottom: 15px; }
.new-order-alert { position: fixed; top: 80px; right: 15px; background: var(--danger); color: white; padding: 15px 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: pulse 1s infinite; z-index: 1000; display: none; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; justify-content: center; align-items: center; padding: 15px; }
.modal-overlay.active { display: flex; }
.modal-content { background: var(--card); border-radius: 15px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 20px; }
.modal-close { float: right; background: none; border: none; color: var(--text); font-size: 1.5em; cursor: pointer; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
<button class="logout-btn" onclick="logout()">🚪 Esci</button>
<h1>🛵 Grasso Delivery</h1>
<p>App Fattorini - Antica Pizzeria Grasso</p>
</div>

<div class="new-order-alert" id="newOrderAlert">🔔 Nuovo Ordine!</div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
<div class="login-box">
<div class="logo">🛵</div>
<h2>Accesso Fattorini</h2>
<p style="margin-bottom:15px; color:var(--text-secondary)">Inserisci il tuo PIN</p>
<input type="password" class="pin-input" id="pinInput" maxlength="6" placeholder="••••" inputmode="numeric">
<button class="btn btn-primary" onclick="login()">Accedi</button>
<p style="margin-top:15px; font-size:0.8em; color:var(--text-secondary)">PIN predefinito: 1234</p>
</div>
</div>

<!-- DASHBOARD -->
<div class="container dashboard" id="dashboard">
<div class="stats">
<div class="stat-card"><div class="number" id="pendingCount">0</div><div class="label">In Attesa</div></div>
<div class="stat-card"><div class="number" id="myCount">0</div><div class="label">Miei Ordini</div></div>
<div class="stat-card"><div class="number" id="deliveredCount">0</div><div class="label">Consegnati</div></div>
<div class="stat-card"><div class="number" id="todayTotal">€0</div><div class="label">Totale Oggi</div></div>
</div>
<div class="filter-tabs">
<button class="filter-tab active" onclick="filterOrders('all')">Tutti</button>
<button class="filter-tab" onclick="filterOrders('pending')">In Attesa</button>
<button class="filter-tab" onclick="filterOrders('accepted')">Miei</button>
<button class="filter-tab" onclick="filterOrders('delivered')">Consegnati</button>
</div>
<div id="ordersContainer">
<div class="empty-state"><div class="icon">📦</div><p>Nessun ordine al momento</p></div>
</div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
<div class="modal-content">
<button class="modal-close" onclick="closeModal()">&times;</button>
<div id="modalBody"></div>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// 🔥 CONFIGURAZIONE FIREBASE - STESSA DI index.html
const firebaseConfig = {
apiKey: "LA_TUA_API_KEY_QUI",
authDomain: "TUO_PROGETTO.firebaseapp.com",
databaseURL: "https://TUO_PROGETTO-default-rtdb.firebaseio.com",
projectId: "TUO_PROGETTO",
storageBucket: "TUO_PROGETTO.appspot.com",
messagingSenderId: "TUO_SENDER_ID",
appId: "TUO_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;
let currentFilter = 'all';
let ordersData = {};
let audioContext = null;

// 🔊 Suono notifica
function playNotificationSound() {
try {
if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
const osc = audioContext.createOscillator(), gain = audioContext.createGain();
osc.connect(gain); gain.connect(audioContext.destination);
osc.frequency.value = 800; osc.type = 'sine'; gain.gain.value = 0.3;
osc.start(); setTimeout(() => osc.stop(), 200);
setTimeout(() => {
const osc2 = audioContext.createOscillator(), gain2 = audioContext.createGain();
osc2.connect(gain2); gain2.connect(audioContext.destination);
osc2.frequency.value = 1000; osc2.type = 'sine'; gain2.gain.value = 0.3;
osc2.start(); setTimeout(() => osc2.stop(), 200);
}, 300);
} catch(e) {}
}

// 🔐 Login
function login() {
const pin = document.getElementById('pinInput').value;
const validPins = ['1234', '123456']; // Modifica qui i PIN fattorini
if (validPins.includes(pin)) {
currentUser = 'fattorino_' + Date.now();
localStorage.setItem('grasso_fattorino_session', currentUser);
document.getElementById('loginScreen').style.display = 'none';
document.getElementById('dashboard').style.display = 'block';
initDashboard();
} else { alert('PIN non valido!'); document.getElementById('pinInput').value = ''; }
}
function logout() { localStorage.removeItem('grasso_fattorino_session'); location.reload(); }

// ✅ Controlla sessione
if (localStorage.getItem('grasso_fattorino_session')) {
currentUser = localStorage.getItem('grasso_fattorino_session');
document.getElementById('loginScreen').style.display = 'none';
document.getElementById('dashboard').style.display = 'block';
initDashboard();
}

// 📊 Dashboard
function initDashboard() {
db.ref('orders').on('value', snapshot => {
ordersData = snapshot.val() || {};
renderOrders(); updateStats(); checkNewOrders();
});
}
let lastOrderCount = 0;
function checkNewOrders() {
const pending = Object.values(ordersData).filter(o => o.status === 'pending');
if (pending.length > lastOrderCount && lastOrderCount > 0) {
playNotificationSound();
const alert = document.getElementById('newOrderAlert');
alert.style.display = 'block';
setTimeout(() => alert.style.display = 'none', 3000);
}
if (lastOrderCount === 0) lastOrderCount = pending.length;
}
function updateStats() {
const all = Object.values(ordersData);
const today = new Date().toDateString();
const todayOrders = all.filter(o => new Date(o.timestamp || Date.now()).toDateString() === today);
document.getElementById('pendingCount').textContent = all.filter(o => o.status === 'pending').length;
document.getElementById('myCount').textContent = all.filter(o => o.assignedTo === currentUser && o.status === 'accepted').length;
document.getElementById('deliveredCount').textContent = todayOrders.filter(o => o.status === 'delivered').length;
const total = todayOrders.filter(o => o.status === 'delivered').reduce((sum, o) => sum + (o.total || 0), 0);
document.getElementById('todayTotal').textContent = '€' + total.toFixed(2);
}
function filterOrders(filter) {
currentFilter = filter;
document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
event.target.classList.add('active');
renderOrders();
}
function renderOrders() {
const container = document.getElementById('ordersContainer');
let orders = Object.entries(ordersData).map(([id, data]) => ({id, ...data}));
if (currentFilter === 'pending') orders = orders.filter(o => o.status === 'pending');
else if (currentFilter === 'accepted') orders = orders.filter(o => o.assignedTo === currentUser && o.status === 'accepted');
else if (currentFilter === 'delivered') orders = orders.filter(o => o.status === 'delivered');
orders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
if (orders.length === 0) {
container.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>Nessun ordine in questa categoria</p></div>';
return;
}
container.innerHTML = orders.map(order => `
<div class="order-card status-${order.status}" onclick="showDetail('${order.id}')">
<div class="order-header">
<span class="order-id">#${order.id.slice(-4).toUpperCase()}</span>
<span class="status-badge status-${order.status}">${getStatusText(order.status)}</span>
</div>
<div class="order-customer">👤 ${order.customerName || 'N/D'}</div>
<div class="order-address">📍 ${order.address || 'Ritiro in pizzeria'}</div>
<div class="order-items">${(order.items || []).map(i => i.name || i).join(', ')}</div>
<div class="order-total">€${(order.total || 0).toFixed(2)}</div>
<div class="order-actions" onclick="event.stopPropagation()">${getActionButtons(order)}</div>
</div>`).join('');
}
function getStatusText(s) { return {pending:'⏳ In Attesa', accepted:'🛵 In Consegna', delivered:'✅ Consegnato', cancelled:'❌ Annullato'}[s] || s; }
function getActionButtons(order) {
if (order.status === 'pending') return `<button class="btn btn-primary btn-sm" onclick="acceptOrder('${order.id}')">🛵 Accetta</button>`;
if (order.status === 'accepted' && order.assignedTo === currentUser) return `<button class="btn btn-success btn-sm" onclick="completeOrder('${order.id}')">✅ Consegnato</button><button class="btn btn-warning btn-sm" onclick="callCustomer('${order.phone}')">📞 Chiama</button><button class="btn btn-danger btn-sm" onclick="cancelOrder('${order.id}')">❌ Annulla</button>`;
if (order.status === 'delivered') return `<span style="color:var(--success); font-size:0.9em">✅ Completato</span>`;
return '';
}
function acceptOrder(id) { if (!confirm('Accettare questo ordine?')) return; db.ref('orders/' + id).update({ status: 'accepted', assignedTo: currentUser, acceptedAt: Date.now() }); }
function completeOrder(id) { if (!confirm('Confermi la consegna?')) return; db.ref('orders/' + id).update({ status: 'delivered', deliveredAt: Date.now() }).then(() => alert('Ordine consegnato! ✅')); }
function cancelOrder(id) { if (!confirm('Annullare questo ordine?')) return; db.ref('orders/' + id).update({ status: 'cancelled', cancelledAt: Date.now() }); }
function callCustomer(phone) { if (phone) window.location.href = 'tel:' + phone; }
function showDetail(id) {
const order = ordersData[id]; if (!order) return;
const modal = document.getElementById('detailModal');
document.getElementById('modalBody').innerHTML = `
<h2 style="margin-bottom:15px">Ordine #${id.slice(-4).toUpperCase()}</h2>
<p><strong>👤 Cliente:</strong> ${order.customerName || 'N/D'}</p>
<p><strong>📞 Telefono:</strong> ${order.phone || 'N/D'}</p>
<p><strong>📍 Indirizzo:</strong> ${order.address || 'Ritiro in pizzeria'}</p>
<p><strong>🕐 Orario:</strong> ${order.deliveryTime || 'Subito'}</p>
<p><strong>Stato:</strong> ${getStatusText(order.status)}</p>
${order.notes ? `<p style="margin-top:10px; padding:10px; background:rgba(255,193,7,0.1); border-radius:8px"><strong>📝 Note:</strong><br>${order.notes}</p>` : ''}
<div style="margin-top:15px; padding-top:15px; border-top:1px solid #444">
<h3>Prodotti:</h3>
${(order.items || []).map((item, i) => `<p>${i+1}. ${item.name || item} ${item.qty ? 'x'+item.qty : ''} - €${(item.price||0).toFixed(2)}</p>`).join('')}
<p style="text-align:right; font-size:1.3em; font-weight:bold; color:var(--success); margin-top:10px">Totale: €${(order.total||0).toFixed(2)}</p>
</div>
<div style="margin-top:20px">
${order.status === 'pending' ? `<button class="btn btn-primary" onclick="acceptOrder('${id}'); closeModal()">🛵 Accetta Ordine</button>` : ''}
${order.status === 'accepted' && order.assignedTo === currentUser ? `<button class="btn btn-success" onclick="completeOrder('${id}'); closeModal()" style="margin-bottom:10px">✅ Conferma Consegna</button><button class="btn btn-warning" onclick="callCustomer('${order.phone}'); closeModal()">📞 Chiama Cliente</button>` : ''}
</div>`;
modal.classList.add('active');
}
function closeModal() { document.getElementById('detailModal').classList.remove('active'); }
document.getElementById('pinInput').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
