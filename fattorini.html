<style>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAw8pBS3gOpitVIArnWutBnwca3hXSWuVs",
  authDomain: "teogra-c8cf5.firebaseapp.com",
  databaseURL: "https://teogra-c8cf5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "teogra-c8cf5",
  storageBucket: "teogra-c8cf5.firebasestorage.app",
  messagingSenderId: "686300112893",
  appId: "1:686300112893:web:e147b82f91374f12db1b94"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentDriver = null;
let currentTab = 'available';
let driversData = {};
let ordersData = {};
let wakeLock = null;
let notificationSound = null;
let pizzeriaSettings = { lat: 41.6274, lng: 15.5514 };

function loadPizzeriaSettings() {
  db.ref('settings').once('value').then(s => {
    if (s.exists()) {
      const data = s.val();
      if (data.pizzeriaLat && data.pizzeriaLng) {
        pizzeriaSettings.lat = parseFloat(data.pizzeriaLat);
        pizzeriaSettings.lng = parseFloat(data.pizzeriaLng);
      }
    }
  });
}

function initNotificationSound() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    notificationSound = new AudioContext();
  } catch(e) { console.log('Audio non supportato'); }
}

function playNotificationSound() {
  if (!notificationSound) return;
  try {
    const osc = notificationSound.createOscillator();
    const gain = notificationSound.createGain();
    osc.connect(gain);
    gain.connect(notificationSound.destination);
    osc.frequency.setValueAtTime(880, notificationSound.currentTime);
    osc.frequency.setValueAtTime(1100, notificationSound.currentTime + 0.1);
    osc.frequency.setValueAtTime(880, notificationSound.currentTime + 0.2);
    osc.frequency.setValueAtTime(1100, notificationSound.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, notificationSound.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, notificationSound.currentTime + 0.6);
    osc.start(notificationSound.currentTime);
    osc.stop(notificationSound.currentTime + 0.6);
  } catch(e) {}
}

async function requestNotificationPermission() {
  if ('Notification' in window) {
    if (Notification.permission === 'default') {
      const permission = await Notification.requestPermission();
      if (permission === 'granted') showToast('🔔 Notifiche attivate!');
    }
  }
  await requestWakeLock();
}

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeLockIndicator').classList.add('show');
      wakeLock.addEventListener('release', () => {
        document.getElementById('wakeLockIndicator').classList.remove('show');
      });
    }
  } catch (err) { console.log('Wake Lock non supportato'); }
}

function checkPin() {
  const pin = document.getElementById('pinInput').value;
  db.ref('drivers').once('value').then(snapshot => {
    driversData = snapshot.val() || {};
    const driverEntry = Object.entries(driversData).find(([p]) => p === pin);
    if (driverEntry) {
      currentDriver = { pin, name: driverEntry[1] };
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('driverGreeting').textContent = `Ciao, ${currentDriver.name}!`;
      document.getElementById('logoutBtn').classList.add('show');
      initNotificationSound();
      requestNotificationPermission();
      loadPizzeriaSettings();
      loadOrders();
      setupRealtimeListeners();
      showToast(`Benvenuto, ${currentDriver.name}!`);
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('pinInput').value = '';
    }
  });
}

document.getElementById('pinInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') checkPin();
});

function loadOrders() {
  db.ref('ordini').orderByChild('timestamp').limitToLast(50).once('value').then(snapshot => {
    ordersData = {};
    snapshot.forEach(child => {
      ordersData[child.key] = { id: child.key, ...child.val() };
    });
    renderOrders();
  });
}

function setupRealtimeListeners() {
  db.ref('ordini').orderByChild('timestamp').limitToLast(50).on('value', snapshot => {
    const newOrdersData = {};
    snapshot.forEach(child => {
      newOrdersData[child.key] = { id: child.key, ...child.val() };
    });
    const oldCount = Object.values(ordersData).filter(o => o.status === 'new' && !o.assignedDriver && o.type === 'delivery').length;
    const newCount = Object.values(newOrdersData).filter(o => o.status === 'new' && !o.assignedDriver && o.type === 'delivery').length;
    ordersData = newOrdersData;
    renderOrders();
    if (newCount > oldCount && newCount > 0) {
      showNotification(newCount);
    }
  });
  db.ref('.info/connected').on('value', snapshot => {
    const banner = document.getElementById('offlineBanner');
    if (banner) banner.style.display = snapshot.val() === false ? 'block' : 'none';
  });
}

function showNotification(count) {
  const banner = document.getElementById('notificationBanner');
  const text = document.getElementById('notificationText');
  text.textContent = `${count} ordine${count > 1 ? 'i' : ''} disponibile${count > 1 ? 'i' : ''}`;
  banner.classList.add('show');
  for (let i = 0; i < Math.min(count, 3); i++) {
    setTimeout(() => playNotificationSound(), i * 700);
  }
  if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('🔔 Nuovo Ordine!', {
      body: `${count} ordine${count > 1 ? 'i' : ''} disponibile${count > 1 ? 'i' : ''}`,
      icon: 'https://i.imgur.com/nWLqs68.png',
      tag: 'new-order',
      requireInteraction: true
    });
  }
  setTimeout(() => banner.classList.remove('show'), 8000);
}

function viewNewOrders() {
  document.getElementById('notificationBanner').classList.remove('show');
  showTab('available');
}

function calculateDistance(lat1, lon1, lat2, lon2) {
  if (!lat1 || !lon1 || !lat2 || !lon2) return null;
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function renderOrders() {
  const container = document.getElementById('ordersContainer');
  const availableCount = document.getElementById('availableCount');
  const myOrdersCount = document.getElementById('myOrdersCount');
  const clearBtnContainer = document.getElementById('clearBtnContainer');
  
  let available = [];
  let myOrders = [];
  let completedCount = 0;
  
  Object.values(ordersData).forEach(order => {
    if (order.type !== 'delivery') return;
    if (order.status === 'new' && !order.assignedDriver) {
      available.push(order);
    } else if (order.assignedDriver === currentDriver?.pin && 
               ['new', 'preparing', 'ready', 'picked', 'delivering', 'delivered'].includes(order.status)) {
      myOrders.push(order);
      if (order.status === 'delivered') completedCount++;
    }
  });
  
  available.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  myOrders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  
  availableCount.textContent = available.length;
  myOrdersCount.textContent = myOrders.length;
  
  // Mostra/nascondi pulsante cancella
  if (currentTab === 'my' && completedCount > 0) {
    clearBtnContainer.classList.add('show');
  } else {
    clearBtnContainer.classList.remove('show');
  }
  
  const orders = currentTab === 'available' ? available : myOrders;
  
  if (orders.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>${currentTab === 'available' ? 'Nessun ordine disponibile' : 'Nessun ordine assegnato'}</p></div>`;
    return;
  }
  
  container.innerHTML = orders.map(order => {
    const date = new Date(order.timestamp || 0);
    const timeStr = date.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    const items = order.items?.map(i => `${i.name} x${i.qty}`).join('<br>') || '';
    
    let mapHtml = '';
    let distanceHtml = '';
    const customerLat = order.customerLat;
    const customerLng = order.customerLng;
    
    if (customerLat && customerLng) {
      const distance = calculateDistance(pizzeriaSettings.lat, pizzeriaSettings.lng, customerLat, customerLng);
      const distanceText = distance !== null ? distance.toFixed(1) : '?';
      const bboxLng = 0.008;
      const bboxLat = 0.006;
      const mapUrl = `https://www.openstreetmap.org/export/embed.html?bbox=${customerLng-bboxLng},${customerLat-bboxLat},${customerLng+bboxLng},${customerLat+bboxLat}&layer=mapnik&marker=${customerLat},${customerLng}`;
      const gmapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${pizzeriaSettings.lat},${pizzeriaSettings.lng}&destination=${customerLat},${customerLng}&travelmode=driving`;
      mapHtml = `<div class="map-container"><iframe src="${mapUrl}" loading="lazy"></iframe><a href="${gmapsUrl}" target="_blank" class="map-link"><i class="fas fa-directions"></i> Apri in Google Maps</a></div>`;
      distanceHtml = `<div class="distance-info"><span class="label"> Distanza:</span><span class="distance">${distanceText} km</span></div>`;
    } else if (order.address) {
      const encodedAddr = encodeURIComponent(order.address + ' Manfredonia');
      mapHtml = `<div class="map-container" style="padding: 15px; text-align: center;"><i class="fas fa-map-marker-alt" style="font-size: 2rem; color: var(--gold); margin-bottom: 10px;"></i><p style="color: var(--cream); margin-bottom: 10px; font-size: 0.9rem;">${order.address}</p><a href="https://www.google.com/maps/search/?api=1&query=${encodedAddr}" target="_blank" class="map-link"><i class="fas fa-directions"></i> Apri in Google Maps</a></div>`;
    }
    
    let statusMessage = '';
    let actions = '';
    
    if (order.status === 'new' && !order.assignedDriver) {
      actions = `<button class="btn-accept" onclick="acceptOrder('${order.id}')">✅ Accetta</button>`;
    } else if (order.status === 'new' && order.assignedDriver === currentDriver?.pin) {
      statusMessage = `<div class="status-message status-waiting">⏳ In attesa che la pizzeria metta in preparazione...</div>`;
    } else if (order.status === 'preparing') {
      statusMessage = `<div class="status-message status-preparing">🍕 La pizzeria sta preparando...</div>`;
    } else if (order.status === 'ready') {
      statusMessage = `<div class="status-message status-ready">✅ Pronto per il ritiro!</div>`;
      actions = `<button class="btn-pick" onclick="pickOrder('${order.id}')">📦 Ritirato</button>`;
    } else if (order.status === 'picked') {
      actions = `<button class="btn-deliver" onclick="deliverOrder('${order.id}')">️ In Consegna</button>`;
    } else if (order.status === 'delivering') {
      actions = `<button class="btn-deliver" onclick="deliverOrder('${order.id}')">✅ Consegnato</button>`;
    } else if (order.status === 'delivered') {
      statusMessage = `<div class="status-message" style="background: rgba(74,222,128,0.2); color: #4ade80;">✅ Consegnato!</div>`;
    }
    
    return `
      <div class="order-card ${order.status}">
        <div class="order-header">
          <span class="order-id">${order.orderId || order.id}</span>
          <span class="order-time">${timeStr}</span>
        </div>
        <div class="order-customer">👤 ${order.customerName || 'N/A'}</div>
        <div class="order-address">📍 ${order.address || 'N/A'}<br>📞 ${order.customerPhone || ''}</div>
        ${mapHtml}
        ${distanceHtml}
        ${statusMessage}
        <div class="order-items">${items}</div>
        <div class="order-total">
          <span>Totale:</span>
          <span>€${(order.finalTotal || 0).toFixed(2)}</span>
        </div>
        <div class="order-actions">
          ${actions}
          <button class="btn-view" onclick="showOrderDetails('${order.id}')">👁️ Dettagli</button>
        </div>
      </div>
    `;
  }).join('');
}

// Cancella ordini completati dalla vista del fattorino
function clearCompletedOrders() {
  if (!confirm('Cancellare gli ordini completati dalla vista? (Non vengono eliminati dal database)')) return;
  
  const completedIds = Object.values(ordersData)
    .filter(o => o.status === 'delivered' && o.assignedDriver === currentDriver?.pin)
    .map(o => o.id);
  
  completedIds.forEach(id => {
    delete ordersData[id];
  });
  
  renderOrders();
  showToast('️ Ordini completati rimossi dalla vista');
}

function acceptOrder(orderId) {
  if (!confirm('Accettare questo ordine?')) return;
  db.ref(`ordini/${orderId}`).update({
    assignedDriver: currentDriver.pin,
    assignedName: currentDriver.name,
    acceptedAt: Date.now()
  }).then(() => {
    showToast('✅ Ordine accettato! In attesa che la pizzeria lo metta in preparazione...');
    playNotificationSound();
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('Ordine Accettato!', {
        body: 'In attesa che la pizzeria metta in preparazione',
        icon: 'https://i.imgur.com/nWLqs68.png'
      });
    }
  });
}

function pickOrder(orderId) {
  if (!confirm('Hai ritirato l\'ordine dalla pizzeria?')) return;
  db.ref(`ordini/${orderId}`).update({
    status: 'picked',
    pickedAt: Date.now()
  }).then(() => {
    showToast('📦 Ordine ritirato!');
  });
}

function deliverOrder(orderId) {
  const order = ordersData[orderId];
  const isDelivering = order?.status === 'delivering';
  if (!confirm(isDelivering ? 'Confermi la consegna completata?' : 'Sei partito per la consegna?')) return;
  const newStatus = isDelivering ? 'delivered' : 'delivering';
  db.ref(`ordini/${orderId}`).update({
    status: newStatus,
    [isDelivering ? 'deliveredAt' : 'deliveringAt']: Date.now()
  }).then(() => {
    showToast(isDelivering ? '✅ Ordine consegnato!' : '🏍️ In consegna...');
    if (isDelivering && 'Notification' in window && Notification.permission === 'granted') {
      new Notification('Consegna Completata!', {
        body: 'Ottimo lavoro!',
        icon: 'https://i.imgur.com/nWLqs68.png'
      });
    }
  });
}

function showOrderDetails(orderId) {
  const order = ordersData[orderId];
  if (!order) return;
  const items = order.items?.map(i => `• ${i.name} x${i.qty} - €${(i.price * i.qty).toFixed(2)}`).join('\n') || '';
  let distanceText = '';
  if (order.customerLat && order.customerLng) {
    const d = calculateDistance(pizzeriaSettings.lat, pizzeriaSettings.lng, order.customerLat, order.customerLng);
    if (d) distanceText = `\n\nDistanza: ${d.toFixed(1)} km`;
  }
  alert(`Ordine: ${order.orderId || orderId}\n\nCliente: ${order.customerName}\nTelefono: ${order.customerPhone}\nIndirizzo: ${order.address}\nOrario: ${order.scheduledTime || 'Subito'}\n\nProdotti:\n${items}\n\nTotale: €${(order.finalTotal || 0).toFixed(2)}\n\nNote: ${order.notes || 'Nessuna'}\n\nStato: ${order.status}${distanceText}`);
}

function showTab(tab) {
  currentTab = tab;
  document.getElementById('tabAvailable').classList.toggle('active', tab === 'available');
  document.getElementById('tabMy').classList.toggle('active', tab === 'my');
  renderOrders();
}

function logout() {
  if (!confirm('Uscire dall\'app?')) return;
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  currentDriver = null;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('logoutBtn').classList.remove('show');
  document.getElementById('pinInput').value = '';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('wakeLockIndicator').classList.remove('show');
  db.ref('ordini').off();
  db.ref('.info/connected').off();
  showToast(' Arrivederci');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

document.getElementById('pinInput').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '');
});

document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    await requestWakeLock();
  }
});
</script>
</body>
</html>
