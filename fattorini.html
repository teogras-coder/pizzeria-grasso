<style>
:root { --gold: #D48806; --gold-light: #FFB347; --gold-dark: #B8860B; --dark: #1a1a1a; --card: #2a2a2a; --card-light: #3a3a3a; --cream: #f5e6c8; --shadow: #0a0a0a; --success: #4ade80; --warning: #fbbf24; --danger: #f87171; }
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Montserrat', sans-serif; background: linear-gradient(180deg, var(--dark) 0%, #2a2a2a 100%); color: var(--cream); min-height: 100vh; overflow-x: hidden; }

/* Login Screen */
.login-screen { position: fixed; inset: 0; background: linear-gradient(170deg, var(--dark) 0%, #2a2a2a 50%, #3a3a3a 100%); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
.login-box { background: linear-gradient(145deg, var(--card-light) 0%, var(--card) 100%); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid var(--gold); box-shadow: 0 0 50px rgba(212,136,6,0.3); max-width: 400px; width: 100%; }
.login-box h1 { font-family: 'Montserrat', sans-serif; color: var(--gold); font-size: 2rem; margin-bottom: 10px; font-weight: 900; }
.login-box p { color: #8a8a8a; margin-bottom: 30px; }
.login-box input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--gold); background: var(--dark); color: var(--gold); font-size: 1.5rem; text-align: center; letter-spacing: 10px; font-weight: 700; margin-bottom: 20px; }
.login-box button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); color: var(--dark); font-weight: 900; font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 0 var(--gold-dark); }
.login-error { color: var(--danger); margin-top: 15px; font-size: 0.9rem; display: none; }

/* Main App */
.app-container { display: none; min-height: 100vh; padding-bottom: 100px; }
.header { background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
.header h1 { color: var(--dark); font-size: 1.8rem; font-weight: 900; margin-bottom: 5px; }
.header p { color: rgba(0,0,0,0.7); font-size: 0.9rem; }

/* Stats Cards */
.stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
.stat-card { background: linear-gradient(145deg, var(--card-light) 0%, var(--card) 100%); border-radius: 15px; padding: 20px; text-align: center; border: 2px solid var(--gold); }
.stat-card .number { font-size: 2.5rem; font-weight: 900; color: var(--gold); }
.stat-card .label { color: #8a8a8a; font-size: 0.85rem; margin-top: 5px; text-transform: uppercase; font-weight: 600; }

/* Orders List */
.orders-container { padding: 0 20px 20px; }
.order-card { background: linear-gradient(145deg, var(--card-light) 0%, var(--card) 100%); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 2px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.order-card.new { border-left: 6px solid var(--warning); animation: pulseNew 2s infinite; }
.order-card.accepted { border-left: 6px solid var(--gold); }
.order-card.picked { border-left: 6px solid var(--success); }
.order-card.delivered { border-left: 6px solid #60a5fa; opacity: 0.7; }

@keyframes pulseNew { 0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.4); } 50% { box-shadow: 0 0 0 10px rgba(251,191,36,0); } }

.order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(212,136,6,0.3); }
.order-id { color: var(--gold); font-weight: 900; font-size: 1.2rem; }
.order-time { color: #8a8a8a; font-size: 0.85rem; }
.order-customer { color: var(--cream); font-weight: 700; margin-bottom: 10px; font-size: 1.1rem; }
.order-address { color: #a0a0a0; font-size: 0.9rem; margin-bottom: 10px; line-height: 1.5; }
.order-items { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px; margin-bottom: 15px; font-size: 0.9rem; }
.order-items div { color: var(--cream); padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
.order-items div:last-child { border-bottom: none; }
.order-total { display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 15px; font-size: 1.2rem; }
.order-total span:last-child { color: var(--gold); }
.order-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.order-actions button { flex: 1; min-width: 100px; padding: 12px; border-radius: 10px; border: none; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
.btn-accept { background: linear-gradient(180deg, var(--success) 0%, #22c55e 100%); color: white; }
.btn-pick { background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); color: var(--dark); }
.btn-deliver { background: linear-gradient(180deg, #60a5fa 0%, #3b82f6 100%); color: white; }
.btn-view { background: var(--card); color: var(--gold); border: 2px solid var(--gold) !important; }

/* Offline Banner */
.offline-banner { position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(90deg, var(--danger) 0%, #dc2626 100%); color: white; padding: 12px; text-align: center; font-weight: 700; z-index: 9999; display: none; }

/* Notification Banner */
.notification-banner { position: fixed; top: 50px; left: 50%; transform: translateX(-50%) translateY(-100px); background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); color: var(--dark); padding: 15px 30px; border-radius: 12px; font-weight: 900; z-index: 9998; opacity: 0; transition: all 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.notification-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, var(--card) 0%, var(--dark) 100%); padding: 10px 20px; display: flex; justify-content: space-around; border-top: 2px solid var(--gold); z-index: 1000; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #8a8a8a; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.3s; padding: 10px; border-radius: 10px; }
.nav-item.active { color: var(--gold); background: rgba(212,136,6,0.1); }
.nav-item i { font-size: 1.5rem; }

/* Empty State */
.empty-state { text-align: center; color: #8a8a8a; padding: 60px 20px; }
.empty-state i { font-size: 4rem; margin-bottom: 20px; opacity: 0.5; }

/* Toast */
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--card); color: var(--gold); padding: 14px 24px; border-radius: 12px; font-weight: 700; z-index: 9999; opacity: 0; transition: all 0.3s; border: 2px solid var(--gold); max-width: 90%; text-align: center; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 768px) {
  .stats-container { grid-template-columns: 1fr 1fr; }
  .order-actions { flex-direction: column; }
  .order-actions button { width: 100%; }
}
</style>
</head>
<body>

<!-- Offline Banner -->
<div class="offline-banner" id="offlineBanner">⚠️ Offline - Riconnessione...</div>

<!-- Notification Banner -->
<div class="notification-banner" id="notificationBanner">
  <div style="font-size: 1.2rem; margin-bottom: 5px;">🔔 NUOVO ORDINE!</div>
  <div id="notificationText">1 ordine disponibile</div>
  <button onclick="viewNewOrders()" style="margin-top: 10px; padding: 8px 20px; background: var(--dark); color: var(--gold); border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">👁️ VEDI ORDINI</button>
</div>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🛵 Area Fattorini</h1>
    <p>Antica Pizzeria Grasso</p>
    <input type="password" id="pinInput" placeholder="••••" maxlength="6" autofocus>
    <button onclick="checkPin()">Accedi</button>
    <div class="login-error" id="loginError">PIN errato. Riprova.</div>
  </div>
</div>

<!-- Main App -->
<div class="app-container" id="mainApp">
  <div class="header">
    <h1>🛵 Fattorini Grasso</h1>
    <p>Caricamento...</p>
    <div style="margin-top: 10px; font-size: 0.85rem; color: rgba(0,0,0,0.7);">
      <i class="fas fa-info-circle"></i> iPhone: Tieni l'app aperta per ricevere notifiche
    </div>
  </div>

  <div class="stats-container">
    <div class="stat-card">
      <div class="number" id="availableCount">0</div>
      <div class="label">📢 Disponibili</div>
    </div>
    <div class="stat-card">
      <div class="number" id="myOrdersCount">0</div>
      <div class="label">📦 Le Mie</div>
    </div>
  </div>

  <div class="orders-container" id="ordersContainer">
    <div class="empty-state">
      <i class="fas fa-inbox"></i>
      <p>Nessun ordine disponibile</p>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="showTab('available')">
      <i class="fas fa-list"></i>
      <span>Disponibili</span>
    </div>
    <div class="nav-item" onclick="showTab('my')">
      <i class="fas fa-box"></i>
      <span>Le Mie</span>
    </div>
    <div class="nav-item" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i>
      <span>Esci</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAw8pBS3gOpitVIArnWutBnwca3hXSWuVs",
  authDomain: "teogra-c8cf5.firebaseapp.com",
  databaseURL: "https://teogra-c8cf5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "teogra-c8cf5",
  storageBucket: "teogra-c8cf5.firebasestorage.app",
  messagingSenderId: "686300112893",
  appId: "1:686300112893:web:e147b82f91374f12db1b94"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentDriver = null;
let currentTab = 'available';
let driversData = {};
let ordersData = {};

// Request Notification Permission
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().then(permission => {
      console.log('Notification permission:', permission);
      if (permission === 'granted') {
        showToast('🔔 Notifiche attivate!');
      }
    });
  }
}

// Check PIN
function checkPin() {
  const pin = document.getElementById('pinInput').value;
  db.ref('drivers').once('value').then(snapshot => {
    driversData = snapshot.val() || {};
    const driverName = Object.entries(driversData).find(([p]) => p === pin)?.[1];
    
    if (driverName) {
      currentDriver = { pin, name: driverName };
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      document.querySelector('.header p').textContent = `Ciao, ${driverName}!`;
      
      // Request notification permission after login
      requestNotificationPermission();
      
      // Load orders
      loadOrders();
      setupRealtimeListeners();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('pinInput').value = '';
    }
  });
}

document.getElementById('pinInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') checkPin();
});

// Load Orders
function loadOrders() {
  db.ref('ordini').orderByChild('timestamp').limitToLast(50).once('value').then(snapshot => {
    ordersData = {};
    snapshot.forEach(child => {
      ordersData[child.key] = { id: child.key, ...child.val() };
    });
    renderOrders();
  });
}

// Setup Realtime Listeners
function setupRealtimeListeners() {
  db.ref('ordini').orderByChild('timestamp').limitToLast(50).on('value', snapshot => {
    ordersData = {};
    snapshot.forEach(child => {
      ordersData[child.key] = { id: child.key, ...child.val() };
    });
    renderOrders();
    checkForNewOrders();
  });

  // Online/Offline status
  db.ref('.info/connected').on('value', snapshot => {
    const banner = document.getElementById('offlineBanner');
    if (banner) banner.style.display = snapshot.val() === false ? 'block' : 'none';
  });
}

// Check for new orders and show notification
let lastOrderCount = 0;
function checkForNewOrders() {
  const newOrders = Object.values(ordersData).filter(o => 
    o.status === 'new' && o.type === 'delivery'
  );
  
  if (newOrders.length > lastOrderCount && newOrders.length > 0) {
    showNotification(newOrders.length);
  }
  lastOrderCount = newOrders.length;
}

// Show Notification
function showNotification(count) {
  const banner = document.getElementById('notificationBanner');
  const text = document.getElementById('notificationText');
  text.textContent = `${count} ordine${count > 1 ? 'i' : ''} disponibile${count > 1 ? 'i' : ''} per la consegna`;
  banner.classList.add('show');
  
  // Play sound
  playNotificationSound();
  
  // Vibrate if available
  if (navigator.vibrate) {
    navigator.vibrate([200, 100, 200]);
  }
  
  setTimeout(() => {
    banner.classList.remove('show');
  }, 5000);
}

function viewNewOrders() {
  document.getElementById('notificationBanner').classList.remove('show');
  showTab('available');
}

function playNotificationSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

// Render Orders
function renderOrders() {
  const container = document.getElementById('ordersContainer');
  const availableCount = document.getElementById('availableCount');
  const myOrdersCount = document.getElementById('myOrdersCount');
  
  let available = [];
  let myOrders = [];
  
  Object.values(ordersData).forEach(order => {
    if (order.type !== 'delivery') return;
    
    if (order.status === 'new') {
      available.push(order);
    } else if (order.status === 'accepted' && order.assignedDriver === currentDriver?.pin) {
      myOrders.push(order);
    } else if (order.status === 'picked' && order.assignedDriver === currentDriver?.pin) {
      myOrders.push(order);
    } else if (order.status === 'delivering' && order.assignedDriver === currentDriver?.pin) {
      myOrders.push(order);
    }
  });
  
  availableCount.textContent = available.length;
  myOrdersCount.textContent = myOrders.length;
  
  const orders = currentTab === 'available' ? available : myOrders;
  
  if (orders.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-inbox"></i>
        <p>${currentTab === 'available' ? 'Nessun ordine disponibile' : 'Nessun ordine assegnato'}</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = orders.map(order => {
    const date = new Date(order.timestamp || 0);
    const timeStr = date.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    const items = order.items?.map(i => `${i.name} x${i.qty}`).join('<br>') || '';
    
    let actions = '';
    if (order.status === 'new') {
      actions = `<button class="btn-accept" onclick="acceptOrder('${order.id}')">✅ Accetta</button>`;
    } else if (order.status === 'accepted') {
      actions = `<button class="btn-pick" onclick="pickOrder('${order.id}')">📦 Ritirato</button>`;
    } else if (order.status === 'picked') {
      actions = `<button class="btn-deliver" onclick="deliverOrder('${order.id}')"> Consegnato</button>`;
    } else if (order.status === 'delivering') {
      actions = `<button class="btn-deliver" onclick="deliverOrder('${order.id}')">✅ Completa</button>`;
    }
    
    return `
      <div class="order-card ${order.status}">
        <div class="order-header">
          <span class="order-id">${order.orderId || order.id}</span>
          <span class="order-time">${timeStr}</span>
        </div>
        <div class="order-customer">👤 ${order.customerName || 'N/A'}</div>
        <div class="order-address">📍 ${order.address || 'N/A'}<br>📞 ${order.customerPhone || ''}</div>
        <div class="order-items">${items}</div>
        <div class="order-total">
          <span>Totale:</span>
          <span>€${(order.finalTotal || 0).toFixed(2)}</span>
        </div>
        <div class="order-actions">
          ${actions}
          <button class="btn-view" onclick="showOrderDetails('${order.id}')">👁️ Dettagli</button>
        </div>
      </div>
    `;
  }).join('');
}

// Accept Order
function acceptOrder(orderId) {
  if (!confirm('Accettare questo ordine?')) return;
  
  db.ref(`ordini/${orderId}`).update({
    status: 'accepted',
    assignedDriver: currentDriver.pin,
    assignedName: currentDriver.name,
    acceptedAt: Date.now()
  }).then(() => {
    showToast('✅ Ordine accettato!');
    playNotificationSound();
  });
}

// Pick Order
function pickOrder(orderId) {
  if (!confirm('Hai ritirato l\'ordine?')) return;
  
  db.ref(`ordini/${orderId}`).update({
    status: 'picked',
    pickedAt: Date.now()
  }).then(() => {
    showToast('📦 Ordine ritirato!');
  });
}

// Deliver Order
function deliverOrder(orderId) {
  if (!confirm('Confermi la consegna?')) return;
  
  db.ref(`ordini/${orderId}`).update({
    status: 'delivered',
    deliveredAt: Date.now()
  }).then(() => {
    showToast('✅ Ordine consegnato!');
  });
}

// Show Order Details
function showOrderDetails(orderId) {
  const order = ordersData[orderId];
  if (!order) return;
  
  const items = order.items?.map(i => `${i.name} x${i.qty} - €${(i.price * i.qty).toFixed(2)}`).join('\n') || '';
  alert(`Ordine: ${order.orderId || orderId}\n\nCliente: ${order.customerName}\nTelefono: ${order.customerPhone}\nIndirizzo: ${order.address}\n\nProdotti:\n${items}\n\nTotale: €${(order.finalTotal || 0).toFixed(2)}\n\nNote: ${order.notes || 'Nessuna'}`);
}

// Show Tab
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach((item, index) => {
    item.classList.toggle('active', (tab === 'available' && index === 0) || (tab === 'my' && index === 1));
  });
  renderOrders();
}

// Logout
function logout() {
  if (!confirm('Uscire dall\'app?')) return;
  currentDriver = null;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pinInput').value = '';
  document.getElementById('loginError').style.display = 'none';
  db.ref('ordini').off();
}

// Toast
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// Handle PIN input
document.getElementById('pinInput').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '');
});
</script>
</body>
