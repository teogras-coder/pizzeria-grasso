<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzeria Grasso</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1209">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
    <style>
        /* ============================================================
           🔥 STILE CLIENT OTTIMIZZATO
           ============================================================ */
        :root {
            --gold: #d4a84b;
            --gold-light: #f0d78c;
            --gold-dark: #b8860b;
            --dark: #1a1209;
            --brown: #2d1f12;
            --brown-light: #4a3728;
            --card: #2a1e13;
            --card-light: #3d2b1a;
            --cream: #f5e6c8;
            --shadow: #0a0704;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: var(--cream);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* ============================================================
           📱 TOP BAR
           ============================================================ */
        .top-bar {
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, var(--brown) 0%, var(--dark) 100%);
            border-bottom: 2px solid var(--gold-dark);
            padding: 12px 16px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .top-bar .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .top-bar .logo-area img {
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--gold-dark);
        }
        
        .top-bar .logo-area span {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .top-bar .status {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .top-bar .status.open {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        
        .top-bar .status.closed {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }
        
        /* ============================================================
           📱 TABS NAVIGAZIONE
           ============================================================ */
        .tabs {
            display: flex;
            background: var(--card);
            border-bottom: 1px solid rgba(212, 168, 75, 0.2);
            overflow-x: auto;
            position: sticky;
            top: 72px;
            z-index: 99;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            background: transparent;
            border: none;
            color: #8a7a5a;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            font-family: 'Montserrat', sans-serif;
        }
        
        .tab-btn i {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 4px;
        }
        
        .tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
            background: rgba(212, 168, 75, 0.05);
        }
        
        .tab-btn .badge {
            background: #f87171;
            color: white;
            font-size: 0.6rem;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 4px;
        }
        
        /* ============================================================
           📱 PAGINE
           ============================================================ */
        .page {
            display: none;
            padding: 16px;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ============================================================
           📦 CARD
           ============================================================ */
        .card {
            background: linear-gradient(145deg, var(--card-light) 0%, var(--card) 100%);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(212, 168, 75, 0.15);
        }
        
        .card-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* ============================================================
           📋 MENU
           ============================================================ */
        .category-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold-light);
            font-size: 1.1rem;
            margin: 16px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(212, 168, 75, 0.2);
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }
        
        .menu-item {
            background: var(--card);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid rgba(212, 168, 75, 0.15);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .menu-item:active {
            transform: scale(0.97);
        }
        
        .menu-item .img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 8px;
            background: var(--dark);
        }
        
        .menu-item .name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--cream);
        }
        
        .menu-item .price {
            color: var(--gold);
            font-weight: 700;
            font-size: 1rem;
            margin-top: 4px;
        }
        
        .menu-item .desc {
            color: #8a7a5a;
            font-size: 0.75rem;
            margin-top: 4px;
        }
        
        .menu-item .disabled-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f87171;
            font-weight: 700;
            font-size: 0.8rem;
        }
        
        /* ============================================================
           🛒 CARRETTO
           ============================================================ */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(212, 168, 75, 0.1);
        }
        
        .cart-item:last-child {
            border-bottom: none;
        }
        
        .cart-item .info {
            flex: 1;
        }
        
        .cart-item .name {
            font-weight: 600;
            color: var(--cream);
        }
        
        .cart-item .qty {
            color: #8a7a5a;
            font-size: 0.85rem;
        }
        
        .cart-item .price {
            color: var(--gold);
            font-weight: 700;
        }
        
        .cart-item .actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        .cart-item .actions button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .cart-item .actions .qty-btn {
            background: var(--gold-dark);
            color: white;
        }
        
        .cart-item .actions .remove-btn {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 2px solid var(--gold);
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .cart-total .total-price {
            color: var(--gold);
        }
        
        /* ============================================================
           📦 ORDINI
           ============================================================ */
        .order-card {
            background: var(--card);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            border-left: 4px solid var(--gold);
        }
        
        .order-card .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .order-card .order-id {
            font-weight: 700;
            color: var(--gold);
            font-size: 0.9rem;
        }
        
        .order-card .status {
            font-weight: 600;
            font-size: 0.8rem;
        }
        
        .order-card .items {
            color: var(--cream);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        
        .order-card .total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
        }
        
        .order-card .total .price {
            color: var(--gold);
        }
        
        .order-card .reject-reason {
            margin-top: 8px;
            padding: 8px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 6px;
            color: #fca5a5;
            font-size: 0.8rem;
            border-left: 3px solid #ef4444;
        }
        
        .order-empty {
            text-align: center;
            color: #8a7a5a;
            padding: 40px 20px;
        }
        
        .order-empty i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }
        
        /* ============================================================
           🎁 PROMOZIONI
           ============================================================ */
        .promo-card {
            background: var(--card);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid rgba(212, 168, 75, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .promo-card::before {
            content: '🎁';
            position: absolute;
            right: -10px;
            top: -10px;
            font-size: 4rem;
            opacity: 0.1;
        }
        
        .promo-card .title {
            font-weight: 700;
            color: var(--gold);
            font-size: 1rem;
        }
        
        .promo-card .message {
            color: var(--cream);
            font-size: 0.85rem;
            margin-top: 4px;
        }
        
        .promo-card .meta {
            color: #8a7a5a;
            font-size: 0.75rem;
            margin-top: 8px;
        }
        
        /* ============================================================
           🔘 PULSANTI
           ============================================================ */
        .btn-primary {
            background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--dark);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--gold-dark);
            width: 100%;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--gold-dark);
        }
        
        .btn-secondary {
            background: var(--card);
            color: var(--cream);
            border: 1px solid var(--gold-dark);
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 0.9rem;
        }
        
        .btn-danger {
            background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        
        .btn-cart {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--dark);
            border: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(212, 168, 75, 0.4);
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }
        
        .btn-cart:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        .btn-cart .count {
            background: var(--dark);
            color: var(--gold);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        /* ============================================================
           🍞 TOAST
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card);
            color: var(--gold);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            border: 1px solid rgba(212, 168, 75, 0.3);
            max-width: 90%;
            text-align: center;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* ============================================================
           📱 MODAL
           ============================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-box {
            background: linear-gradient(145deg, var(--card-light), var(--card));
            padding: 24px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(212, 168, 75, 0.25);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-box h3 {
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .modal-box p {
            color: var(--cream);
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .modal-box .form-group {
            margin-bottom: 12px;
        }
        
        .modal-box .form-group label {
            display: block;
            color: #8a7a5a;
            font-size: 0.8rem;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .modal-box .form-group input,
        .modal-box .form-group textarea,
        .modal-box .form-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--gold-dark);
            background: var(--dark);
            color: var(--cream);
            font-size: 0.9rem;
            font-family: inherit;
        }
        
        .modal-box .form-group input:focus,
        .modal-box .form-group textarea:focus,
        .modal-box .form-group select:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .modal-btn-confirm {
            background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--dark);
            box-shadow: 0 4px 0 var(--gold-dark);
        }
        
        .modal-btn-cancel {
            background: var(--card-light);
            color: var(--cream);
            border: 1px solid var(--gold-dark) !important;
        }
        
        /* ============================================================
           🔄 LOADING
           ============================================================ */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #8a7a5a;
        }
        
        .loading i {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 15px;
            display: block;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        /* ============================================================
           📱 RESPONSIVE
           ============================================================ */
        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
            
            .top-bar .logo-area span {
                font-size: 1rem;
            }
            
            .tab-btn {
                font-size: 0.6rem;
                padding: 10px 6px;
            }
            
            .tab-btn i {
                font-size: 1rem;
            }
        }
        
        /* ============================================================
           🎨 SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-dark);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- ============================================================
    🔔 TOAST
    ============================================================ -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================
    📱 TOP BAR
    ============================================================ -->
    <div class="top-bar">
        <div class="logo-area">
            <img src="icon-192.png" alt="Logo" id="brandLogo">
            <span id="brandName">Pizzeria Grasso</span>
        </div>
        <div class="status open" id="storeStatus">🟢 APERTO</div>
    </div>

    <!-- ============================================================
    📱 TABS
    ============================================================ -->
    <div class="tabs" id="tabs">
        <button class="tab-btn active" data-page="menu" onclick="showPage('menu')">
            <i class="fas fa-utensils"></i> Menu
        </button>
        <button class="tab-btn" data-page="orders" onclick="showPage('orders')">
            <i class="fas fa-receipt"></i> Ordini
            <span class="badge" id="ordersBadge" style="display:none;">0</span>
        </button>
        <button class="tab-btn" data-page="promotions" onclick="showPage('promotions')">
            <i class="fas fa-gift"></i> Promo
        </button>
        <button class="tab-btn" data-page="cart" onclick="showPage('cart')">
            <i class="fas fa-shopping-cart"></i> Carrello
            <span class="badge" id="cartBadge">0</span>
        </button>
    </div>

    <!-- ============================================================
    📱 PAGINE
    ============================================================ -->
    <div id="app">
        <!-- Loading -->
        <div class="loading" id="loadingScreen">
            <i class="fas fa-pizza-slice"></i>
            <p>Caricamento...</p>
        </div>

        <!-- PAGE: MENU -->
        <div class="page active" id="page-menu">
            <div id="menuContainer"></div>
        </div>

        <!-- PAGE: ORDINI -->
        <div class="page" id="page-orders">
            <div id="ordersContainer"></div>
        </div>

        <!-- PAGE: PROMOZIONI -->
        <div class="page" id="page-promotions">
            <div id="promotionsContainer"></div>
        </div>

        <!-- PAGE: CARRETTO -->
        <div class="page" id="page-cart">
            <div id="cartContainer"></div>
        </div>
    </div>

    <!-- ============================================================
    🛒 PULSANTE CARRETTO (FISSO)
    ============================================================ -->
    <button class="btn-cart" id="cartButton" onclick="showPage('cart')" style="display:none;">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartButtonText">Carrello</span>
        <span class="count" id="cartButtonCount">0</span>
    </button>

    <!-- ============================================================
    📱 MODAL
    ============================================================ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h3 id="modalTitle">Titolo</h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="modal-btn-cancel" id="modalBtnCancel">Annulla</button>
                <button class="modal-btn-confirm" id="modalBtnConfirm">OK</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
    🔥 FIREBASE CONFIG
    ============================================================ -->
    <script>
        // ============================================================
        // 🔥 CONFIGURAZIONE FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAw8pBS3gOpitVIArnWutBnwca3hXSWuVs",
            authDomain: "teogra-c8cf5.firebaseapp.com",
            databaseURL: "https://teogra-c8cf5-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "teogra-c8cf5",
            storageBucket: "teogra-c8cf5.firebasestorage.app",
            messagingSenderId: "686300112893",
            appId: "1:686300112893:web:e147b82f91374f12db1b94"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // 📦 VARIABILI GLOBALI
        // ============================================================
        let appCache = {
            menu: {},
            categories: {},
            promotions: {},
            settings: {},
            orders: {}
        };

        let currentUserId = null;
        let orderListener = null;
        let versionListener = null;
        let cart = [];
        let menuItems = {};
        let isAppReady = false;
        let selectedCategory = null;

        // ============================================================
        // 🔥 CARICAMENTO INIZIALE (TUTTO IN UNA VOLTA)
        // ============================================================
        async function loadAllData() {
            try {
                console.log('📥 Caricamento dati iniziale...');

                // Carica tutto in parallelo
                const [menuSnap, catsSnap, promosSnap, settingsSnap] = await Promise.all([
                    db.ref('menu').once('value'),
                    db.ref('categories').once('value'),
                    db.ref('promotions').once('value'),
                    db.ref('settings').once('value')
                ]);

                // Salva in cache
                appCache.menu = menuSnap.val() || {};
                appCache.categories = catsSnap.val() || {};
                appCache.promotions = promosSnap.val() || {};
                appCache.settings = settingsSnap.val() || {};

                // Salva in localStorage
                try {
                    localStorage.setItem('app_cache', JSON.stringify(appCache));
                } catch (e) {}

                // Applica i dati
                applyData();
                isAppReady = true;
                document.getElementById('loadingScreen').style.display = 'none';

                console.log('✅ Dati caricati!');

            } catch (e) {
                console.error('❌ Errore caricamento:', e);
                // Fallback: carica dalla cache
                loadFromCache();
            }
        }

        // ============================================================
        // 📦 FALLBACK: CARICA DALLA CACHE LOCALE
        // ============================================================
        function loadFromCache() {
            try {
                const cached = JSON.parse(localStorage.getItem('app_cache') || '{}');
                if (cached.menu && Object.keys(cached.menu).length > 0) {
                    appCache = cached;
                    applyData();
                    document.getElementById('loadingScreen').style.display = 'none';
                    console.log('📦 Caricato dalla cache');
                    showToast('📦 Dati offline');
                } else {
                    document.getElementById('loadingScreen').innerHTML = `
                        <i class="fas fa-exclamation-triangle" style="color:#f87171;"></i>
                        <p style="color:#f87171;">Impossibile caricare i dati</p>
                        <button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:var(--gold);border:none;border-radius:8px;font-weight:700;cursor:pointer;color:var(--dark);">
                            <i class="fas fa-sync"></i> Ricarica
                        </button>
                    `;
                }
            } catch (e) {
                document.getElementById('loadingScreen').innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="color:#f87171;"></i>
                    <p style="color:#f87171;">Errore caricamento dati</p>
                    <button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:var(--gold);border:none;border-radius:8px;font-weight:700;cursor:pointer;color:var(--dark);">
                        <i class="fas fa-sync"></i> Ricarica
                    </button>
                `;
            }
        }

        // ============================================================
        // 📊 APPLICA DATI
        // ============================================================
        function applyData() {
            // Brand
            const branding = appCache.settings.branding || {};
            document.getElementById('brandName').textContent = branding.name || 'Pizzeria Grasso';
            if (branding.logo) {
                document.getElementById('brandLogo').src = branding.logo;
            }

            // Stato apertura
            updateStoreStatus();

            // Render menu, promo, ordini
            renderMenu();
            renderPromotions();
            renderOrders();

            // Aggiorna badge versioni
            const verEl = document.getElementById('currentAppVersion');
            if (verEl) verEl.textContent = appCache.settings.appVersion || 0;
        }

        // ============================================================
        // 🏪 STATO APERTURA
        // ============================================================
        function updateStoreStatus() {
            const settings = appCache.settings || {};
            const statusEl = document.getElementById('storeStatus');

            // Controlla manual status
            if (settings.manualStatus === 'open') {
                statusEl.textContent = '🟢 APERTO';
                statusEl.className = 'status open';
                return;
            }
            if (settings.manualStatus === 'closed') {
                statusEl.textContent = '🔴 CHIUSO';
                statusEl.className = 'status closed';
                return;
            }

            // Controlla giorni aperti
            const now = new Date();
            const days = ['dom', 'lun', 'mar', 'mer', 'gio', 'ven', 'sab'];
            const today = days[now.getDay()];

            if (settings.openDays) {
                const openDays = settings.openDays.split(',');
                if (!openDays.includes(today)) {
                    statusEl.textContent = '🔴 CHIUSO';
                    statusEl.className = 'status closed';
                    return;
                }
            }

            // Controlla orari
            if (settings.hours) {
                const hours = settings.hours.split(',');
                const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

                for (const range of hours) {
                    const [start, end] = range.trim().split('-');
                    if (start && end) {
                        if (timeStr >= start && timeStr <= end) {
                            statusEl.textContent = '🟢 APERTO';
                            statusEl.className = 'status open';
                            return;
                        }
                    }
                }
                statusEl.textContent = '🔴 CHIUSO';
                statusEl.className = 'status closed';
                return;
            }

            // Default: aperto
            statusEl.textContent = '🟢 APERTO';
            statusEl.className = 'status open';
        }

        // ============================================================
        // 🔄 ASCOLTA VERSIONI (MOLTO LEGGERO)
        // ============================================================
        function setupVersionListener() {
            versionListener = db.ref('settings/appVersion');

            versionListener.on('value', (snapshot) => {
                const newVersion = snapshot.val() || 0;
                const currentVersion = parseInt(localStorage.getItem('app_version') || '0');

                if (newVersion > currentVersion) {
                    console.log(`🔄 Aggiornamento disponibile: v${newVersion}`);
                    localStorage.setItem('app_version', newVersion);

                    // Ricarica TUTTO in una volta
                    loadAllData();
                    showToast('🔄 Menu aggiornato!');
                }
            });
        }

        // ============================================================
        // 🛵 ASCOLTA ORDINI (SOLO PER IL CLIENTE LOGGATO)
        // ============================================================
        function setupOrderListener() {
            if (!currentUserId) return;

            if (orderListener) {
                orderListener.off('value');
            }

            orderListener = db.ref('ordini')
                .orderByChild('customerId')
                .equalTo(currentUserId);

            orderListener.on('value', (snapshot) => {
                const orders = {};
                snapshot.forEach(child => {
                    orders[child.key] = { id: child.key, ...child.val() };
                });

                appCache.orders = orders;
                renderOrders();

                // Aggiorna badge
                const pending = Object.values(orders).filter(o =>
                    ['new', 'preparing', 'ready', 'picked', 'delivering'].includes(o.status)
                ).length;

                const badge = document.getElementById('ordersBadge');
                if (pending > 0) {
                    badge.textContent = pending;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            });
        }

        // ============================================================
        // 🧹 PULIZIA AUTOMATICA (TAB NASCOSTA)
        // ============================================================
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (orderListener) {
                    orderListener.off('value');
                    console.log('🔌 Listener ordini staccato');
                }
                if (versionListener) {
                    versionListener.off('value');
                    console.log('🔌 Listener versioni staccato');
                }
            } else {
                console.log('🔌 Riavvio listener...');
                setupVersionListener();
                setupOrderListener();
                updateStoreStatus();
            }
        });

        // ============================================================
        // 📋 RENDER MENU
        // ============================================================
        function renderMenu() {
            const container = document.getElementById('menuContainer');
            const categories = appCache.categories || {};
            const menu = appCache.menu || {};

            let html = '';

            Object.keys(categories).forEach(catKey => {
                const cat = categories[catKey];
                const products = menu[catKey] || [];

                if (products.length === 0) return;

                html += `<div class="category-title">${cat.name || catKey}</div>`;
                html += '<div class="menu-grid">';

                products.forEach((product, idx) => {
                    const isDisabled = product.disabled === true;
                    const price = product.price || 0;

                    html += `
                        <div class="menu-item" onclick="${isDisabled ? '' : `addToCart('${catKey}', ${idx})`}" data-cat="${catKey}" data-idx="${idx}">
                            ${product.img ? `<img src="${product.img}" class="img" alt="${product.name}" loading="lazy">` : ''}
                            <div class="name">${product.name}</div>
                            ${product.desc ? `<div class="desc">${product.desc}</div>` : ''}
                            <div class="price">€${price.toFixed(2)}</div>
                            ${isDisabled ? '<div class="disabled-overlay">ESAURITO</div>' : ''}
                        </div>
                    `;
                });

                html += '</div>';
            });

            if (!html) {
                html = '<div class="order-empty"><i class="fas fa-utensils"></i><p>Nessun prodotto disponibile</p></div>';
            }

            container.innerHTML = html;
        }

        // ============================================================
        // 🎁 RENDER PROMOZIONI
        // ============================================================
        function renderPromotions() {
            const container = document.getElementById('promotionsContainer');
            const promotions = appCache.promotions || {};
            const today = new Date().toISOString().split('T')[0];

            let html = '';
            let hasActive = false;

            Object.values(promotions).forEach(promo => {
                if (!promo.active) return;
                if (promo.startDate > today || promo.endDate < today) return;
                if (promo.currentUses >= promo.maxUses) return;

                hasActive = true;
                const remaining = promo.maxUses - promo.currentUses;

                html += `
                    <div class="promo-card">
                        <div class="title">${promo.title}</div>
                        ${promo.message ? `<div class="message">${promo.message}</div>` : ''}
                        <div class="meta">${remaining} pezzi rimasti</div>
                        ${promo.products ? `
                            <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(212,168,75,0.1);">
                                ${promo.products.map(p => `
                                    <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:#8a7a5a;">
                                        <span>${p.name} x${p.qty}</span>
                                        <span style="color:var(--gold);">€${p.price.toFixed(2)}</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            if (!hasActive) {
                html = '<div class="order-empty"><i class="fas fa-gift"></i><p>Nessuna promozione attiva</p></div>';
            }

            container.innerHTML = html;
        }

        // ============================================================
        // 📦 RENDER ORDINI
        // ============================================================
        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const orders = Object.values(appCache.orders || {})
                .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="order-empty">
                        <i class="fas fa-inbox"></i>
                        <p>Nessun ordine</p>
                    </div>
                `;
                return;
            }

            const statusLabels = {
                'new': '🆕 In attesa',
                'preparing': '🍕 In preparazione',
                'ready': '✅ Pronto',
                'picked': '📦 Ritirato',
                'delivering': '🛵 In consegna',
                'delivered': '🎉 Consegnato',
                'annullato': '🗑️ Annullato',
                'rifiutato': '❌ Rifiutato'
            };

            const statusColors = {
                'new': '#f87171',
                'preparing': '#fbbf24',
                'ready': '#4ade80',
                'picked': '#8b5cf6',
                'delivering': '#ec4899',
                'delivered': '#60a5fa',
                'annullato': '#6b7280',
                'rifiutato': '#ef4444'
            };

            let html = '';
            orders.forEach(order => {
                const items = order.items ? order.items.map(i => `${i.name} x${i.qty}`).join(', ') : '';
                const status = order.status || 'new';

                html += `
                    <div class="order-card" style="border-left-color: ${statusColors[status] || '#d4a84b'};">
                        <div class="header">
                            <span class="order-id">${order.orderId || '#' + order.id.slice(-6)}</span>
                            <span class="status" style="color: ${statusColors[status] || '#d4a84b'};">
                                ${statusLabels[status] || status}
                            </span>
                        </div>
                        <div class="items">${items}</div>
                        <div class="total">
                            <span>Totale</span>
                            <span class="price">€${(order.finalTotal || 0).toFixed(2)}</span>
                        </div>
                        ${order.motivoRifiuto ? `
                            <div class="reject-reason">
                                <strong>Motivo rifiuto:</strong> ${order.motivoRifiuto}
                            </div>
                        ` : ''}
                        ${order.motivoAnnullamento ? `
                            <div class="reject-reason" style="border-left-color:#f87171;">
                                <strong>Motivo annullamento:</strong> ${order.motivoAnnullamento}
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // ============================================================
        // 🛒 CARRELLO
        // ============================================================
        function addToCart(catKey, idx) {
            const product = appCache.menu[catKey]?.[idx];
            if (!product || product.disabled) return;

            const key = `${catKey}|${idx}`;
            const existing = cart.find(item => item.key === key);

            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({
                    key: key,
                    cat: catKey,
                    idx: idx,
                    name: product.name,
                    price: product.price || 0,
                    qty: 1
                });
            }

            updateCartUI();
            showToast(`✅ ${product.name} aggiunto al carrello`);
        }

        function removeFromCart(key) {
            cart = cart.filter(item => item.key !== key);
            updateCartUI();
        }

        function changeQty(key, delta) {
            const item = cart.find(i => i.key === key);
            if (!item) return;

            item.qty += delta;
            if (item.qty <= 0) {
                removeFromCart(key);
                return;
            }

            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((sum, i) => sum + i.qty, 0);
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

            // Badge
            document.getElementById('cartBadge').textContent = count;

            // Pulsante fisso
            const btn = document.getElementById('cartButton');
            if (count > 0) {
                btn.style.display = 'flex';
                document.getElementById('cartButtonCount').textContent = count;
                document.getElementById('cartButtonText').textContent = count === 1 ? '1 articolo' : `${count} articoli`;
            } else {
                btn.style.display = 'none';
            }

            // Render carrello
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartContainer');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="order-empty">
                        <i class="fas fa-shopping-cart"></i>
                        <p>Carrello vuoto</p>
                    </div>
                `;
                return;
            }

            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

            let html = '<div class="card"><div class="card-title"><i class="fas fa-shopping-cart"></i> Carrello</div>';

            cart.forEach(item => {
                html += `
                    <div class="cart-item">
                        <div class="info">
                            <div class="name">${item.name}</div>
                            <div class="qty">€${item.price.toFixed(2)} x ${item.qty}</div>
                        </div>
                        <div class="actions">
                            <button class="qty-btn" onclick="changeQty('${item.key}', -1)">−</button>
                            <span style="font-weight:700;min-width:20px;text-align:center;">${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty('${item.key}', 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart('${item.key}')"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                `;
            });

            html += `
                <div class="cart-total">
                    <span>Totale</span>
                    <span class="total-price">€${total.toFixed(2)}</span>
                </div>
                <button class="btn-primary" onclick="checkout()">
                    <i class="fas fa-check"></i> Conferma Ordine
                </button>
            </div>`;

            container.innerHTML = html;
        }

        // ============================================================
        // 🛒 CHECKOUT
        // ============================================================
        function showCheckoutModal() {
            return new Promise((resolve) => {
                const overlay = document.getElementById('modalOverlay');
                const body = document.getElementById('modalBody');

                document.getElementById('modalTitle').textContent = '📝 Dettagli Ordine';

                body.innerHTML = `
                    <p style="color:#8a7a5a;font-size:0.9rem;">Compila i dati per l'ordine</p>
                    <div class="form-group">
                        <label>Nome e Cognome *</label>
                        <input type="text" id="checkoutName" placeholder="Mario Rossi" value="${localStorage.getItem('customer_name') || ''}">
                    </div>
                    <div class="form-group">
                        <label>Telefono *</label>
                        <input type="tel" id="checkoutPhone" placeholder="333 123 4567" value="${localStorage.getItem('customer_phone') || ''}">
                    </div>
                    <div class="form-group">
                        <label>Indirizzo di consegna</label>
                        <input type="text" id="checkoutAddress" placeholder="Via Roma 1" value="${localStorage.getItem('customer_address') || ''}">
                    </div>
                    <div class="form-group">
                        <label>Note (opzionale)</label>
                        <textarea id="checkoutNotes" rows="2" placeholder="Es: senza cipolla, piano terra..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Tipo ordine</label>
                        <select id="checkoutType">
                            <option value="delivery">🚚 Consegna</option>
                            <option value="pickup">📦 Ritiro</option>
                        </select>
                    </div>
                `;

                overlay.classList.add('active');

                document.getElementById('modalBtnCancel').onclick = () => {
                    overlay.classList.remove('active');
                    resolve(null);
                };

                document.getElementById('modalBtnConfirm').onclick = () => {
                    const name = document.getElementById('checkoutName').value.trim();
                    const phone = document.getElementById('checkoutPhone').value.trim();
                    const address = document.getElementById('checkoutAddress').value.trim();
                    const notes = document.getElementById('checkoutNotes').value.trim();
                    const type = document.getElementById('checkoutType').value;

                    if (!name) { showToast('⚠️ Inserisci il nome'); return; }
                    if (!phone) { showToast('⚠️ Inserisci il telefono'); return; }

                    // Salva per futuro
                    localStorage.setItem('customer_name', name);
                    localStorage.setItem('customer_phone', phone);
                    localStorage.setItem('customer_address', address);

                    overlay.classList.remove('active');
                    resolve({ name, phone, address, notes, type });
                };
            });
        }

        async function checkout() {
            if (cart.length === 0) {
                showToast('⚠️ Carrello vuoto');
                return;
            }

            // Controlla se aperto
            const statusEl = document.getElementById('storeStatus');
            if (statusEl.textContent.includes('CHIUSO')) {
                showToast('🔴 Pizzeria chiusa, non puoi ordinare');
                return;
            }

            const details = await showCheckoutModal();
            if (!details) return;

            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

            // Genera ID ordine
            const counterSnap = await db.ref('counter/ordini').once('value');
            const counter = (counterSnap.val() || 0) + 1;
            await db.ref('counter/ordini').set(counter);
            const orderId = 'ORD-' + String(counter).padStart(5, '0');

            const orderData = {
                orderId: orderId,
                customerId: currentUserId,
                customerName: details.name,
                customerPhone: details.phone,
                address: details.address || '',
                notes: details.notes || '',
                type: details.type || 'delivery',
                items: cart.map(i => ({
                    name: i.name,
                    qty: i.qty,
                    price: i.price
                })),
                subtotal: total,
                deliveryFee: details.type === 'delivery' ? 3.00 : 0,
                finalTotal: details.type === 'delivery' ? total + 3.00 : total,
                status: 'new',
                timestamp: Date.now(),
                timestampStr: new Date().toISOString(),
                stampato: false
            };

            try {
                const newOrderRef = db.ref('ordini').push();
                await newOrderRef.set(orderData);

                // Svuota carrello
                cart = [];
                updateCartUI();

                showToast(`🎉 Ordine ${orderId} inviato!`);
                showPage('orders');

            } catch (e) {
                showToast('❌ Errore invio ordine: ' + e.message);
            }
        }

        // ============================================================
        // 📱 NAVIGAZIONE
        // ============================================================
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');

            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab-btn[data-page="${page}"]`).classList.add('active');

            // Aggiorna contenuti
            if (page === 'cart') renderCart();
            if (page === 'orders') renderOrders();
            if (page === 'promotions') renderPromotions();
        }

        // ============================================================
        // 🔔 TOAST
        // ============================================================
        function showToast(message) {
            const el = document.getElementById('toast');
            el.textContent = message;
            el.classList.add('show');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.classList.remove('show'), 2500);
        }

        // ============================================================
        // 🏁 AVVIA L'APP
        // ============================================================
        async function initApp() {
            // ID utente
            currentUserId = localStorage.getItem('user_id');
            if (!currentUserId) {
                currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
                localStorage.setItem('user_id', currentUserId);
            }

            console.log(`👤 Utente: ${currentUserId}`);

            // Carica dati
            await loadAllData();

            // Listener versioni
            setupVersionListener();

            // Listener ordini
            setupOrderListener();

            // Ricarica periodicamente (fallback)
            setInterval(() => {
                db.ref('settings/appVersion').once('value').then(snap => {
                    const newVersion = snap.val() || 0;
                    const currentVersion = parseInt(localStorage.getItem('app_version') || '0');

                    if (newVersion > currentVersion) {
                        localStorage.setItem('app_version', newVersion);
                        loadAllData();
                    }
                });
            }, 300000); // 5 minuti

            // Aggiorna stato apertura ogni minuto
            setInterval(updateStoreStatus, 60000);

            console.log('✅ App client avviata!');
        }

        // ============================================================
        // 🚀 AVVIA
        // ============================================================
        document.addEventListener('DOMContentLoaded', initApp);

        // ============================================================
        // 📦 ESPONI GLOBALMENTE
        // ============================================================
        window.showPage = showPage;
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.changeQty = changeQty;
        window.checkout = checkout;
        window.showToast = showToast;
        window.renderCart = renderCart;
        window.renderOrders = renderOrders;
        window.renderMenu = renderMenu;
        window.renderPromotions = renderPromotions;
        window.updateCartUI = updateCartUI;
    </script>
</body>
</html>
