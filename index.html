<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Antica Pizzeria Grasso - Ordina Online</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root { --gold: #d4a84b; --gold-light: #f0d78c; --gold-dark: #b8860b; --dark: #1a1209; --brown: #2d1f12; --brown-light: #4a3728; --card: #2a1e13; --card-light: #3d2b1a; --cream: #f5e6c8; --shadow: #0a0704; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{height:100%;overflow:hidden;background:var(--dark)}
body{display:flex;justify-content:center;font-family:'Montserrat',sans-serif}
.phone-frame{width:100%;max-width:480px;height:100vh;height:100dvh;background:linear-gradient(170deg,var(--dark)0%,var(--brown)40%,var(--brown-light)100%);position:relative;overflow-y:auto;overflow-x:hidden}
#loader{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loader.hidden{opacity:0;pointer-events:none}
.spinner{width:50px;height:50px;border:4px solid var(--gold-dark);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{color:var(--gold);font-weight:600}
.header{background:linear-gradient(180deg,var(--gold-dark)0%,var(--gold)50%,var(--gold-dark)100%);padding:25px 20px 20px;text-align:center;position:sticky;top:0;z-index:20}
.logo-main{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:var(--dark)}
.logo-grasso{display:block;font-size:1.3rem;letter-spacing:6px;margin-top:4px;color:var(--brown);font-weight:700}
.section-divider{display:flex;align-items:center;padding:20px 25px 10px}
.section-divider span{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold)}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dark),transparent);margin:0 15px}
.menu-list{padding:10px 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.menu-btn-3d{background:linear-gradient(145deg,var(--card-light)0%,var(--card)50%,var(--brown)100%);border-radius:16px;overflow:hidden;cursor:pointer;color:white;box-shadow:0 6px 0 var(--shadow),0 8px 15px rgba(0,0,0,0.6);border:1px solid rgba(212,168,75,0.15);aspect-ratio:1/1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.category-img{width:100%;height:70px;object-fit:cover;filter:brightness(0.85)}
.menu-btn-content{padding:8px 12px}
.menu-btn-3d h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold-light);margin-bottom:4px}
.menu-btn-3d p{font-size:0.75rem;color:#a08b6d}
.product-card-3d{background:linear-gradient(145deg,var(--card-light)0%,var(--brown)100%);border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:0 6px 0 var(--shadow);border:1px solid rgba(212,168,75,0.1);position:relative}
.product-card-3d.sold-out{opacity:0.5;filter:grayscale(0.8)}
.product-card-3d.sold-out::after{content:'ESAURITO';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)rotate(-10deg);background:#d32f2f;color:#fff;padding:6px 14px;font-weight:bold;border-radius:6px;font-size:0.85rem;z-index:5}
.product-info{flex:1}
.product-info h4{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--cream);margin-bottom:4px}
.product-info p{font-size:0.75rem;color:#8a7a5a}
.product-price{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:8px}
.add-btn-3d{background:linear-gradient(180deg,var(--gold)0%,var(--gold-dark)100%);border:none;color:var(--dark);padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 var(--gold-dark)}
.customize-btn{background:var(--card);border:1px solid var(--gold-dark);color:var(--gold);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:auto}
.qty-counter{display:flex;align-items:center;gap:6px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--gold-dark)}
.qty-btn{width:30px;height:30px;border-radius:8px;border:none;background:linear-gradient(180deg,var(--gold)0%,var(--gold-dark)100%);color:var(--dark);font-weight:700;cursor:pointer}
.qty-btn.minus{background:var(--card-light);color:var(--gold)}
.modal-3d{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;align-items:center;justify-content:center;padding:20px}
.modal-3d.active{display:flex}
.modal-content-3d{background:var(--card);padding:25px;border-radius:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;border:1px solid rgba(212,168,75,0.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.modal-header h2{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.2rem}
.close-btn-3d{width:30px;height:30px;border-radius:50%;background:var(--card-light);border:none;color:var(--gold);cursor:pointer}
.ing-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
.ing-name{color:var(--cream);font-weight:600;flex:1}
.ing-price{color:var(--gold);margin-right:8px}
.ing-actions{display:flex;gap:5px}
.ing-btn{width:28px;height:28px;border-radius:6px;border:none;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ing-btn.minus{background:#333;color:#aaa;border:1px solid #555}
.ing-btn.plus{background:var(--gold-dark);color:var(--dark)}
.ing-btn.no{background:#d32f2f;color:#fff;font-size:0.7rem}
.ing-btn.selected{background:var(--gold);color:var(--dark);box-shadow:0 0 4px var(--gold)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%)translateY(20px);background:var(--card);color:var(--gold);padding:10px 20px;border-radius:10px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:3000}
.toast.show{transform:translateX(-50%)translateY(0);opacity:1}
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div><p>Caricamento pizzeria...</p></div>
<div class="phone-frame" id="app" style="display:none">
  <header class="header">
    <div class="logo-main">Antica Pizzeria <span class="logo-grasso">GRASSO</span></div>
  </header>
  <div class="section-divider"><span>Menu</span></div>
  <div class="menu-list" id="categoriesList"></div>
  <div id="productsView" style="display:none;padding:0 20px 80px">
    <button onclick="showHome()" style="background:var(--card-light);color:var(--gold);border:none;padding:8px 16px;border-radius:8px;margin:15px 0;cursor:pointer"><i class="fas fa-arrow-left"></i> Menu</button>
    <h2 id="catTitle" style="font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:15px">Categoria</h2>
    <div id="productList"></div>
  </div>
</div>

<!-- Modal Ingredienti -->
<div class="modal-3d" id="ingModal">
  <div class="modal-content-3d">
    <div class="modal-header">
      <h2 id="ingTitle">Personalizza</h2>
      <button class="close-btn-3d" onclick="closeIngModal()">×</button>
    </div>
    <div id="ingList"></div>
    <div style="margin-top:15px;padding-top:12px;border-top:1px dashed var(--gold-dark);display:flex;justify-content:space-between">
      <span style="color:var(--cream)">Extra:</span>
      <span id="ingTotal" style="color:var(--gold);font-weight:bold">€0.00</span>
    </div>
    <button onclick="confirmIng()" style="width:100%;margin-top:15px;padding:12px;background:var(--gold);color:var(--dark);border:none;border-radius:10px;font-weight:700;cursor:pointer">Conferma e Aggiungi</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 🔧 CONFIG FIREBASE (Sostituisci con la tua se diversa)
const firebaseConfig = {
  apiKey: "AIzaSyAw8pBS3gOpitVIArnWutBnwca3hXSWuVs",
  authDomain: "teogra-c8cf5.firebaseapp.com",
  databaseURL: "https://teogra-c8cf5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "teogra-c8cf5",
  storageBucket: "teogra-c8cf5.appspot.com",
  messagingSenderId: "686300112893",
  appId: "1:686300112893:web:e147b82f91374f12db1b94"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 📦 DATI INIZIALI (Fallback se Firebase è lento)
let appData = {
  categories: { 
    pizze:{name:"🍕 Pizze",icon:"fa-pizza-slice"}, 
    frittura:{name:"🍟 Frittura",icon:"fa-drumstick-bite"}, 
    bibite:{name:"🥤 Bibite",icon:"fa-glass-martini-alt"} 
  },
  menu: {
    pizze: [
      {name:"Margherita",price:5.00,desc:"",available:true},
      {name:"Diavola",price:7.00,desc:"",available:true},
      {name:"Quattro Formaggi",price:8.00,desc:"",available:true}
    ],
    frittura: [{name:"Patatine",price:3.00,desc:"",available:true}],
    bibite: [{name:"Coca Cola",price:2.50,desc:"",available:true}]
  },
  ingredients: {
    "Mozzarella Extra":1.50, "Salsiccia":2.00, "Peperoni":1.50, "Funghi":1.50, "Senza Glutine":3.00
  }
};

let currentCat = '', currentProdIdx = 0, currentMods = {};

// 🚀 AVVIO SICURO
window.onload = async () => {
  console.log("✅ Avvio app...");
  try {
    // Carica dati da Firebase in parallelo
    const [catsSnap, menuSnap, ingSnap] = await Promise.all([
      db.ref('categories').once('value'),
      db.ref('menu').once('value'),
      db.ref('ingredients').once('value')
    ]);
    
    if(catsSnap.exists()) appData.categories = catsSnap.val();
    if(menuSnap.exists()) appData.menu = menuSnap.val();
    if(ingSnap.exists()) appData.ingredients = ingSnap.val();
    
    console.log("📦 Dati caricati:", appData);
    renderCategories();
  } catch(err) {
    console.warn("⚠️ Firebase lento o offline, uso dati locali:", err);
    renderCategories();
  } finally {
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
  }
};

//  RENDER CATEGORIE
function renderCategories() {
  const list = document.getElementById('categoriesList');
  list.innerHTML = Object.keys(appData.categories).map(cat => `
    <div class="menu-btn-3d" onclick="showCategory('${cat}')">
      <div style="font-size:2.5rem;margin-bottom:8px">${appData.categories[cat].name.split(' ')[0]}</div>
      <div class="menu-btn-content">
        <h3>${appData.categories[cat].name}</h3>
        <p>${(appData.menu[cat]||[]).length} prodotti</p>
      </div>
    </div>
  `).join('');
}

// 📋 RENDER PRODOTTI (Con disponibilità e varianti)
function showCategory(cat) {
  currentCat = cat;
  document.getElementById('categoriesList').parentElement.style.display = 'none';
  document.getElementById('productsView').style.display = 'block';
  document.getElementById('catTitle').textContent = appData.categories[cat].name;
  
  const list = document.getElementById('productList');
  const items = appData.menu[cat] || [];
  
  list.innerHTML = items.map((p, i) => {
    const isAvail = p.available !== false; // Default true
    return `
    <div class="product-card-3d ${!isAvail ? 'sold-out' : ''}">
      <div class="product-info">
        <h4>${p.name}</h4>
        <p>${p.desc || ''}</p>
        <div class="product-price">€${p.price.toFixed(2)}</div>
      </div>
      ${isAvail ? `
        <button class="customize-btn" onclick="openIngModal('${cat}',${i})"><i class="fas fa-cog"></i></button>
        <button class="add-btn-3d" style="margin-left:8px" onclick="quickAdd('${cat}',${i})">+</button>
      ` : `<div style="color:#8a7a5a;font-size:0.8rem">Non disponibile</div>`}
    </div>`;
  }).join('');
}

function showHome() {
  document.getElementById('categoriesList').parentElement.style.display = 'block';
  document.getElementById('productsView').style.display = 'none';
}

// 🥙 LOGICA VARIANTE/INGREDIENTI
function openIngModal(cat, idx) {
  currentCat = cat; currentProdIdx = idx; currentMods = {};
  document.getElementById('ingTitle').textContent = appData.menu[cat][idx].name;
  renderIngList();
  document.getElementById('ingModal').classList.add('active');
}

function closeIngModal() {
  document.getElementById('ingModal').classList.remove('active');
}

function renderIngList() {
  const list = document.getElementById('ingList');
  list.innerHTML = Object.entries(appData.ingredients).map(([name, price]) => {
    const mod = currentMods[name] || 'none';
    return `
    <div class="ing-row">
      <div class="ing-name">${name}</div>
      <div class="ing-price">€${price.toFixed(2)}</div>
      <div class="ing-actions">
        <button class="ing-btn minus ${mod==='minus'?'selected':''}" onclick="setMod('${name}','minus')">➖</button>
        <button class="ing-btn plus ${mod==='plus'?'selected':''}" onclick="setMod('${name}','plus')">➕</button>
        <button class="ing-btn no ${mod==='no'?'selected':''}" onclick="setMod('${name}','no')">Senza</button>
      </div>
    </div>`;
  }).join('');
  calcIngTotal();
}

function setMod(name, type) {
  currentMods[name] = currentMods[name] === type ? 'none' : type;
  renderIngList();
}

function calcIngTotal() {
  let extra = 0;
  Object.entries(currentMods).forEach(([n,m]) => {
    if(m==='plus') extra += appData.ingredients[n]||0;
    if(m==='minus') extra -= (appData.ingredients[n]||0)*0.5;
  });
  document.getElementById('ingTotal').textContent = `€${Math.max(0,extra).toFixed(2)}`;
}

function confirmIng() {
  let base = appData.menu[currentCat][currentProdIdx];
  let finalPrice = base.price;
  Object.entries(currentMods).forEach(([n,m]) => {
    if(m==='plus') finalPrice += appData.ingredients[n]||0;
    if(m==='minus') finalPrice -= (appData.ingredients[n]||0)*0.5;
  });
  
  showToast(`✅ ${base.name} aggiunta! (€${finalPrice.toFixed(2)})`);
  closeIngModal();
  // Qui puoi spingere l'oggetto nel carrello locale o inviarlo a Firebase
}

function quickAdd(cat, idx) {
  const p = appData.menu[cat][idx];
  showToast(`✅ ${p.name} aggiunta!`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
