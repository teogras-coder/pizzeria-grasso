<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Antica Pizzeria Grasso</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<style>
    :root { --gold: #d4a84b; --gold-dark: #b8860b; --bg: #1a1209; --card: #2a1e13; --text: #f5e6c8; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
    body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    
    /* Layout Desktop */
    .wrapper { display: flex; height: 100%; }
    .sidebar { width: 250px; background: #0f0a05; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #3d2b1a; }
    .sidebar h2 { color: var(--gold); margin-bottom: 30px; font-size: 1.2rem; text-align: center; }
    .menu-btn { background: none; border: none; color: #8a7a5a; padding: 12px; text-align: left; cursor: pointer; font-size: 1rem; margin-bottom: 5px; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
    .menu-btn:hover, .menu-btn.active { background: var(--gold); color: #1a1209; font-weight: 700; }
    
    .main { flex: 1; padding: 30px; overflow-y: auto; }
    
    /* Login Overlay */
    #loginOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .login-box { background: var(--card); padding: 40px; border-radius: 15px; text-align: center; border: 1px solid var(--gold); }
    .login-box input { padding: 10px; font-size: 1.2rem; text-align: center; border-radius: 5px; border: 1px solid var(--gold-dark); background: #1a1209; color: var(--gold); width: 150px; margin: 20px 0; }
    .login-box button { padding: 10px 30px; background: var(--gold); border: none; border-radius: 5px; font-weight: 700; cursor: pointer; }

    /* Dashboard Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border-left: 4px solid var(--gold); }
    .stat-card h3 { font-size: 2rem; color: var(--gold); margin: 10px 0; }
    .stat-card p { color: #8a7a5a; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

    /* Orders List */
    .order-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #f87171; display: flex; justify-content: space-between; align-items: center; }
    .order-item.prep { border-left-color: #fbbf24; }
    .order-item.ready { border-left-color: #4ade80; }
    .order-item.done { border-left-color: #60a5fa; opacity: 0.6; }
    .order-actions button { padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; margin-left: 5px; font-weight: 600; font-size: 0.8rem; }
    .btn-green { background: #4ade80; color: #000; }
    .btn-red { background: #ef4444; color: #fff; }
    .btn-blue { background: #60a5fa; color: #fff; }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

    /* Form Inputs */
    input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #1a1209; border: 1px solid #3d2b1a; color: var(--text); border-radius: 6px; }
    .save-btn { background: var(--gold); color: #1a1209; padding: 10px 20px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 10px; }

    /* Toggle Switch */
    .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background-color: #555; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #4ade80; }
    input:checked + .slider:before { transform: translateX(26px); }

    @media (max-width: 768px) {
        .wrapper { flex-direction: column; }
        .sidebar { width: 100%; height: auto; padding: 10px; flex-direction: row; overflow-x: auto; }
        .menu-btn { white-space: nowrap; }
    }
</style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--gold);">🔒 Area Riservata</h2>
        <p style="color:#8a7a5a; margin-top:10px;">Inserisci il PIN Admin</p>
        <input type="password" id="pinInput" placeholder="****" maxlength="4">
        <br>
        <button onclick="checkPin()">Entra</button>
        <p id="pinError" style="color:#ef4444; margin-top:10px; display:none;">PIN Errato!</p>
    </div>
</div>

<div class="wrapper" id="appContent" style="filter: blur(10px);">
    <div class="sidebar">
        <h2>🍕 Pizzeria Grasso<br><span style="font-size:0.8rem; color:#8a7a5a;">Admin Panel</span></h2>
        <button class="menu-btn active" onclick="show('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
        <button class="menu-btn" onclick="show('orders')"><i class="fas fa-receipt"></i> Ordini Live</button>
        <button class="menu-btn" onclick="show('menu')"><i class="fas fa-utensils"></i> Menu & Prezzi</button>
        <button class="menu-btn" onclick="show('settings')"><i class="fas fa-cog"></i> Impostazioni</button>
        <button class="menu-btn" onclick="logout()" style="margin-top:auto; color:#ef4444;"><i class="fas fa-sign-out-alt"></i> Esci</button>
    </div>

    <div class="main">
        
        <!-- DASHBOARD -->
        <div id="dashboard" class="section active">
            <h1 style="margin-bottom:20px;">📊 Riepilogo Giornata</h1>
            <div class="stats-grid">
                <div class="stat-card">
                    <p>Incasso Oggi</p>
                    <h3 id="todayRevenue">€0.00</h3>
                </div>
                <div class="stat-card">
                    <p>Ordini Totali</p>
                    <h3 id="todayCount">0</h3>
                </div>
                <div class="stat-card" style="border-left-color: #4ade80;">
                    <p>Stato Pizzeria</p>
                    <div style="margin-top:10px;">
                        <label class="switch">
                            <input type="checkbox" id="shopToggle" onchange="toggleShop()">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="stat-card">
                <h3 style="font-size:1.2rem; margin:0 0 15px 0;">🔔 Ultimi Ordini</h3>
                <div id="recentOrders"></div>
            </div>
        </div>

        <!-- ORDINI -->
        <div id="orders" class="section">
            <h1 style="margin-bottom:20px;">📝 Gestione Ordini</h1>
            <div id="allOrdersList"></div>
        </div>

        <!-- MENU -->
        <div id="menu" class="section">
            <h1 style="margin-bottom:20px;">🍕 Modifica Menu</h1>
            <div id="menuEditor"></div>
        </div>

        <!-- IMPOSTAZIONI -->
        <div id="settings" class="section">
            <h1 style="margin-bottom:20px;">️ Impostazioni</h1>
            <div class="stat-card">
                <label>Costo Consegna (€)</label>
                <input type="number" id="deliveryFee" step="0.50">
                
                <label>Minimo Ordine (€)</label>
                <input type="number" id="minOrder" step="0.50">
                
                <label>Telefono Visibile</label>
                <input type="text" id="phoneVisible">

                <button class="save-btn" onclick="saveSettings()">Salva Modifiche</button>
            </div>
        </div>

    </div>
</div>

<script>
    // Configurazione Firebase (Identica al tuo index.html)
    const firebaseConfig = {
        apiKey: "AIzaSyAw8pBS3gOpitVIArnWutBnwca3hXSWuVs",
        authDomain: "teogra-c8cf5.firebaseapp.com",
        databaseURL: "https://teogra-c8cf5-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "teogra-c8cf5",
        storageBucket: "teogra-c8cf5.firebasestorage.app",
        messagingSenderId: "686300112893",
        appId: "1:686300112893:web:e147b82f91374f12db1b94"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let adminPin = "1234"; // Default, verrà sovrascritto dal DB se esiste
    let shopOpen = true;

    // 1. CHECK PIN
    function checkPin() {
        const input = document.getElementById('pinInput').value;
        // Prima controlla il DB, poi il default
        db.ref('settings/adminPin').once('value').then(s => {
            if(s.exists()) adminPin = s.val();
            if(input === adminPin) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('appContent').style.filter = 'none';
                initApp();
            } else {
                document.getElementById('pinError').style.display = 'block';
            }
        });
    }

    function logout() { location.reload(); }

    // 2. NAVIGAZIONE
    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // 3. INIT APP
    function initApp() {
        // Carica Ordini
        db.ref('ordini').orderByChild('timestamp').limitToLast(50).on('value', snap => {
            const orders = [];
            snap.forEach(c => orders.push({id: c.key, ...c.val()}));
            orders.reverse(); // Più recenti prima
            renderOrders(orders);
            calculateStats(orders);
        });

        // Carica Settings
        db.ref('settings').on('value', snap => {
            if(snap.exists()) {
                const s = snap.val();
                document.getElementById('deliveryFee').value = s.deliveryFee || 0;
                document.getElementById('minOrder').value = s.minDeliveryOrder || 0;
                document.getElementById('phoneVisible').value = s.visiblePhone || '';
                shopOpen = s.manualStatus !== 'closed';
                document.getElementById('shopToggle').checked = shopOpen;
            }
        });

        // Carica Menu per Editor
        db.ref('menu').on('value', snap => {
            if(snap.exists()) renderMenuEditor(snap.val());
        });
        
        // Carica Categorie
        db.ref('categories').on('value', snap => {
            if(snap.exists()) window.categories = snap.val();
        });
    }

    // 4. FUNZIONI DASHBOARD & ORDINI
    function calculateStats(orders) {
        const today = new Date().toDateString();
        let revenue = 0;
        let count = 0;
        orders.forEach(o => {
            if(new Date(o.timestamp).toDateString() === today) {
                revenue += (o.finalTotal || 0);
                count++;
            }
        });
        document.getElementById('todayRevenue').innerText = `€${revenue.toFixed(2)}`;
        document.getElementById('todayCount').innerText = count;
    }

    function renderOrders(orders) {
        const recentHtml = orders.slice(0, 5).map(o => createOrderHtml(o)).join('');
        document.getElementById('recentOrders').innerHTML = recentHtml || '<p style="color:#8a7a5a">Nessun ordine recente</p>';
        
        const allHtml = orders.map(o => createOrderHtml(o)).join('');
        document.getElementById('allOrdersList').innerHTML = allHtml || '<p style="color:#8a7a5a">Nessun ordine</p>';
    }

    function createOrderHtml(o) {
        const statusClass = o.status === 'new' ? '' : (o.status === 'preparing' ? 'prep' : (o.status === 'ready' ? 'ready' : 'done'));
        const statusText = o.status === 'new' ? 'Nuovo' : (o.status === 'preparing' ? 'In Prep' : (o.status === 'ready' ? 'Pronto' : 'Consegnato'));
        
        let actions = '';
        if(o.status === 'new') actions = `<button class="btn-green" onclick="updateStatus('${o.id}','preparing')">Prepara</button> <button class="btn-red" onclick="deleteOrder('${o.id}')"><i class="fas fa-trash"></i></button>`;
        else if(o.status === 'preparing') actions = `<button class="btn-green" onclick="updateStatus('${o.id}','ready')">Pronto</button> <button class="btn-red" onclick="deleteOrder('${o.id}')"><i class="fas fa-trash"></i></button>`;
        else if(o.status === 'ready') actions = `<button class="btn-blue" onclick="updateStatus('${o.id}','delivered')">Consegnato</button>`;

        return `
            <div class="order-item ${statusClass}">
                <div>
                    <strong style="color:var(--gold);">#${o.orderId || o.id}</strong> 
                    <span style="font-size:0.8rem; background:#555; padding:2px 6px; border-radius:4px; color:white;">${statusText}</span>
                    <div style="font-size:0.9rem; margin-top:5px;">
                        ${o.customerName} • ${o.customerPhone}<br>
                        ${o.type==='delivery' ? '🛵 Consegna: '+o.address : ' Ritiro'}
                    </div>
                </div>
                <div style="text-align:right">
                    <div style="font-weight:700; font-size:1.1rem;">€${o.finalTotal?.toFixed(2)}</div>
                    <div style="margin-top:5px;">${actions}</div>
                </div>
            </div>
        `;
    }

    function updateStatus(id, status) {
        db.ref(`ordini/${id}/status`).set(status);
    }

    function deleteOrder(id) {
        if(confirm('Eliminare ordine?')) db.ref(`ordini/${id}`).remove();
    }

    function toggleShop() {
        const isOpen = document.getElementById('shopToggle').checked;
        db.ref('settings/manualStatus').set(isOpen ? 'open' : 'closed');
    }

    function saveSettings() {
        const updates = {
            deliveryFee: parseFloat(document.getElementById('deliveryFee').value) || 0,
            minDeliveryOrder: parseFloat(document.getElementById('minOrder').value) || 0,
            visiblePhone: document.getElementById('phoneVisible').value
        };
        db.ref('settings').update(updates).then(() => alert('Salvato!'));
    }

    // 5. EDITOR MENU
    function renderMenuEditor(menu) {
        let html = '';
        for(let cat in menu) {
            html += `<h3 style="color:var(--gold); margin:20px 0 10px; border-bottom:1px solid #3d2b1a;">${cat.toUpperCase()}</h3>`;
            menu[cat].forEach((item, idx) => {
                html += `
                    <div style="display:flex; gap:10px; margin-bottom:5px; align-items:center;">
                        <input type="text" value="${item.name}" style="flex:2" onchange="updateMenuItem('${cat}', ${idx}, 'name', this.value)">
                        <input type="number" value="${item.price}" style="width:80px" step="0.50" onchange="updateMenuItem('${cat}', ${idx}, 'price', this.value)">
                        <button class="btn-red" style="padding:5px;" onclick="deleteMenuItem('${cat}', ${idx})"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });
            html += `<button class="save-btn" style="font-size:0.8rem; padding:5px 10px;" onclick="addMenuItem('${cat}')">+ Aggiungi Prodotto</button>`;
        }
        document.getElementById('menuEditor').innerHTML = html;
    }

    function updateMenuItem(cat, idx, field, val) {
        db.ref(`menu/${cat}/${idx}/${field}`).set(field === 'price' ? parseFloat(val) : val);
    }

    function deleteMenuItem(cat, idx) {
        if(confirm('Rimuovere?')) db.ref(`menu/${cat}/${idx}`).remove();
    }

    function addMenuItem(cat) {
        const name = prompt("Nome prodotto:");
        if(!name) return;
        const price = prompt("Prezzo:");
        db.ref(`menu/${cat}`).push({ name, price: parseFloat(price) || 0, desc: "" });
    }

    // Audio Alert (Opzionale, suona solo se c'è un nuovo ordine)
    // Implementazione base: se vuoi il suono, togli i commenti
    /*
    let lastOrderCount = 0;
    setInterval(() => {
        db.ref('ordini').once('value').then(s => {
            if(s.numChildren() > lastOrderCount && lastOrderCount !== 0) {
                new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
            }
            lastOrderCount = s.numChildren();
        });
    }, 5000);
    */
</script>
</body>
</html>
