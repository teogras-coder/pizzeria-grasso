<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionale Admin - Antica Pizzeria Grasso</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root { --bg: #f4f6f9; --card: #ffffff; --sidebar: #1e293b; --primary: #d4a84b; --text: #334155; --border: #e2e8f0; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    
    /* LOGIN */
    #loginScreen { position: fixed; inset: 0; background: var(--sidebar); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.3s; }
    .login-box { background: var(--card); padding: 2.5rem; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
    .login-box h1 { margin-bottom: 0.5rem; color: var(--sidebar); font-size: 1.5rem; }
    .login-box p { color: #64748b; margin-bottom: 1.5rem; }
    .pin-input { width: 100%; padding: 14px; font-size: 1.8rem; text-align: center; letter-spacing: 10px; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 1rem; transition: 0.2s; }
    .pin-input:focus { border-color: var(--primary); outline: none; }
    .login-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .login-btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .error-msg { color: var(--danger); margin-top: 12px; min-height: 20px; font-weight: 500; }

    /* DASHBOARD */
    #dashboard { display: none; height: 100vh; flex-direction: row; }
    .sidebar { width: 260px; background: var(--sidebar); color: #cbd5e1; padding: 1rem; display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar h2 { color: #fff; font-size: 1.2rem; padding: 0.5rem 0 1.5rem; border-bottom: 1px solid #334155; margin-bottom: 1rem; text-align: center; }
    .nav-btn { background: transparent; border: none; color: #94a3b8; padding: 12px 15px; text-align: left; cursor: pointer; border-radius: 8px; margin-bottom: 6px; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
    .nav-btn:hover, .nav-btn.active { background: #334155; color: #fff; }
    .nav-btn i { width: 20px; text-align: center; }
    .logout-btn { margin-top: auto; color: #ef4444 !important; }
    .logout-btn:hover { background: #451a1a !important; }

    .main { flex: 1; overflow-y: auto; padding: 2rem; }
    .section { display: none; animation: fadeIn 0.3s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .header-sec { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .header-sec h2 { color: var(--sidebar); font-size: 1.4rem; }
    .card { background: var(--card); border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 1.2rem; border: 1px solid var(--border); }
    
    table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #f8fafc; font-weight: 600; color: #64748b; font-size: 0.85rem; text-transform: uppercase; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; background: #fff; }
    input:focus, select:focus { outline: none; border-color: var(--primary); }
    
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }

    .badge { padding: 4px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .badge-new { background: #fee2e2; color: #991b1b; }
    .badge-prep { background: #fef3c7; color: #92400e; }
    .badge-ready { background: #dcfce7; color: #166534; }
    .badge-del { background: #dbeafe; color: #1e40af; }
    .badge-promo { background: #f3e8ff; color: #6b21a8; }

    .toast { position: fixed; bottom: 25px; right: 25px; background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 10px; opacity: 0; transition: 0.3s; z-index: 10000; transform: translateY(20px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .toast.show { opacity: 1; transform: translateY(0); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .days-wrapper { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
    .day-tog { background: #e2e8f0; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; user-select: none; }
    .day-tog.active { background: var(--primary); color: #fff; }

    @media(max-width: 900px) {
      #dashboard { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; padding: 0.5rem; overflow-x: auto; align-items: center; }
      .sidebar h2 { display: none; }
      .nav-btn { padding: 8px 12px; font-size: 0.8rem; margin-bottom: 0; margin-right: 5px; white-space: nowrap; }
      .logout-btn { margin-left: auto; }
      .main { padding: 1rem; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1><i class="fas fa-utensils" style="color:var(--primary)"></i> Gestionale Pizzeria</h1>
    <p>Accesso Amministratore</p>
    <input type="password" id="adminPinInput" class="pin-input" maxlength="6" inputmode="numeric" placeholder="••••">
    <button class="login-btn" onclick="verifyPin()"><i class="fas fa-right-to-bracket"></i> Accedi</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav class="sidebar">
    <h2>🍕 Pizzeria Grasso</h2>
    <button class="nav-btn active" onclick="switchTab('orders')"><i class="fas fa-receipt"></i> Ordini Live</button>
    <button class="nav-btn" onclick="switchTab('products')"><i class="fas fa-pizza-slice"></i> Menu & Prodotti</button>
    <button class="nav-btn" onclick="switchTab('promotions')"><i class="fas fa-gift"></i> Promozioni</button>
    <button class="nav-btn" onclick="switchTab('reviews')"><i class="fas fa-star"></i> Recensioni</button>
    <button class="nav-btn" onclick="switchTab('settings')"><i class="fas fa-cog"></i> Impostazioni</button>
    <button class="nav-btn" onclick="switchTab('drivers')"><i class="fas fa-users"></i> Fattorini</button>
    <button class="nav-btn" onclick="switchTab('counters')"><i class="fas fa-chart-bar"></i> Contatori</button>
    <button class="nav-btn logout-btn" onclick="logout()"><i class="fas fa-power-off"></i> Esci</button>
  </nav>
  <main class="main">
    
    <!-- ORDINI -->
    <section id="orders" class="section active">
      <div class="header-sec"><h2>📋 Ordini in Tempo Reale</h2><button class="btn btn-danger" onclick="clearAllOrders()"><i class="fas fa-broom"></i> Pulisci Database</button></div>
      <div id="ordersList"></div>
    </section>

    <!-- PRODOTTI -->
    <section id="products" class="section">
      <div class="header-sec"><h2>🍕 Gestione Menu</h2><button class="btn btn-success" onclick="addCategory()"><i class="fas fa-plus"></i> Nuova Categoria</button></div>
      <div id="categoriesList"></div>
    </section>

    <!-- PROMO -->
    <section id="promotions" class="section">
      <div class="header-sec"><h2>🎁 Promozioni Attive</h2><button class="btn btn-primary" onclick="createPromo()"><i class="fas fa-plus"></i> Crea Promo</button></div>
      <div id="promosList"></div>
    </section>

    <!-- RECENSIONI -->
    <section id="reviews" class="section">
      <div class="header-sec"><h2>⭐ Recensioni Clienti</h2></div>
      <div id="reviewsList"></div>
    </section>

    <!-- IMPOSTAZIONI -->
    <section id="settings" class="section">
      <div class="header-sec"><h2>⚙️ Configurazione</h2><button class="btn btn-primary" onclick="saveSettings()"><i class="fas fa-save"></i> Salva Tutto</button></div>
      <div class="grid-2">
        <div class="card">
          <h3 style="margin-bottom:15px;"><i class="fas fa-store"></i> Brand & Contatti</h3>
          <div class="form-group"><label>Nome Pizzeria</label><input id="s_brand"></div>
          <div class="form-group"><label>Sottotitolo</label><input id="s_sub"></div>
          <div class="form-group"><label>Città</label><input id="s_city"></div>
          <div class="form-group"><label>Telefono</label><input id="s_phone"></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:15px;"><i class="fas fa-clock"></i> Orari & Disponibilità</h3>
          <div class="form-group"><label>Orari (es. 11:00-15:00,18:00-23:00)</label><input id="s_hours"></div>
          <div class="form-group"><label>Chiusure Speciali (YYYY-MM-DD)</label><input id="s_close" placeholder="2026-12-25, 2027-01-01"></div>
          <div class="form-group"><label>Stato Manuale</label>
            <select id="s_status"><option value="auto">🤖 Automatico</option><option value="open">🟢 Forza APERTO</option><option value="closed">🔴 Forza CHIUSO</option></select>
          </div>
          <label style="font-weight:500; margin-bottom:8px; display:block;">Giorni di Apertura</label>
          <div class="days-wrapper" id="daysTog"></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:15px;"><i class="fas fa-motorcycle"></i> Consegna & Tariffe</h3>
          <div class="grid-2">
            <div class="form-group"><label>Costo Consegna (€)</label><input type="number" step="0.5" id="s_fee"></div>
            <div class="form-group"><label>Minimo Ordine (€)</label><input type="number" step="0.5" id="s_min"></div>
          </div>
          <div class="form-group" style="display:flex; align-items:center; gap:10px; margin-top:10px;">
            <input type="checkbox" id="s_delOn" style="width:auto;"> <label for="s_delOn" style="margin:0; font-weight:500;">Consegna a Domicilio Attiva</label>
          </div>
        </div>
      </div>
    </section>

    <!-- FATTORINI -->
    <section id="drivers" class="section">
      <div class="header-sec"><h2>🛵 Gestione Fattorini</h2><button class="btn btn-success" onclick="addDriverRow()"><i class="fas fa-plus"></i> Aggiungi</button></div>
      <div class="card"><div id="driversList"></div></div>
      <button class="btn btn-primary" onclick="saveDrivers()" style="margin-top:10px;"><i class="fas fa-save"></i> Salva Fattorini</button>
    </section>

    <!-- CONTATORI -->
    <section id="counters" class="section">
      <div class="header-sec"><h2>📊 Contatori di Oggi</h2><button class="btn btn-danger" onclick="resetCounters()"><i class="fas fa-undo"></i> Azzera Oggi</button></div>
      <div class="card" id="countersList" style="text-align:center; padding:30px; color:#64748b;">Caricamento...</div>
    </section>

  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  // CONFIG FIREBASE (Identica all'app cliente)
  const firebaseConfig = { apiKey: "AIzaSyAw8pBS3gOpitVIArnWutBnwca3hXSWuVs", authDomain: "teogra-c8cf5.firebaseapp.com", databaseURL: "https://teogra-c8cf5-default-rtdb.europe-west1.firebasedatabase.app", projectId: "teogra-c8cf5", storageBucket: "teogra-c8cf5.firebasestorage.app", messagingSenderId: "686300112893", appId: "1:686300112893:web:e147b82f91374f12db1b94" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let appData = { categories:{}, menu:{}, settings:{}, branding:{}, promotions:{}, drivers:{} };

  // AUTH
  async function verifyPin() {
    const input = document.getElementById('adminPinInput').value;
    const err = document.getElementById('loginError');
    err.textContent = '';
    try {
      const snap = await db.ref('settings/adminPin').once('value');
      if (input === (snap.val() || '1234')) {
        document.getElementById('loginScreen').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'flex';
          initDashboard();
        }, 300);
      } else { err.textContent = '❌ PIN errato o non configurato'; }
    } catch(e) { err.textContent = '⚠️ Errore connessione Firebase'; }
  }
  document.getElementById('adminPinInput').addEventListener('keypress', e => { if(e.key==='Enter') verifyPin(); });

  // INIT
  function initDashboard() {
    setupListeners();
    renderDaysToggles();
  }
  function setupListeners() {
    db.ref('categories').on('value', s => { if(s.exists()) { appData.categories=s.val(); renderProducts(); } });
    db.ref('menu').on('value', s => { if(s.exists()) { appData.menu=s.val(); renderProducts(); } });
    db.ref('settings').on('value', s => { if(s.exists()) { appData.settings={...appData.settings, ...s.val()}; loadSettingsForm(); } });
    db.ref('branding').on('value', s => { if(s.exists()) appData.branding={...appData.branding, ...s.val()}; });
    db.ref('promotions').on('value', s => { appData.promotions=s.exists()?s.val():{}; renderPromos(); });
    db.ref('ordini').on('value', s => renderOrders(s.val()||{}));
    db.ref('recensioni').on('value', s => renderReviews(s.val()||{}));
    db.ref('drivers').on('value', s => { appData.drivers=s.val()||{}; renderDrivers(); });
    db.ref('contatori').on('value', s => renderCounters(s.val()||{}));
  }

  function switchTab(id) {
    document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  function showToast(msg) {
    const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 3000);
  }

  // ORDINI
  function renderOrders(orders) {
    const list = document.getElementById('ordersList');
    const active = Object.values(orders).filter(o=>o.status!=='delivered').sort((a,b)=>b.timestamp-a.timestamp);
    const delivered = Object.values(orders).filter(o=>o.status==='delivered').sort((a,b)=>b.timestamp-a.timestamp);
    
    let html = `<div style="margin-bottom:20px;"><strong style="color:#ef4444;">🔴 In Corso (${active.length})</strong></div>`;
    active.forEach(o => html += orderCard(o));
    html += `<div style="margin:20px 0 10px;"><strong style="color:#3b82f6;">🔵 Consegnati (${delivered.length})</strong></div>`;
    delivered.forEach(o => html += orderCard(o, true));
    list.innerHTML = html || '<p style="text-align:center;padding:50px;color:#94a3b8;">Nessun ordine presente</p>';
  }
  function orderCard(o, done=false) {
    const st = {new:'badge-new', preparing:'badge-prep', ready:'badge-ready', delivered:'badge-del'}[o.status];
    const lb = {new:'🔴 Nuovo', preparing:'🟡 In Prep', ready:'🟢 Pronto', delivered:'🔵 Consegnato'}[o.status];
    const items = (o.items||[]).map(i=>`<div style="font-size:0.9rem;">▸ ${i.name} x${i.qty} - €${(i.price*i.qty).toFixed(2)}</div>`).join('');
    const acts = done ? '' : `
      <div style="margin-top:10px; display:flex; gap:6px; flex-wrap:wrap;">
        ${o.status==='new'?`<button class="btn btn-warning btn-sm" onclick="updStatus('${o.orderId}','preparing')">🍕 Prep</button>`:''}
        ${o.status==='preparing'?`<button class="btn btn-success btn-sm" onclick="updStatus('${o.orderId}','ready')">✅ Pronto</button>`:''}
        ${o.status==='ready'?`<button class="btn btn-primary btn-sm" onclick="updStatus('${o.orderId}','delivered')">🛵 Cons.</button>`:''}
        <button class="btn btn-danger btn-sm" onclick="delOrder('${o.orderId}')"><i class="fas fa-trash"></i></button>
      </div>`;
    return `<div class="card" style="border-left:4px solid ${done?'#3b82f6':'#ef4444'}; opacity:${done?'0.85':'1'}">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <strong style="font-size:1.1rem;">${o.orderId}</strong> <span class="badge ${st}">${lb}</span>
      </div>
      <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:10px; font-size:0.9rem;">
        <div><i class="fas fa-user"></i> ${o.customerName}</div>
        <div><i class="fas fa-phone"></i> ${o.customerPhone}</div>
        <div><i class="fas fa-${o.type==='delivery'?'motorcycle':'store'}"></i> ${o.type==='delivery'?'Consegna':'Ritiro'}</div>
        <div><i class="fas fa-clock"></i> ${o.scheduledTime||'Subito'}</div>
      </div>
      ${o.address?`<div style="margin-bottom:10px; color:#64748b; font-size:0.85rem;"><i class="fas fa-map-marker-alt"></i> ${o.address}</div>`:''}
      ${o.notes?`<div style="margin-bottom:10px; color:#64748b; font-size:0.85rem;"><i class="fas fa-sticky-note"></i> ${o.notes}</div>`:''}
      <div style="background:#f8fafc; padding:8px; border-radius:6px; margin-bottom:10px;">${items}</div>
      <div style="text-align:right; font-weight:700; font-size:1.1rem; color:var(--sidebar);">Totale: €${o.finalTotal.toFixed(2)}</div>
      ${acts}
    </div>`;
  }
  function updStatus(id,st){ db.ref(`ordini/${id}/status`).set(st); showToast(`Stato: ${st}`); }
  function delOrder(id){ if(confirm('Eliminare?')){ db.ref(`ordini/${id}`).remove(); showToast('Eliminato'); } }
  function clearAllOrders(){ if(confirm('⚠️ CANCELLARE TUTTI GLI ORDINI DAL DATABASE?')){ db.ref('ordini').remove(); showToast('Database ordini svuotato'); } }

  // PRODOTTI
  function renderProducts() {
    const list = document.getElementById('categoriesList'); let html='';
    Object.keys(appData.categories).forEach(cat => {
      const c = appData.categories[cat]; const prods = appData.menu[cat]||[];
      html += `<div class="card"><h3 style="margin-bottom:10px;">${c.name||cat} <span style="font-size:0.8rem; background:#e2e8f0; padding:2px 8px; border-radius:10px; margin-left:10px;">${prods.length}</span></h3>
      <table><thead><tr><th>Nome</th><th>Prezzo</th><th>Descrizione</th><th></th></tr></thead><tbody>`;
      prods.forEach((p,i) => {
        html += `<tr><td><input value="${p.name}" onchange="updProd('${cat}',${i},'name',this.value)"></td>
        <td><input type="number" step="0.5" value="${p.price}" onchange="updProd('${cat}',${i},'price',this.value)" style="width:80px;"></td>
        <td><input value="${p.desc||''}" onchange="updProd('${cat}',${i},'desc',this.value)"></td>
        <td><button class="btn btn-danger btn-sm" onclick="delProd('${cat}',${i})"><i class="fas fa-trash"></i></button></td></tr>`;
      });
      html += `</tbody></table><button class="btn btn-success" onclick="addProd('${cat}')" style="margin-top:10px;"><i class="fas fa-plus"></i> Aggiungi</button>
      <button class="btn btn-danger" onclick="delCat('${cat}')" style="margin-top:10px; margin-left:8px;"><i class="fas fa-trash"></i> Elimina Cat</button></div>`;
    });
    list.innerHTML = html;
  }
  function addCat(){ const n=prompt("Nome:"); const i=prompt("Icona (fa-...):","fa-utensils"); const k=prompt("Chiave (minusc, es pizze):"); if(!k||!/^[a-z0-9_]+$/.test(k)) return showToast("Chiave non valida"); db.ref(`categories/${k}`).set({name:n,icon:i}); db.ref(`menu/${k}`).set([]); showToast("Categoria creata"); }
  function delCat(k){ if(confirm("Eliminare categoria e prodotti?")){ db.ref(`categories/${k}`).remove(); db.ref(`menu/${k}`).remove(); showToast("Eliminata"); } }
  function addProd(c){ const n=prompt("Nome:"); if(!n)return; const p=parseFloat(prompt("Prezzo:","5"))||5; const d=prompt("Desc:","")||""; db.ref(`menu/${c}`).push({name:n,price:p,desc:d}); showToast("Aggiunto"); }
  function updProd(c,i,f,v){ if(f==='price')v=parseFloat(v); db.ref(`menu/${c}/${i}/${f}`).set(v); }
  function delProd(c,i){ if(confirm("Eliminare?")){ db.ref(`menu/${c}/${i}`).remove(); showToast("Eliminato"); } }

  // PROMO
  function renderPromos() {
    const list = document.getElementById('promosList'); const td=new Date().toISOString().split('T')[0]; let html='';
    Object.entries(appData.promotions).forEach(([id,p]) => {
      const act = p.active && p.startDate<=td && p.endDate>=td && (p.currentUses||0)<p.maxUses;
      const price = (p.products||[]).reduce((s,pr)=>s+(pr.price*pr.qty),0);
      html += `<div class="card"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><h3>${p.title} <span style="color:#7c3aed;">- €${price.toFixed(2)}</span></h3><span class="badge ${act?'badge-ready':'badge-del'}">${act?'ATTIVA':'INATTIVA'}</span></div>
      <p style="color:#64748b; margin-bottom:10px;">${p.message||'Nessun messaggio'}</p>
      <div style="display:flex; gap:15px; margin-bottom:15px; font-size:0.85rem; background:#f8fafc; padding:8px; border-radius:6px;">
        <div>🔥 Usate: <b>${p.currentUses||0}</b></div><div>📦 Rimaste: <b>${p.maxUses-(p.currentUses||0)}</b></div><div>📅 Fine: <b>${p.endDate}</b></div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="togglePromo('${id}')">${act?'Disattiva':'Attiva'}</button>
        <button class="btn btn-sm" onclick="resetPromo('${id}')">🔄 Reset Usi</button>
        <button class="btn btn-danger btn-sm" onclick="delPromo('${id}')"><i class="fas fa-trash"></i> Elimina</button>
      </div></div>`;
    });
    list.innerHTML = html || '<p style="text-align:center;padding:40px;color:#94a3b8;">Nessuna promozione attiva</p>';
  }
  function createPromo(){ const t=prompt("Titolo:"); if(!t)return; const s=prompt("Data inizio (YYYY-MM-DD):", new Date().toISOString().split('T')[0]); const e=prompt("Data fine:"); const m=prompt("Max utilizzi:","50"); if(!s||!e||!m)return showToast("Dati mancanti"); db.ref('promotions').push({title:t, message:'', startDate:s, endDate:e, maxUses:parseInt(m), currentUses:0, active:true, products:[], createdAt:Date.now()}); showToast("Promo creata"); }
  function togglePromo(id){ db.ref(`promotions/${id}/active`).set(!appData.promotions[id].active); showToast("Stato aggiornato"); }
  function resetPromo(id){ if(confirm("Resettare a 0?")){ db.ref(`promotions/${id}/currentUses`).set(0); showToast("Resettato"); } }
  function delPromo(id){ if(confirm("Eliminare?")){ db.ref(`promotions/${id}`).remove(); showToast("Eliminata"); } }

  // RECENSIONI
  function renderReviews(rev) {
    const list = document.getElementById('reviewsList'); const sorted = Object.entries(rev).sort((a,b)=>b[1].timestamp-a[1].timestamp);
    let html=''; sorted.forEach(([id,r]) => {
      const st = r.status==='approved'?'<span style="color:#10b981">✅ Approvata</span>':r.status==='rejected'?'<span style="color:#ef4444">❌ Rifiutata</span>':'⏳ In Attesa';
      html += `<div class="card">${st} <strong>${r.name}</strong> (${'⭐'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}) - ${new Date(r.timestamp).toLocaleString()}<br>
      <p style="margin:8px 0; font-style:italic;">"${r.text}"</p><small style="color:#64748b;">Ordine: ${r.orderId||'N/A'}</small>
      <div style="margin-top:10px; display:flex; gap:6px;">
        ${r.status==='pending'?`<button class="btn btn-success btn-sm" onclick="updRev('${id}','approved')">✅</button><button class="btn btn-danger btn-sm" onclick="updRev('${id}','rejected')">❌</button>`:''}
        <button class="btn btn-danger btn-sm" onclick="delRev('${id}')"><i class="fas fa-trash"></i></button>
      </div></div>`;
    });
    list.innerHTML = html || '<p style="text-align:center;padding:40px;color:#94a3b8;">Nessuna recensione</p>';
  }
  function updRev(id,st){ db.ref(`recensioni/${id}/status`).set(st); showToast("Aggiornata"); }
  function delRev(id){ if(confirm("Eliminare?")){ db.ref(`recensioni/${id}`).remove(); } }

  // IMPOSTAZIONI
  function renderDaysToggles() {
    const days = ['lun','mar','mer','gio','ven','sab','dom'];
    document.getElementById('daysTog').innerHTML = days.map(d => `<div class="day-tog" data-day="${d}" onclick="this.classList.toggle('active')">${d.charAt(0).toUpperCase()+d.slice(1)}</div>`).join('');
  }
  function loadSettingsForm() {
    const s=appData.settings, b=appData.branding;
    document.getElementById('s_brand').value=b.name||'';
    document.getElementById('s_sub').value=b.subtitle||'';
    document.getElementById('s_city').value=b.city||'';
    document.getElementById('s_phone').value=s.visiblePhone||'';
    document.getElementById('s_hours').value=s.hours||'';
    document.getElementById('s_close').value=s.specialClosures||'';
    document.getElementById('s_fee').value=s.deliveryFee||0;
    document.getElementById('s_min').value=s.minDeliveryOrder||0;
    document.getElementById('s_delOn').checked=s.deliveryEnabled!==false;
    document.getElementById('s_status').value=s.manualStatus||'auto';
    const od = s.openDays?s.openDays.split(','):[];
    document.querySelectorAll('.day-tog').forEach(el => { if(od.includes(el.dataset.day)) el.classList.add('active'); else el.classList.remove('active'); });
  }
  function saveSettings() {
    const od = Array.from(document.querySelectorAll('.day-tog.active')).map(e=>e.dataset.day).join(',');
    db.ref('branding').update({ name:document.getElementById('s_brand').value, subtitle:document.getElementById('s_sub').value, city:document.getElementById('s_city').value });
    db.ref('settings').update({ visiblePhone:document.getElementById('s_phone').value, hours:document.getElementById('s_hours').value, specialClosures:document.getElementById('s_close').value, deliveryFee:parseFloat(document.getElementById('s_fee').value)||0, minDeliveryOrder:parseFloat(document.getElementById('s_min').value)||0, deliveryEnabled:document.getElementById('s_delOn').checked, openDays:od, manualStatus:document.getElementById('s_status').value });
    showToast("✅ Impostazioni salvate!");
  }

  // FATTORINI
  function renderDrivers() {
    const list = document.getElementById('driversList'); let html='';
    Object.entries(appData.drivers).forEach(([p,n]) => {
      html += `<div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;"><input type="text" value="${n}" class="d-name" style="flex:2;"><input type="text" value="${p}" class="d-pin" maxlength="4" style="width:80px;"><button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button></div>`;
    });
    list.innerHTML = html;
  }
  function addDriverRow() { document.getElementById('driversList').insertAdjacentHTML('beforeend', `<div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;"><input type="text" placeholder="Nome" class="d-name" style="flex:2;"><input type="text" placeholder="PIN 4 cifre" class="d-pin" maxlength="4" style="width:80px;"><button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button></div>`); }
  function saveDrivers() {
    const d={}; let ok=true;
    document.querySelectorAll('#driversList > div').forEach(r => { const n=r.querySelector('.d-name').value.trim(), p=r.querySelector('.d-pin').value.trim(); if(!n||!p||!/^\d{4}$/.test(p)){ok=false;return;} d[p]=n; });
    if(!ok) return showToast("⚠️ Compila Nome e PIN (4 cifre)");
    if(!Object.keys(d).length) return showToast("⚠️ Aggiungi almeno 1 fattorino");
    db.ref('drivers').set(d); showToast("✅ Fattorini salvati");
  }

  // CONTATORI
  function renderCounters(data) {
    const list = document.getElementById('countersList'); const today=new Date().toISOString().split('T')[0]; const day=data[today]||{};
    if(!Object.keys(day).length) { list.innerHTML='<p style="padding:30px;">Nessun ordine oggi</p>'; return; }
    let html='<table><thead><tr><th>Prodotto</th><th>Quantità</th></tr></thead><tbody>';
    Object.entries(day).sort((a,b)=>b[1]-a[1]).forEach(([k,q]) => html+=`<tr><td>${k.replace(/_/g,' ')}</td><td style="font-weight:bold; text-align:center;">${q}</td></tr>`);
    list.innerHTML = html+'</tbody></table>';
  }
  function resetCounters() {
    const today=new Date().toISOString().split('T')[0];
    if(confirm("Azzerare contatori di oggi?")){ db.ref(`contatori/${today}`).remove(); db.ref(`contatori_nomi/${today}`).remove(); showToast("✅ Contatori azzerati"); }
  }

  function logout() { location.reload(); }
</script>
</body>
</html>
