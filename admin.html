<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Antica Pizzeria Grasso</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1a1209; color: #f5e6c8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: #2a1e13; padding: 40px; border-radius: 20px; border: 2px solid #d4a84b; text-align: center; width: 400px; }
        .login-container h1 { color: #d4a84b; margin-bottom: 10px; }
        .login-container p { color: #8a7a5a; margin-bottom: 30px; }
        .pin-input { width: 100%; padding: 15px; font-size: 2rem; text-align: center; border: 2px solid #d4a84b; border-radius: 10px; background: #1a1209; color: #d4a84b; margin-bottom: 20px; letter-spacing: 10px; }
        .login-btn { width: 100%; padding: 15px; background: #d4a84b; color: #1a1209; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .login-btn:hover { background: #f0d78c; }
        .error { color: #ef4444; margin-top: 15px; display: none; }
        .loading { color: #d4a84b; margin-top: 15px; }
        .dashboard { display: none; width: 90%; max-width: 1200px; padding: 20px; }
        .dashboard.active { display: block; }
        .header { background: #2a1e13; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { color: #d4a84b; }
        .logout-btn { background: #ef4444; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #2a1e13; padding: 20px; border-radius: 10px; border-left: 4px solid #d4a84b; }
        .stat-card h3 { font-size: 2rem; color: #d4a84b; margin: 10px 0; }
        .stat-card p { color: #8a7a5a; }
    </style>
</head>
<body>

<div class="login-container" id="loginScreen">
    <h1>🔐 Area Riservata</h1>
    <p>Inserisci il PIN Admin</p>
    <input type="password" class="pin-input" id="pinInput" maxlength="6" placeholder="••••••">
    <button class="login-btn" onclick="checkPin()">ENTRA</button>
    <div class="loading" id="loadingMsg">Connessione al server...</div>
    <div class="error" id="errorMsg">❌ PIN Errato!</div>
</div>

<div class="dashboard" id="dashboard">
    <div class="header">
        <h2>🍕 Pizzeria Grasso - Pannello Admin</h2>
        <button class="logout-btn" onclick="logout()">Esci</button>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <p>Incasso Oggi</p>
            <h3 id="todayRevenue">€0.00</h3>
        </div>
        <div class="stat-card">
            <p>Ordini Totali</p>
            <h3 id="todayCount">0</h3>
        </div>
        <div class="stat-card">
            <p>Stato</p>
            <h3 id="shopStatus">-</h3>
        </div>
    </div>

    <div class="stat-card" style="margin-top: 20px;">
        <h3>📋 Ultimi Ordini</h3>
        <div id="ordersList" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
// Configurazione Firebase
const firebaseConfig = {
    apiKey: "AIzaSyAw8pBS3gOpitVIArnWutBnwca3hXSWuVs",
    authDomain: "teogra-c8cf5.firebaseapp.com",
    databaseURL: "https://teogra-c8cf5-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "teogra-c8cf5",
    storageBucket: "teogra-c8cf5.firebasestorage.app",
    messagingSenderId: "686300112893",
    appId: "1:686300112893:web:e147b82f91374f12db1b94"
};

// Inizializza Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentPin = "";
let dbLoaded = false;

// Carica il PIN dal database
db.ref('settings/adminPin').once('value')
    .then(snapshot => {
        if (snapshot.exists()) {
            currentPin = snapshot.val();
            console.log("PIN caricato:", currentPin);
        } else {
            currentPin = "1234"; // PIN di default
            console.log("PIN non trovato, uso default: 1234");
        }
        dbLoaded = true;
        document.getElementById('loadingMsg').style.display = 'none';
    })
    .catch(error => {
        console.error("Errore caricamento PIN:", error);
        document.getElementById('loadingMsg').textContent = "Errore connessione. Ricarica la pagina.";
        document.getElementById('loadingMsg').style.color = '#ef4444';
    });

function checkPin() {
    const input = document.getElementById('pinInput').value;
    const errorMsg = document.getElementById('errorMsg');
    
    if (!dbLoaded) {
        alert("Connessione in corso... attendi qualche secondo e riprova.");
        return;
    }
    
    if (input === currentPin) {
        // PIN corretto
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        loadDashboard();
    } else {
        // PIN errato
        errorMsg.style.display = 'block';
        document.getElementById('pinInput').value = '';
    }
}

function loadDashboard() {
    // Carica statistiche
    db.ref('ordini').orderByChild('timestamp').limitToLast(50).on('value', snapshot => {
        const today = new Date().toDateString();
        let revenue = 0;
        let count = 0;
        const orders = [];
        
        snapshot.forEach(child => {
            const order = child.val();
            const orderDate = new Date(order.timestamp).toDateString();
            
            if (orderDate === today) {
                revenue += (order.finalTotal || 0);
                count++;
            }
            
            orders.push({ id: child.key, ...order });
        });
        
        document.getElementById('todayRevenue').textContent = `€${revenue.toFixed(2)}`;
        document.getElementById('todayCount').textContent = count;
        
        // Mostra ultimi 5 ordini
        const ordersList = document.getElementById('ordersList');
        const recentOrders = orders.slice(-5).reverse();
        
        if (recentOrders.length === 0) {
            ordersList.innerHTML = '<p style="color: #8a7a5a;">Nessun ordine</p>';
        } else {
            ordersList.innerHTML = recentOrders.map(order => `
                <div style="background: #1a1209; padding: 10px; margin: 10px 0; border-radius: 5px; border-left: 4px solid ${order.status === 'new' ? '#ef4444' : order.status === 'preparing' ? '#fbbf24' : '#4ade80'};">
                    <strong style="color: #d4a84b;">${order.orderId || 'N/A'}</strong> - 
                    ${order.customerName || 'N/A'} - 
                    €${(order.finalTotal || 0).toFixed(2)} - 
                    <span style="color: ${order.status === 'new' ? '#ef4444' : order.status === 'preparing' ? '#fbbf24' : '#4ade80'}">
                        ${order.status === 'new' ? 'Nuovo' : order.status === 'preparing' ? 'In preparazione' : 'Completato'}
                    </span>
                </div>
            `).join('');
        }
    });
    
    // Carica stato pizzeria
    db.ref('settings/manualStatus').on('value', snapshot => {
        const status = snapshot.val() || 'auto';
        document.getElementById('shopStatus').textContent = status === 'open' ? '✅ APERTO' : status === 'closed' ? '❌ CHIUSO' : '🔄 Auto';
    });
}

function logout() {
    location.reload();
}

// Permetti invio con tasto Enter
document.getElementById('pinInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkPin();
});
</script>

</body>
</html>
